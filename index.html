        // ==========================================
        // 8. المكون الرئيسي والتطبيق (مع نظام المفتاح المنبثق)
        const PlannedTasksView = ({ tasks, updateTasks, globalApiKey, goToDashboard }) => {
          const [viewMode, setViewMode] = useState('list'); // 'list', 'add', 'edit'
          const [isExpandedAll, setIsExpandedAll] = useState(false);

          const [transcript, setTranscript] = useState("");
          const [isRecording, setIsRecording] = useState(false);
          const [recordingTime, setRecordingTime] = useState(0);
          const [audioData, setAudioData] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [error, setError] = useState(null);

          const mediaRecorderRef = useRef(null);
          const timerRef = useRef(null);
          const recognitionRef = useRef(null);

          useEffect(() => {
            try {
              const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              if (SpeechRecognition) {
                recognitionRef.current = new SpeechRecognition();
                recognitionRef.current.continuous = true;
                recognitionRef.current.interimResults = true;
                recognitionRef.current.lang = 'ar-SA';
                recognitionRef.current.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    if (final) setTranscript(prev => prev + final);
                };
                recognitionRef.current.onerror = () => setIsRecording(false);
                recognitionRef.current.onend = () => setIsRecording(false);
              }
            } catch (e) { }
            return () => { if (recognitionRef.current) recognitionRef.current.stop(); };
          }, []);

          const toggleRecording = async () => {
            if (!recognitionRef.current) return setError("المتصفح لا يدعم التسجيل المباشر.");
            if (isRecording) {
              if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
              if (recognitionRef.current) recognitionRef.current.stop();
              clearInterval(timerRef.current);
              setIsRecording(false);
            } else { 
              try { 
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                mediaRecorderRef.current = mediaRecorder;
                const chunks = [];
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                  stream.getTracks().forEach(t => t.stop());
                  let mimeType = mediaRecorder.mimeType.split(';')[0] || 'audio/webm';
                  const reader = new FileReader();
                  reader.readAsDataURL(new Blob(chunks, { type: mimeType }));
                  reader.onloadend = () => setAudioData({ base64: reader.result.split(',')[1], mimeType });
                };
                setAudioData(null); setRecordingTime(0);
                mediaRecorder.start(); setIsRecording(true); setError(null);
                timerRef.current = setInterval(() => setRecordingTime(prev => prev + 1), 1000);
              } catch(e) { setIsRecording(false); setError("لا يمكن الوصول للميكروفون."); } 
            }
          };

          const handleAnalyzeAdd = async () => {
            if (!globalApiKey) return setError("مفتاح الذكاء الاصطناعي مفقود.");
            if (!transcript.trim() && !audioData) return setError("الرجاء إدخال نص مستقبلي أو تسجيل صوتي.");
            setIsAnalyzing(true); setError(null);
            try {
              const res = await analyzePlannedTasksWithAI(transcript, audioData, tasks, globalApiKey);
              if (res && res.new_tasks && res.new_tasks.length > 0) {
                 let updatedTasks = JSON.parse(JSON.stringify(tasks));

                 res.new_tasks.forEach(nt => {
                    const newSubTasks = (nt.subTasks || []).map(st => ({
                        id: 'sub_' + Date.now() + Math.random(),
                        label: st.label,
                        completed: false,
                        isExpanded: false
                    }));

                    // إذا أشار النموذج لمهمة رئيسية موجودة مسبقاً، أضف الخطوات إليها
                    if (nt.parentTaskId) {
                       const parentIdx = updatedTasks.findIndex(t => t.id === nt.parentTaskId);
                       if (parentIdx >= 0) {
                          updatedTasks[parentIdx].subTasks = [...(updatedTasks[parentIdx].subTasks || []), ...newSubTasks];
                          updatedTasks[parentIdx].isExpanded = true;
                          return;
                       }
                    }

                    // إذا لم يحدد parentTaskId، ابحث عن مهمة مشابهة بالعنوان
                    if (nt.label) {
                       const similarIdx = updatedTasks.findIndex(t => {
                          const a = t.label?.trim().toLowerCase();
                          const b = nt.label?.trim().toLowerCase();
                          return a && b && (a.includes(b.slice(0,6)) || b.includes(a.slice(0,6)));
                       });
                       if (similarIdx >= 0 && newSubTasks.length > 0) {
                          updatedTasks[similarIdx].subTasks = [...(updatedTasks[similarIdx].subTasks || []), ...newSubTasks];
                          updatedTasks[similarIdx].isExpanded = true;
                          return;
                       }
                    }

                    // مهمة جديدة تماماً
                    if (nt.label) {
                       updatedTasks.push({
                           id: 'task_' + Date.now() + Math.random(),
                           label: nt.label,
                           isMain: true,
                           completed: false,
                           isExpanded: newSubTasks.length > 0,
                           subTasks: newSubTasks
                       });
                    }
                 });

                 updateTasks(updatedTasks);
              }
              setViewMode('list'); setTranscript(""); setAudioData(null);
            } catch (e) { setError(e.message || "حدث خطأ."); } finally { setIsAnalyzing(false); }
          };

          const toggleExpandAll = () => {
            const nextState = !isExpandedAll;
            setIsExpandedAll(nextState);
            updateTasks(tasks.map(t => ({ ...t, isExpanded: nextState, subTasks: t.subTasks?.map(st => ({...st, isExpanded: nextState})) })));
          };

          const updateTaskField = (id, field, value) => {
             const updated = tasks.map(t => {
                if (t.id === id) return { ...t, [field]: value };
                if (t.subTasks) {
                   return { ...t, subTasks: t.subTasks.map(st => st.id === id ? { ...st, [field]: value } : st) };
                }
                return t;
             });
             updateTasks(updated);
          };

          const toggleComplete = (id, currentVal) => {
             let updated = tasks.map(t => {
                if (t.id === id) {
                   const newVal = !currentVal;
                   return { ...t, completed: newVal, subTasks: t.subTasks?.map(st => ({...st, completed: newVal})) };
                }
                if (t.subTasks) {
                    let found = false;
                    const newSubs = t.subTasks.map(st => {
                       if (st.id === id) { found = true; return {...st, completed: !currentVal}; }
                       return st;
                    });
                    return { ...t, subTasks: newSubs, completed: found ? newSubs.every(s => s.completed) : t.completed };
                }
                return t;
             });
             updateTasks(updated);
          };

          const removeTaskId = (id) => {
             let updated = tasks.filter(t => t.id !== id).map(t => {
                if (t.subTasks) return { ...t, subTasks: t.subTasks.filter(st => st.id !== id) };
                return t;
             });
             updateTasks(updated);
          };

          const formatTime = (sec) => `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-32">
               <header className="bg-slate-900 text-white p-6 shadow-xl rounded-b-[2.5rem]">
                 <div className="flex justify-between items-center mb-4">
                   <button onClick={goToDashboard} className="p-2 bg-white/10 rounded-full hover:bg-white/20"><ArrowRight className="text-xl" /></button>
                   <h1 className="text-xl font-extrabold flex items-center gap-2"><List className="text-fuchsia-400" /> المهام المخطط لها</h1>
                   <div className="w-10"></div>
                 </div>
                 <div className="flex gap-2 justify-center mt-4">
                    <button onClick={() => setViewMode(viewMode === 'add' ? 'list' : 'add')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm shadow-md transition flex justify-center items-center gap-2 ${viewMode === 'add' ? 'bg-fuchsia-600 text-white' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                      <Plus className="text-sm" /> <span>إضافة بالذكاء</span>
                    </button>
                    <button onClick={() => setViewMode(viewMode === 'edit' ? 'list' : 'edit')} className={`flex-1 py-3 px-4 rounded-xl font-bold text-sm shadow-md transition flex justify-center items-center gap-2 ${viewMode === 'edit' ? 'bg-amber-500 text-white' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                      <Edit className="text-sm" /> <span>تعديل يدوي</span>
                    </button>
                 </div>
               </header>

               <div className="px-5 mt-6 relative">
                  
                  {viewMode === 'list' && tasks.length > 0 && (
                     <div className="flex justify-end mb-4">
                       <button onClick={toggleExpandAll} className="flex items-center gap-2 text-sm font-bold text-fuchsia-700 bg-fuchsia-100 hover:bg-fuchsia-200 px-4 py-2 rounded-xl transition">
                          {isExpandedAll ? <Minimize className="text-xs" /> : <Maximize className="text-xs"/>} 
                          <span>{isExpandedAll ? 'طوي الجميع' : 'توسيع الجميع'}</span>
                       </button>
                     </div>
                  )}

                  {viewMode === 'add' && (
                     <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex flex-col items-center">
                         {isRecording && <div className="absolute top-1/3 flex items-center justify-center pointer-events-none opacity-20"><div className="w-40 h-40 bg-red-500 rounded-full animate-ping absolute"></div></div>}
                         <button onClick={toggleRecording} className={`relative z-10 w-24 h-24 rounded-full flex items-center justify-center transition-all duration-500 shadow-xl shrink-0 mt-2 ${isRecording ? 'bg-red-500 text-white scale-110' : 'bg-slate-900 text-white hover:bg-slate-800'}`}>
                           {isRecording ? <MicOff className="text-4xl" /> : <Mic className="text-4xl" />}
                         </button>
                         <p className="mt-4 text-gray-500 font-bold text-sm z-10">{isRecording ? `جاري الاستماع... (${formatTime(recordingTime)})` : 'تحدث أو اكتب خططك المستقبلية'}</p>
                         
                         {audioData && !isRecording && (
                           <div className="mt-4 w-full bg-blue-50 p-3 rounded-2xl flex justify-between items-center"><span className="text-sm font-bold text-blue-800">صوت جاهز</span><button onClick={() => setAudioData(null)}><Trash className="text-red-500"/></button></div>
                         )}

                         <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)} placeholder="مثال: أريد قراءة كتاب كذا وسينقسم لعدة فصول..." className="mt-6 w-full h-32 bg-slate-50 rounded-2xl p-4 text-gray-700 resize-none outline-none focus:ring-2 focus:ring-fuchsia-200 text-sm font-medium border border-gray-100" />
                         
                         {error && <p className="text-red-500 text-xs font-bold mt-2">{error}</p>}

                         <button onClick={handleAnalyzeAdd} disabled={isAnalyzing || (!transcript.trim() && !audioData)} className="bg-fuchsia-600 text-white w-full py-4 rounded-xl font-bold mt-4 shadow-lg disabled:opacity-50 flex justify-center gap-2 hover:bg-fuchsia-700 transition">
                           {isAnalyzing ? <Loader className="animate-spin text-lg" /> : <Plus className="text-lg" />}
                           <span>{isAnalyzing ? 'يتم الجدولة والتقسيم...' : 'إضافة وتقسيم الخطط'}</span>
                         </button>
                     </div>
                  )}

                  {viewMode === 'edit' && (
                     <div className="mb-4 bg-white rounded-2xl border border-dashed border-amber-300 p-4 flex flex-col gap-3">
                        <p className="text-amber-700 font-bold text-sm text-center">إضافة يدوية سريعة</p>
                        <div className="flex gap-2">
                           <input
                              type="text"
                              id="manual-main-task-input"
                              placeholder="عنوان مهمة رئيسية جديدة..."
                              className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-amber-300 font-medium"
                              onKeyDown={e => {
                                 if (e.key === 'Enter' && e.target.value.trim()) {
                                    const label = e.target.value.trim();
                                    updateTasks([...tasks, { id: 'task_' + Date.now() + Math.random(), label, isMain: true, completed: false, isExpanded: false, subTasks: [] }]);
                                    e.target.value = '';
                                 }
                              }}
                           />
                           <button
                              className="bg-amber-500 text-white px-3 py-2 rounded-xl font-bold text-sm hover:bg-amber-600 transition"
                              onClick={() => {
                                 const inp = document.getElementById('manual-main-task-input');
                                 if (inp && inp.value.trim()) {
                                    updateTasks([...tasks, { id: 'task_' + Date.now() + Math.random(), label: inp.value.trim(), isMain: true, completed: false, isExpanded: false, subTasks: [] }]);
                                    inp.value = '';
                                 }
                              }}
                           >إضافة</button>
                        </div>
                        <p className="text-[10px] text-gray-400 font-bold text-center">اضغط Enter أو زر إضافة لحفظ المهمة. لإضافة خطوات فرعية، اضغط + بجانب أي مهمة أدناه.</p>
                     </div>
                  )}

                  {viewMode !== 'add' && (
                     <div className="flex flex-col gap-4">
                        {tasks.length === 0 ? (
                          <div className="text-center text-gray-400 mt-10 font-bold bg-white p-10 rounded-3xl border border-gray-100">لا توجد مهام مخطط لها حالياً. أضف مهامك لتتبع إنجازك.</div>
                        ) : (
                          tasks.map(task => (
                            <div key={task.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                               <div className="p-4 flex items-start gap-3">
                                  {viewMode === 'list' && (
                                      <button onClick={() => toggleComplete(task.id, task.completed)} className={`mt-0.5 shrink-0 w-6 h-6 rounded-full flex items-center justify-center border-2 transition ${task.completed ? 'bg-fuchsia-500 border-fuchsia-500 text-white' : 'border-gray-300 text-transparent hover:border-fuchsia-400'}`}>
                                         <Check className="text-xs" />
                                      </button>
                                  )}
                                  {viewMode === 'edit' && (
                                      <button onClick={() => removeTaskId(task.id)} className="mt-0.5 shrink-0 w-6 h-6 rounded-full flex items-center justify-center bg-red-100 text-red-500 hover:bg-red-200 transition"><Trash className="text-xs" /></button>
                                  )}
                                  
                                  <div className="flex-1 overflow-hidden" onClick={() => viewMode === 'list' && updateTaskField(task.id, 'isExpanded', !task.isExpanded)}>
                                      {viewMode === 'edit' ? (
                                          <input type="text" value={task.label} onChange={(e) => updateTaskField(task.id, 'label', e.target.value)} className="w-full font-black text-gray-800 text-sm bg-gray-50 p-1.5 rounded outline-none focus:ring-1 focus:ring-amber-500 border border-gray-200" />
                                      ) : (
                                          <h3 className={`font-black text-sm transition-all select-none cursor-pointer ${task.completed ? 'text-gray-400 line-through' : 'text-gray-800'}`}>{task.label}</h3>
                                      )}
                                      {viewMode === 'list' && task.subTasks?.length > 0 && (
                                          <div className="text-[10px] text-fuchsia-600 font-bold mt-1.5 flex items-center gap-1"><List className="text-[9px]" /> تحتوي على {task.subTasks.length} خطوات فرعية</div>
                                      )}
                                  </div>
                                  
                                  {viewMode === 'list' && task.subTasks?.length > 0 && (
                                      <button onClick={() => updateTaskField(task.id, 'isExpanded', !task.isExpanded)} className="text-gray-400 p-1 bg-gray-50 rounded shadow-sm hover:text-gray-600">
                                          <ChevronLeft className={`text-xs transition-transform duration-300 ${task.isExpanded ? '-rotate-90' : ''}`} />
                                      </button>
                                  )}
                               </div>

                               {(task.isExpanded || viewMode === 'edit') && (
                                   <div className="bg-gray-50 border-t border-gray-100 p-4 pt-3 flex flex-col gap-3">
                                       {(task.subTasks || []).map(sub => (
                                           <div key={sub.id} className="flex items-start gap-3 pl-2">
                                               {viewMode === 'list' && (
                                                  <button onClick={() => toggleComplete(sub.id, sub.completed)} className={`mt-0.5 shrink-0 w-5 h-5 rounded-md flex items-center justify-center border-2 transition ${sub.completed ? 'bg-fuchsia-400 border-fuchsia-400 text-white' : 'border-gray-300 text-transparent hover:border-fuchsia-300'}`}>
                                                     <Check className="text-[10px]" />
                                                  </button>
                                               )}
                                               {viewMode === 'edit' && (
                                                  <button onClick={() => removeTaskId(sub.id)} className="mt-0.5 shrink-0 w-5 h-5 rounded-md flex items-center justify-center bg-red-100 text-red-500 hover:bg-red-200 transition"><Trash className="text-[10px]" /></button>
                                               )}

                                               <div className="flex-1">
                                                  {viewMode === 'edit' ? (
                                                      <input type="text" value={sub.label} onChange={(e) => updateTaskField(sub.id, 'label', e.target.value)} className="w-full font-bold text-gray-700 text-sm bg-white p-1.5 rounded outline-none focus:ring-1 focus:ring-amber-500 border border-gray-200" />
                                                  ) : (
                                                      <p className={`font-bold text-sm text-gray-700 transition ${sub.completed ? 'opacity-50 line-through' : ''}`}>{sub.label}</p>
                                                  )}
                                               </div>
                                           </div>
                                       ))}
                                       {viewMode === 'edit' && (
                                          <div className="flex gap-2 mt-2 pt-2 border-t border-dashed border-gray-200">
                                             <input
                                                type="text"
                                                id={`sub-input-${task.id}`}
                                                placeholder="+ أضف خطوة فرعية..."
                                                className="flex-1 bg-white border border-gray-200 rounded-xl px-3 py-1.5 text-xs outline-none focus:ring-1 focus:ring-amber-400 font-medium"
                                                onKeyDown={e => {
                                                   if (e.key === 'Enter' && e.target.value.trim()) {
                                                      const label = e.target.value.trim();
                                                      const newSub = { id: 'sub_' + Date.now() + Math.random(), label, completed: false, isExpanded: false };
                                                      const updated = tasks.map(t => t.id === task.id ? { ...t, subTasks: [...(t.subTasks || []), newSub], isExpanded: true } : t);
                                                      updateTasks(updated);
                                                      e.target.value = '';
                                                   }
                                                }}
                                             />
                                             <button
                                                className="bg-gray-200 hover:bg-amber-100 text-gray-600 px-2 py-1.5 rounded-xl text-xs font-bold transition"
                                                onClick={() => {
                                                   const inp = document.getElementById(`sub-input-${task.id}`);
                                                   if (inp && inp.value.trim()) {
                                                      const newSub = { id: 'sub_' + Date.now() + Math.random(), label: inp.value.trim(), completed: false, isExpanded: false };
                                                      const updated = tasks.map(t => t.id === task.id ? { ...t, subTasks: [...(t.subTasks || []), newSub], isExpanded: true } : t);
                                                      updateTasks(updated);
                                                      inp.value = '';
                                                   }
                                                }}
                                             >+</button>
                                          </div>
                                       )}
                                   </div>
                               )}
                            </div>
                          ))
                        )}
                     </div>
                  )}
               </div>
            </div>
          );
        };

        const FinancialDetailsView = ({ entries, financialState, goToDashboard }) => {
           const [activeTab, setActiveTab] = useState('chart');

           const chartData = useMemo(() => {
             const now = new Date();
             let start = new Date(now.getFullYear(), now.getMonth(), 27);
             let end = new Date(now.getFullYear(), now.getMonth() + 1, 27);
             if (now.getDate() < 27) {
                start = new Date(now.getFullYear(), now.getMonth() - 1, 27);
                end = new Date(now.getFullYear(), now.getMonth(), 27);
             }
             start.setHours(0,0,0,0);
             end.setHours(23,59,59,999);

             const days = [];
             let curr = new Date(start);
             while (curr <= end) {
                const dStr = curr.toISOString().split('T')[0];
                const dayEntry = entries[dStr];
                let exp = 0; let inc = 0;
                if (dayEntry && dayEntry.finance) {
                    inc = parseFloat(dayEntry.finance.income) || 0;
                    if (dayEntry.finance.expenses) {
                       exp = dayEntry.finance.expenses.reduce((acc, currExp) => acc + (parseFloat(currExp.cost) || 0), 0);
                    }
                }
                days.push({
                   name: dStr.split('-').slice(1).join('/'),
                   dateStr: dStr,
                   expense: exp,
                   income: inc,
                   net: inc - exp
                });
                curr.setDate(curr.getDate() + 1);
             }
             return days;
           }, [entries]);

           const totalMonthIncome = chartData.reduce((acc, d) => acc + d.income, 0);
           const totalMonthExpense = chartData.reduce((acc, d) => acc + d.expense, 0);

           const entryList = Object.keys(entries).filter(d => entries[d].finance && (entries[d].finance.income > 0 || (entries[d].finance.expenses && entries[d].finance.expenses.length > 0))).sort((a,b) => new Date(b) - new Date(a)).map(d => ({ date: d, ...entries[d] }));

           return (
              <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-32">
                 <header className="bg-slate-900 text-white p-6 shadow-xl rounded-b-[2.5rem]">
                   <div className="flex justify-between items-center mb-4">
                     <button onClick={goToDashboard} className="p-2 bg-white/10 rounded-full hover:bg-white/20"><ArrowRight className="text-xl" /></button>
                     <h1 className="text-xl font-extrabold flex items-center gap-2"><Activity className="text-green-400" /> التقرير المالي</h1>
                     <div className="w-10"></div>
                   </div>

                   <div className="text-center mt-6 mb-2">
                      <p className="text-white/60 text-xs font-bold uppercase tracking-wider mb-1">الرصيد الكلي المعرف</p>
                      <div className="text-5xl font-black text-white">{financialState?.balance || 0} <span className="text-lg font-bold text-white/50">رس</span></div>
                   </div>

                   <div className="flex gap-2 justify-center mt-8 bg-white/10 p-1 rounded-2xl w-max mx-auto">
                      <button onClick={() => setActiveTab('chart')} className={`py-2 px-6 rounded-xl font-bold text-sm transition ${activeTab === 'chart' ? 'bg-white text-slate-900 shadow-md' : 'text-white/70 hover:text-white'}`}>الرسم البياني</button>
                      <button onClick={() => setActiveTab('daily')} className={`py-2 px-6 rounded-xl font-bold text-sm transition ${activeTab === 'daily' ? 'bg-white text-slate-900 shadow-md' : 'text-white/70 hover:text-white'}`}>سجل العمليات</button>
                   </div>
                 </header>

                 <div className="px-5 mt-8 relative">
                    {activeTab === 'chart' && (
                       <div className="flex flex-col gap-6">
                          <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                             <h3 className="font-black text-gray-800 text-sm mb-4 flex items-center gap-2"><TrendingUp className="text-blue-500 text-base" /> الشهر المالي الحالي (المنصرف الدقيق)</h3>
                             <div className="w-full mt-4 overflow-x-auto scrollbar-hide" dir="ltr">
                                {(() => {
                                   const maxVal = Math.max(1, ...chartData.map(d => Math.max(d.expense, d.income)));
                                   const padding = 40;
                                   const svgWidth = Math.max(500, chartData.length * 28);
                                   const svgHeight = 200;
                                   const usableH = svgHeight - padding * 2;
                                   const usableW = svgWidth - padding * 2;

                                   const getX = (i) => padding + (i / Math.max(1, chartData.length - 1)) * usableW;
                                   const getY = (val) => svgHeight - padding - (val / maxVal) * usableH;

                                   const expPath = chartData.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(d.expense)}`).join(' ');
                                   const incPath = chartData.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(d.income)}`).join(' ');

                                   const yLabels = [0, Math.round(maxVal * 0.5), Math.round(maxVal)];

                                   return (
                                     <svg width={svgWidth} height={svgHeight} className="min-w-full">
                                       {yLabels.map(v => (
                                         <g key={v}>
                                           <line x1={padding} y1={getY(v)} x2={svgWidth - padding} y2={getY(v)} stroke="#f1f5f9" strokeWidth="1" strokeDasharray="4 4" />
                                           <text x={padding - 8} y={getY(v) + 4} fontSize="9" fill="#94a3b8" textAnchor="end" fontWeight="bold">{v}</text>
                                         </g>
                                       ))}
                                       <path d={expPath} fill="none" stroke="#ef4444" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
                                       <path d={incPath} fill="none" stroke="#10b981" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
                                       {chartData.map((d, i) => (
                                         <g key={i} className="group">
                                           <circle cx={getX(i)} cy={getY(d.expense)} r="4" fill="#fff" stroke="#ef4444" strokeWidth="2" />
                                           <circle cx={getX(i)} cy={getY(d.income)} r="4" fill="#fff" stroke="#10b981" strokeWidth="2" />
                                           {i % Math.max(1, Math.floor(chartData.length / 10)) === 0 && (
                                             <text x={getX(i)} y={svgHeight - 8} fontSize="9" fill="#94a3b8" textAnchor="middle" fontWeight="bold">{d.name}</text>
                                           )}
                                         </g>
                                       ))}
                                       <g>
                                         <circle cx={svgWidth - 110} cy={12} r="4" fill="#ef4444" />
                                         <text x={svgWidth - 100} y={16} fontSize="10" fill="#64748b" fontWeight="bold">مصروفات</text>
                                         <circle cx={svgWidth - 50} cy={12} r="4" fill="#10b981" />
                                         <text x={svgWidth - 40} y={16} fontSize="10" fill="#64748b" fontWeight="bold">دخول</text>
                                       </g>
                                     </svg>
                                   );
                                })()}
                             </div>
                             <div className="flex justify-between items-center mt-6 border-t border-gray-100 pt-4" dir="rtl">
                                <div className="text-center">
                                   <div className="text-[10px] text-gray-400 font-bold uppercase mb-1">إجمالي المدخولات</div>
                                   <div className="text-green-500 font-black text-lg">{totalMonthIncome}</div>
                                </div>
                                <div className="text-center">
                                   <div className="text-[10px] text-gray-400 font-bold uppercase mb-1">إجمالي المصروفات</div>
                                   <div className="text-red-500 font-black text-lg">{totalMonthExpense}</div>
                                </div>
                                <div className="text-center">
                                   <div className="text-[10px] text-gray-400 font-bold uppercase mb-1">الصافي</div>
                                   <div className="text-slate-700 font-black text-lg" dir="ltr">{totalMonthIncome - totalMonthExpense}</div>
                                </div>
                             </div>
                          </div>
                       </div>
                    )}

                    {activeTab === 'daily' && (
                       <div className="flex flex-col gap-4">
                          {entryList.length === 0 ? (
                             <div className="text-center p-8 bg-white rounded-3xl border border-gray-100 text-gray-400 font-bold text-sm">لا توجد عمليات مسجلة.</div>
                          ) : (
                             entryList.map(e => (
                                <div key={e.date} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between">
                                   <div className="flex items-center gap-3">
                                      <div className="bg-blue-50 w-12 h-12 rounded-xl flex flex-col items-center justify-center text-blue-600">
                                         <span className="text-[10px] font-bold">{new Date(e.date).toLocaleString('default', { month: 'short' })}</span>
                                         <span className="text-lg font-black leading-none">{new Date(e.date).getDate()}</span>
                                      </div>
                                      <div>
                                         <div className="font-bold text-gray-800 text-sm">عمليات اليوم</div>
                                         <div className="text-xs text-gray-500 font-medium">{e.finance?.expenses?.length || 0} مصروفات مسجلة</div>
                                      </div>
                                   </div>
                                   <div className="text-left font-black text-sm" dir="ltr">
                                      {parseFloat(e.finance?.income) > 0 && <div className="text-green-500">+{e.finance.income}</div>}
                                      {e.finance?.expenses?.reduce((acc, x) => acc + (parseFloat(x.cost) || 0), 0) > 0 && <div className="text-red-500">-{e.finance.expenses.reduce((acc, x) => acc + (parseFloat(x.cost) || 0), 0)}</div>}
                                   </div>
                                </div>
                             ))
                          )}
                       </div>
                    )}
                 </div>
              </div>
           );
        };

        // ==========================================
        function MainApp({ user }) {
          const [entries, setEntries] = useState({});
          const [monthlyTitles, setMonthlyTitles] = useState({});
          const [criteria, setCriteria] = useState(defaultCriteria);
          const [savedInsights, setSavedInsights] = useState(null);
          
          const [globalApiKey, setGlobalApiKey] = useState(null);
          const [isCheckingKey, setIsCheckingKey] = useState(true);
          const [showKeyModal, setShowKeyModal] = useState(false);
          const [inputKey, setInputKey] = useState("");
          
          const [currentView, setCurrentView] = useState('dashboard');
          const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
          const [currentMonth, setCurrentMonth] = useState(new Date());
          const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
          const [isLoadingData, setIsLoadingData] = useState(true);

          // الجداول الجديدة لمهام المخطط لها والوضع المالي
          const [plannedTasks, setPlannedTasks] = useState([]);
          const [financialState, setFinancialState] = useState(null);
          const [isInitFinanceMode, setIsInitFinanceMode] = useState(false);
          const [initBalanceInput, setInitBalanceInput] = useState("");

          useEffect(() => {
            if (!user || !db) return;
            
            let isMounted = true;

            const loadKeyFallback = async () => {
              try {
                const publicDoc = await db.doc(`artifacts/${appIdStr}/public/data/appSettings/globalKey`).get();
                if (publicDoc.exists && publicDoc.data().apiKey) {
                  if(isMounted) { setGlobalApiKey(publicDoc.data().apiKey); setIsCheckingKey(false); }
                  return;
                }
              } catch(e) { }

              try {
                const privateDoc = await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).get();
                if (privateDoc.exists && privateDoc.data().geminiKey) {
                  if(isMounted) { setGlobalApiKey(privateDoc.data().geminiKey); setIsCheckingKey(false); }
                  return;
                }
              } catch(e) { }

              const localKey = localStorage.getItem('geminiApiKey');
              if(isMounted) {
                setGlobalApiKey(localKey || "");
                setIsCheckingKey(false);
              }
            };

            loadKeyFallback();

            const unsubEntries = db.collection(`artifacts/${appIdStr}/users/${user.uid}/entries`).onSnapshot((snapshot) => {
              const loadedEntries = {};
              snapshot.forEach(doc => { loadedEntries[doc.id] = doc.data(); });
              if(isMounted) { setEntries(loadedEntries); setIsLoadingData(false); }
            }, (err) => { console.error("Error loading entries", err); if(isMounted) setIsLoadingData(false); });

            const unsubSettings = db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).onSnapshot((docSnap) => {
              if (docSnap.exists) {
                const data = docSnap.data();
                if (data.criteria && Array.isArray(data.criteria) && data.criteria.length > 0 && isMounted) {
                   let mergedCriteria = data.criteria.map(savedCat => {
                       const defaultCat = defaultCriteria.find(dc => dc.id === savedCat.id);
                       if (defaultCat && (!savedCat.subCriteria || savedCat.subCriteria.length === 0)) {
                           return { ...savedCat, subCriteria: defaultCat.subCriteria };
                       }
                       return savedCat;
                   });
                   setCriteria(mergedCriteria);
                }
                if (data.monthlyTitles && isMounted) setMonthlyTitles(data.monthlyTitles);
                if (data.savedInsights && isMounted) setSavedInsights(data.savedInsights);
              }
            });

            // جلب المهام المخطط لها
            const unsubTasks = db.doc(`artifacts/${appIdStr}/users/${user.uid}/tasks/planned`).onSnapshot((docSnap) => {
              if (docSnap.exists && isMounted) {
                const d = docSnap.data();
                setPlannedTasks(d.items || d.tasks || []);
              }
            });

            // جلب الوضع المالي - يظهر الرصيد الافتتاحي مرة واحدة فقط
            const unsubFinance = db.doc(`artifacts/${appIdStr}/users/${user.uid}/finance/state`).onSnapshot((docSnap) => {
              if (docSnap.exists) {
                 if (isMounted) setFinancialState(docSnap.data());
              } else {
                 // تحقق أن البيانات انتهى تحميلها وأن المستخدم لا يزال مسجلاً دخوله
                 const alreadyShown = localStorage.getItem(`finance_init_shown_${user.uid}`);
                 if (isMounted && !alreadyShown) setIsInitFinanceMode(true);
              }
            });

            return () => { isMounted = false; unsubEntries(); unsubSettings(); unsubTasks(); unsubFinance(); };
          }, [user]);

          const saveDashboardInsightsData = async (filterKey, insightsData, chatHistory, dateString) => {
            const currentSaved = savedInsights || {};
            const newSaved = {
              ...currentSaved,
              [filterKey]: { data: insightsData, chatHistory: chatHistory || [], lastUpdated: dateString }
            };
            setSavedInsights(newSaved);
            try {
              await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ savedInsights: newSaved }, { merge: true });
            } catch(e) { console.error("خطأ في حفظ الإحصائيات", e); }
          };

          const handleSaveGlobalKey = async () => {
            if(!inputKey.trim()) return alert("يرجى إدخال المفتاح أولاً.");
            const keyToSave = inputKey.trim();
            let saved = false;

            try {
              await db.doc(`artifacts/${appIdStr}/public/data/appSettings/globalKey`).set({ apiKey: keyToSave }, { merge: true });
              saved = true;
            } catch(e) { }

            if (!saved) {
               try {
                 await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ geminiKey: keyToSave }, { merge: true });
                 saved = true;
               } catch(e) { }
            }

            localStorage.setItem('geminiApiKey', keyToSave);
            setGlobalApiKey(keyToSave);
            setShowKeyModal(false);
          };

          const updateEntryData = async (date, updatedData) => {
            const newData = { ...entries[date], ...updatedData };
            setEntries(prev => ({ ...prev, [date]: newData }));
            try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/entries/${date}`).set(newData, { merge: true }); } catch(e) {}
          };

          const deleteEntryData = async (date) => {
            const newEntries = { ...entries };
            delete newEntries[date];
            setEntries(newEntries);
            try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/entries/${date}`).delete(); } catch(e) {}
          };

          const saveEntryData = async (date, data) => {
            const oldEntry = entries[date];
            const newEntries = { ...entries, [date]: { ...data, timestamp: Date.now() } };
            setEntries(newEntries);
            setSelectedDate(date);
            setCurrentView('details');

            if (data.completed_planned_tasks_ids && data.completed_planned_tasks_ids.length > 0 && plannedTasks.length > 0) {
                 const newTasksArray = JSON.parse(JSON.stringify(plannedTasks));
                 let hasChanges = false;
                 data.completed_planned_tasks_ids.forEach(id => {
                    const task = newTasksArray.find(t => t.id === id);
                    if (task && !task.completed) { task.completed = true; hasChanges = true; }
                    else {
                        newTasksArray.forEach(t => {
                           if (t.subTasks) {
                               const st = t.subTasks.find(s => s.id === id);
                               if (st && !st.completed) { st.completed = true; hasChanges = true; }
                           }
                        });
                    }
                 });
                 if (hasChanges) {
                    setPlannedTasks(newTasksArray);
                    db.doc(`artifacts/${appIdStr}/users/${user.uid}/tasks/planned`).set({ items: newTasksArray }, { merge: true }).catch(()=>{});
                 }
            }

            if (financialState) {
                  const getNet = (fin) => {
                      if (!fin) return 0;
                      let income = parseFloat(fin.income) || 0;
                      let exp = 0;
                      if (fin.expenses) exp = fin.expenses.reduce((acc, x) => acc + (parseFloat(x.cost) || 0), 0);
                      return income - exp;
                  };
                  const oldNet = getNet(oldEntry?.finance);
                  const newNet = getNet(data.finance);
                  const diff = newNet - oldNet;
                  if (diff !== 0) {
                      const newBalance = (parseFloat(financialState.balance) || 0) + diff;
                      const newFinState = { ...financialState, balance: newBalance };
                      setFinancialState(newFinState);
                      db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/finance`).set(newFinState, { merge: true }).catch(()=>{});
                  }
            }

            try {
              await db.doc(`artifacts/${appIdStr}/users/${user.uid}/entries/${date}`).set({ ...data, timestamp: Date.now() }, { merge: true });

              const dateObj = new Date(date);
              if (!isNaN(dateObj.getTime())) {
                const mKey = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
                const mEntries = Object.keys(newEntries).filter(k => k.startsWith(mKey)).map(k => ({ date: k, ...newEntries[k] }));
                if (mEntries.length > 0 && globalApiKey) { 
                  const text = mEntries.map(e => `- ${e.date}: [${e.averageScore}/10] ${e.title}`).join('\n');
                  generateMonthlyTitleAI(text, globalApiKey).then(async newTitle => {
                    if (newTitle) {
                      const newTitles = { ...monthlyTitles, [mKey]: newTitle };
                      setMonthlyTitles(newTitles);
                      await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ monthlyTitles: newTitles }, { merge: true });
                    }
                  }).catch(()=>{});
                }
              }
            } catch (e) { }
          };

          const saveCriteriaData = async (newCriteria) => {
            setCriteria(newCriteria);
            try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ criteria: newCriteria }, { merge: true }); } catch(e) {}
          };

          if (isLoadingData || isCheckingKey) {
            return <div className="max-w-md mx-auto h-screen bg-slate-50 flex items-center justify-center"><Loader className="text-4xl animate-spin text-blue-500" /></div>;
          }

          const showGlobalKeyModal = globalApiKey === "";

          return (
            <div className="w-full min-h-[100dvh] relative flex flex-col" dir="rtl">
              
              {(showGlobalKeyModal || showKeyModal) && (
                <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[150] flex items-center justify-center p-6">
                  <div className="bg-white rounded-3xl p-6 shadow-2xl w-full max-w-sm flex flex-col gap-4 relative overflow-hidden">
                     <div className="absolute top-0 left-0 right-0 h-2 bg-blue-500"></div>
                     {!showGlobalKeyModal && (
                         <button onClick={() => setShowKeyModal(false)} className="absolute top-4 left-4 p-2 text-gray-400 hover:text-gray-700 bg-gray-50 rounded-full transition-colors">
                           <X className="text-sm" />
                         </button>
                     )}
                     <h2 className="text-xl font-black text-gray-800 flex items-center gap-2 mt-2">
                       <Key className="text-xl text-blue-500" /> المفتاح العام للتطبيق
                     </h2>
                     <p className="text-sm text-gray-600 font-medium leading-relaxed">
                       يرجى إدخال مفتاح الذكاء الاصطناعي (Gemini API Key). سيتم حفظه لمرة واحدة وتخزينه بأمان ليعمل التطبيق بشكل كامل وبدون تنبيهات.
                     </p>
                     <input 
                       type="password" 
                       value={inputKey} 
                       onChange={e => setInputKey(e.target.value)}
                       className="bg-gray-50 border border-gray-200 p-4 rounded-xl text-sm font-mono focus:ring-2 focus:ring-blue-500 outline-none w-full mt-2"
                       placeholder="AIzaSy..."
                       dir="ltr"
                     />
                     <button 
                       onClick={handleSaveGlobalKey}
                       className="bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-lg mt-2"
                     >
                       <span>حفظ وتأكيد</span>
                     </button>
                  </div>
                </div>
              )}

              {isInitFinanceMode && !showGlobalKeyModal && !showKeyModal && (
                <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[140] flex items-center justify-center p-6">
                  <div className="bg-white rounded-3xl p-6 shadow-2xl w-full max-w-sm flex flex-col gap-4 relative overflow-hidden">
                     <div className="absolute top-0 left-0 right-0 h-2 bg-green-500"></div>
                     <h2 className="text-xl font-black text-gray-800 flex items-center gap-2 mt-2">
                       <Activity className="text-xl text-green-500" /> إعداد الرصيد المالي
                     </h2>
                     <p className="text-sm text-gray-600 font-medium leading-relaxed">
                       قم بإدخال رصيدك المالي الحالي لتبدأ تتبع نفقاتك ومدخولاتك عبر الذكاء الاصطناعي، أو اتركه فارغاً وسيبدأ من صفر.
                     </p>
                     <input 
                       type="number" 
                       value={initBalanceInput} 
                       onChange={e => setInitBalanceInput(e.target.value)}
                       className="bg-gray-50 border border-gray-200 p-4 rounded-xl text-sm font-bold focus:ring-2 focus:ring-green-500 outline-none w-full mt-2"
                       placeholder="مثال: 5000"
                       dir="ltr"
                     />
                     <button 
                       onClick={async () => {
                          const initialVal = parseFloat(initBalanceInput) || 0;
                          const initialState = { balance: initialVal, createdAt: Date.now() };
                          setFinancialState(initialState);
                          setIsInitFinanceMode(false);
                          localStorage.setItem('finance_init_shown_' + user.uid, '1');
                          try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/finance/state`).set(initialState); } catch(e){}
                       }}
                       className="bg-green-600 text-white font-bold py-3.5 rounded-xl hover:bg-green-700 transition flex items-center justify-center gap-2 shadow-lg mt-2"
                     >
                       <span>حفظ الرصيد والبدء</span>
                     </button>
                  </div>
                </div>
              )}

              {currentView === 'dashboard' && <DashboardView entries={entries} criteria={criteria} globalApiKey={globalApiKey} openKeyModal={() => setShowKeyModal(true)} goToCalendar={() => {setCurrentMonth(new Date()); setCurrentView('calendar');}} goToYear={() => {setCurrentYear(new Date().getFullYear()); setCurrentView('year');}} goToSettings={() => setCurrentView('settings')} savedInsights={savedInsights} saveDashboardInsightsData={saveDashboardInsightsData} plannedTasks={plannedTasks} financialState={financialState} goToPlannedTasks={() => setCurrentView('plannedTasks')} goToFinancialDetails={() => setCurrentView('financialDetails')} />}
              {currentView === 'settings' && <SettingsView criteria={criteria} saveCriteria={saveCriteriaData} goToDashboard={() => setCurrentView('dashboard')} />}
              {currentView === 'calendar' && <CalendarView entries={entries} criteria={criteria} monthlyTitles={monthlyTitles} currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} goToDashboard={() => setCurrentView('dashboard')} goToForm={(d) => {setSelectedDate(d); setCurrentView('form');}} goToDetails={(d) => {setSelectedDate(d); setCurrentView('details');}} />}
              {currentView === 'year' && <YearView entries={entries} criteria={criteria} monthlyTitles={monthlyTitles} currentYear={currentYear} setCurrentYear={setCurrentYear} goToDashboard={() => setCurrentView('dashboard')} setCurrentMonth={setCurrentMonth} setCurrentView={setCurrentView} />}
              {currentView === 'form' && <EntryFormView selectedDate={selectedDate} setSelectedDate={setSelectedDate} entries={entries} criteria={criteria} saveEntry={saveEntryData} globalApiKey={globalApiKey} openKeyModal={() => setShowKeyModal(true)} goToSettings={() => setCurrentView('settings')} goToCalendar={() => setCurrentView('calendar')} goToDetails={(d) => {setSelectedDate(d); setCurrentView('details');}} plannedTasks={plannedTasks} />}
              {currentView === 'details' && <EntryDetailsView selectedDate={selectedDate} entries={entries} criteria={criteria} updateEntryData={updateEntryData} deleteEntry={deleteEntryData} saveCriteria={saveCriteriaData} globalApiKey={globalApiKey} openKeyModal={() => setShowKeyModal(true)} goToSettings={() => setCurrentView('settings')} goToDashboard={() => setCurrentView('dashboard')} goToCalendar={() => setCurrentView('calendar')} goToForm={(d) => {setSelectedDate(d); setCurrentView('form');}} />}
              {currentView === 'plannedTasks' && <PlannedTasksView tasks={plannedTasks} globalApiKey={globalApiKey} updateTasks={async (tasks) => { setPlannedTasks(tasks); try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/tasks/planned`).set({tasks}); } catch(e){} }} goToDashboard={() => setCurrentView('dashboard')} />}
              {currentView === 'financialDetails' && <FinancialDetailsView entries={entries} financialState={financialState} goToDashboard={() => setCurrentView('dashboard')} />}

              {currentView === 'dashboard' && (
                <div className="fixed bottom-8 left-0 right-0 flex justify-center pointer-events-none z-[100]">
                  <button onClick={() => {
                    const todayStr = new Date().toISOString().split('T')[0];
                    setSelectedDate(todayStr);
                    if (entries[todayStr]) setCurrentView('details'); else setCurrentView('form');    
                  }} className="pointer-events-auto flex items-center gap-2 bg-blue-600 text-white px-8 py-4 rounded-full shadow-2xl shadow-blue-500/50 hover:bg-blue-700 transition-transform transform hover:-translate-y-1 active:scale-95">
                    <Plus className="text-xl" /> <span className="font-bold text-lg tracking-wide">إدخال اليوم</span>
                  </button>
                </div>
              )}
            </div>
          );
        }

        function App() {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);

          useEffect(() => {
            if (!auth) {
              setAuthLoading(false);
              return;
            }
            const unsubscribe = auth.onAuthStateChanged((u) => {
              setUser(u);
              setAuthLoading(false);
            });
            return () => unsubscribe();
          }, []);

          return (
            <ErrorBoundary>
              <div id="app-root-wrapper" className="w-full h-full min-h-[100dvh]">
                {authLoading && (
                  <div key="loading" className="w-full h-[100dvh] bg-slate-50 flex items-center justify-center">
                    <Loader className="text-4xl animate-spin text-blue-500" />
                  </div>
                )}
                {!authLoading && user && (
                  <div key="main-app" className="w-full h-[100dvh] bg-slate-100 shadow-2xl font-sans relative flex flex-col overflow-hidden mx-auto" dir="rtl">
                    <MainApp user={user} />
                  </div>
                )}
                {!authLoading && !user && (
                  <div key="auth-view" className="w-full h-[100dvh]">
                    <AuthView />
                  </div>
                )}
              </div>
            </ErrorBoundary>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
