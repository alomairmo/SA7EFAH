                          <option value="40days" className="text-gray-800">40 يوم</option>
                          <option value="month" className="text-gray-800">الشهر</option>
                          <option value="year" className="text-gray-800">السنة</option>
                          <option value="all" className="text-gray-800">الكل</option>
                        </select>
                        <button onClick={goToSettings} className="p-2 bg-white/10 border border-white/20 rounded-xl hover:bg-white/20 transition relative">
                          <Settings className="text-lg text-white" />
                        </button>
                      </div>
                    </div>
                    
                    {filteredEntries.length === 0 ? (
                      <div className="text-center py-6"><p className="text-white/70 font-medium">لا توجد بيانات مسجلة.</p></div>
                    ) : (
                      <div className="flex flex-col gap-6">
                        <div className="flex justify-between items-center">
                          <div className="flex-1 pr-2">
                            <p className="text-white/60 text-xs font-bold uppercase mb-1">اللقب العام</p>
                            <h2 className="text-2xl font-black text-white leading-tight">
                              {!globalApiKey ? "جاري الإعداد..." : (insights?.overallTitle || (isGeneratingInsights ? <><Loader className="text-xl animate-spin inline" /> <span>مُنجز</span></> : "مُنجز"))}
                            </h2>
                          </div>
                          <div className="text-center bg-white/10 p-3 rounded-2xl border border-white/10 min-w-[80px]">
                            <p className="text-white/60 text-[10px] font-bold uppercase mb-1">المتوسط</p>
                            <div className="text-3xl font-black text-green-400">{stats.avg}</div>
                          </div>
                        </div>
                        
                        {/* المهام المنجزة */}
                        <div className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4">
                          <div className="p-3 bg-blue-500/20 rounded-xl"><ListTodo className="text-xl text-blue-300" /></div>
                          <div><div className="text-3xl font-black text-white">{stats.totalTasks}</div><div className="text-xs text-white/60 font-bold uppercase">مهمة وعمل منجز</div></div>
                        </div>

                        {/* المهام المخطط لها */}
                        <button onClick={goToPlannedTasks} className="bg-amber-500/10 border border-amber-500/20 rounded-2xl p-4 flex items-center gap-4 hover:bg-amber-500/20 transition text-right w-full">
                          <div className="p-3 bg-amber-500/20 rounded-xl"><ListChecks className="text-xl text-amber-400" /></div>
                          <div className="flex-1">
                              <div className="text-xl font-black text-white">{plannedTasksStats.mainCount} <span className="text-sm font-bold text-white/60">رئيسية</span> - {plannedTasksStats.subCount} <span className="text-sm font-bold text-white/60">جانبية</span></div>
                              <div className="text-xs text-amber-200/80 font-bold uppercase mt-0.5">المهام المخطط لها (اضغط للإدارة)</div>
                          </div>
                        </button>

                        {/* المربع المالي */}
                        <div className="bg-green-500/10 border border-green-500/20 rounded-2xl p-4 flex items-center justify-between">
                           <button onClick={goToFinance} className="flex items-center gap-4 flex-1 text-right hover:opacity-80 transition">
                               <div className="p-3 bg-green-500/20 rounded-xl"><Wallet className="text-xl text-green-400" /></div>
                               <div>
                                  <div className="text-2xl font-black text-white tracking-wider font-mono">
                                     {isBalanceHidden ? '••••••' : (finances?.balance || 0)} <span className="text-xs font-bold text-white/60">SAR</span>
                                  </div>
                                  <div className="text-xs text-green-200/80 font-bold uppercase mt-0.5">الرصيد المالي الحالي (اضغط للتفاصيل)</div>
                               </div>
                           </button>
                           <button onClick={() => setIsBalanceHidden(!isBalanceHidden)} className="p-3 text-white/50 hover:text-white transition bg-white/5 rounded-xl ml-2 shrink-0">
                               {isBalanceHidden ? <EyeOff className="text-lg" /> : <Eye className="text-lg" />}
                           </button>
                        </div>
                      </div>
                    )}
                  </header>
              </div>

              <div className="px-5 mt-6 flex flex-col gap-6 relative z-10 md:grid md:grid-cols-2 md:gap-6 lg:grid-cols-1">
                <div className="grid grid-cols-2 gap-3 col-span-full">
                  <button onClick={goToCalendar} className="bg-blue-100 p-4 rounded-2xl shadow-sm border border-blue-200 flex flex-col items-center gap-2 hover:bg-blue-200 active:scale-95 transition">
                    <CalendarDays className="text-3xl text-blue-600" /><span className="font-bold text-blue-900 text-sm">التقويم الشهري</span>
                  </button>
                  <button onClick={goToYear} className="bg-purple-100 p-4 rounded-2xl shadow-sm border border-purple-200 flex flex-col items-center gap-2 hover:bg-purple-200 active:scale-95 transition">
                    <Calendar className="text-3xl text-purple-600" /><span className="font-bold text-purple-900 text-sm">التقويم السنوي</span>
                  </button>
                </div>

                {!globalApiKey && (
                   <div className="bg-amber-50 p-4 rounded-2xl flex items-center justify-between border border-amber-200 col-span-full">
                      <div className="flex items-center gap-3 text-amber-800">
                         <AlertCircle className="text-xl" />
                         <span className="text-sm font-bold">مفتاح الذكاء الاصطناعي مفقود!</span>
                      </div>
                      <button onClick={openKeyModal} className="px-4 py-2 bg-amber-600 text-white text-xs font-bold rounded-xl shadow-md hover:bg-amber-700 transition">إدخال المفتاح</button>
                   </div>
                )}

                {filteredEntries.length > 0 && globalApiKey && (
                  <button onClick={handleGenerateInsights} disabled={isGeneratingInsights} className="w-full bg-gradient-to-l from-yellow-400 to-amber-500 hover:from-yellow-500 hover:to-amber-600 text-white rounded-[2rem] p-5 shadow-lg shadow-amber-500/30 flex flex-col items-center justify-center transition-all transform active:scale-95 disabled:opacity-70 border-2 border-yellow-300 relative overflow-hidden col-span-full">
                    <div className="absolute inset-0 bg-white/20 opacity-0 hover:opacity-100 transition-opacity"></div>
                    {isGeneratingInsights ? (
                      <div className="flex items-center gap-3 relative z-10">
                         <Loader className="text-2xl animate-spin"/>
                         <span className="font-black text-xl">يتم بناء الخطة...</span>
                      </div>
                    ) : (
                      <>
                        <div className="flex items-center gap-2 mb-1 relative z-10">
                           <Sparkles className="text-2xl" />
                           <span className="font-black text-xl">القيام بتحليل شامل</span>
                        </div>
                        <span className="text-xs font-bold text-yellow-100 bg-black/10 px-3 py-1 rounded-full mt-1 relative z-10">
                          {currentSaved?.lastUpdated ? `التحليل الأخير: ${currentSaved.lastUpdated}` : 'لم يتم إجراء تحليل لهذه الفترة'}
                        </span>
                      </>
                    )}
                  </button>
                )}

                {filteredEntries.length > 0 && (
                  <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 col-span-full">
                    <h3 className="text-gray-800 font-black text-lg mb-6 flex items-center gap-2"><Activity className="text-lg text-blue-500" /> التحليل العام</h3>
                    <div className="flex flex-col gap-8 md:grid md:grid-cols-2 lg:grid-cols-3">
                      {criteria.map(cat => {
                        const IconComp = IconMap[cat.icon] || Star;
                        const score = stats.criteriaScores[cat.id] || "0.0";
                        return (
                          <div key={cat.id} className="relative bg-gray-50 p-4 rounded-3xl border border-gray-100">
                            <div className="flex items-center gap-3 mb-2">
                              <div className={`w-10 h-10 flex items-center justify-center rounded-xl shadow-md ${cat.colorObj.main}`}><IconComp className="text-base text-white" /></div>
                              <div className="flex-1 flex justify-between items-end">
                                <span className="font-bold text-gray-700">{cat.label}</span>
                                <span className={`font-black text-lg text-gray-900`}>{score}/10</span>
                              </div>
                            </div>
                            <div className="h-3 bg-gray-200 rounded-full overflow-hidden mb-3">
                              <div className={`h-full ${cat.colorObj.main} rounded-full transition-all duration-1000`} style={{ width: `${(parseFloat(score) / 10) * 100}%` }}></div>
                            </div>

                            {/* الفروع مع أشرطة الصحة */}
                            {cat.subCriteria && cat.subCriteria.length > 0 && (
                                <div className="flex flex-col gap-4 pr-4 border-r-2 border-gray-200 mt-4 mb-4">
                                    {cat.subCriteria.map(sub => {
                                        const subScore = stats.criteriaScores[sub.id] || "0.0";
                                        return (
                                            <div key={sub.id} className="flex flex-col gap-1.5">
                                                <div className="flex justify-between items-center text-sm">
                                                    <span className="font-bold text-gray-700 flex items-center gap-2">
                                                      <span className="w-2 h-2 rounded-full bg-gray-400"></span>{sub.label}
                                                    </span>
                                                    <span className="font-black text-gray-500">{subScore}/10</span>
                                                </div>
                                                <div className="h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                                  <div className={`h-full ${cat.colorObj.main} opacity-70 rounded-full transition-all`} style={{ width: `${(parseFloat(subScore) / 10) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}

                            {insights && (
                                <div className="bg-white p-4 rounded-2xl text-sm leading-relaxed text-gray-600 font-medium border border-gray-100 mt-2">
                                   {insights[`advice_${cat.id}`]}
                                </div>
                            )}
                          </div>
                        )
                      })}
                    </div>
                  </div>
                )}

                {/* التحليل الشامل والمحادثة */}
                {insights && (
                  <div className="bg-slate-900 p-6 rounded-3xl shadow-xl mt-4 text-white relative overflow-hidden col-span-full" ref={insightsRef}>
                     <div className="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                     <h3 className="text-xl font-black mb-6 flex items-center gap-2">
                       <Brain className="text-blue-400 text-2xl"/> <span>التحليل الشامل لشخصيتك</span>
                     </h3>
                     
                     <div className="flex flex-col gap-6 md:grid md:grid-cols-2">
                         {insights.general_description && (
                           <div className="col-span-full bg-white/5 p-4 rounded-2xl border border-white/10">
                               <h4 className="text-blue-400 font-bold mb-2 flex items-center gap-2 text-sm"><User className="text-sm"/> الوصف العام لسلوكك</h4>
                               <p className="text-sm text-gray-300 font-medium leading-relaxed">{insights.general_description}</p>
                           </div>
                         )}

                         {insights.general_positives && insights.general_positives.length > 0 && (
                           <div className="bg-white/5 p-4 rounded-2xl border border-white/10">
                               <h4 className="text-green-400 font-bold mb-2 flex items-center gap-2 text-sm"><CheckCircle2 className="text-sm"/> نقاط القوة والإيجابيات</h4>
                               <ul className="list-disc list-inside space-y-2 text-sm text-gray-300 font-medium leading-relaxed">
                                  {insights.general_positives.map((p, i) => <li key={i}>{p}</li>)}
                               </ul>
                           </div>
                         )}
                         
                         {insights.general_negatives && insights.general_negatives.length > 0 && (
                           <div className="bg-white/5 p-4 rounded-2xl border border-white/10">
                               <h4 className="text-rose-400 font-bold mb-2 flex items-center gap-2 text-sm"><AlertCircle className="text-sm"/> السلبيات ومجالات القصور</h4>
                               <ul className="list-disc list-inside space-y-2 text-sm text-gray-300 font-medium leading-relaxed">
                                  {insights.general_negatives.map((p, i) => <li key={i}>{p}</li>)}
                               </ul>
                           </div>
                         )}

                         {insights.general_trends && (
                           <div className="col-span-full bg-white/5 p-4 rounded-2xl border border-white/10">
                               <h4 className="text-sky-400 font-bold mb-2 flex items-center gap-2 text-sm"><TrendingUp className="text-sm"/> التطور والتراجع</h4>
                               <p className="text-sm text-gray-300 font-medium leading-relaxed">{insights.general_trends}</p>
                           </div>
                         )}

                         {insights.general_suggestions && (
                           <div className="col-span-full bg-white/5 p-4 rounded-2xl border border-white/10">
                               <h4 className="text-amber-400 font-bold mb-2 flex items-center gap-2 text-sm"><Lightbulb className="text-sm"/> خطة العمل والتحسين</h4>
                               <p className="text-sm text-gray-300 font-medium leading-relaxed">{insights.general_suggestions}</p>
                           </div>
                         )}
                     </div>

                     <div className="bg-slate-800 rounded-2xl shadow-inner border border-slate-700 flex flex-col overflow-hidden mt-8">
                       <div className="bg-slate-900 p-3 flex items-center gap-3 border-b border-slate-700">
                         <MessageSquare className="text-lg text-blue-400" />
                         <h4 className="text-white font-bold text-xs">مدربك الشخصي (مناقشة التحليل)</h4>
                       </div>
                       
                       <div className="p-4 min-h-[120px] max-h-[250px] overflow-y-auto flex flex-col gap-3">
                         {(!dashboardChatHistory || dashboardChatHistory.length === 0) && (
                           <div className="text-center text-slate-400 font-medium text-xs my-auto leading-relaxed">
                             هل ترى نقصاً في الوصف العام؟<br/>أو هل تحتاج نصائح مخصصة أكثر لخطتك؟ تحدث معي!
                           </div>
                         )}
                         {dashboardChatHistory.map((msg, idx) => (
                           <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                             <div className={`max-w-[90%] p-3 rounded-2xl text-xs font-medium leading-relaxed ${msg.sender === 'user' ? 'bg-blue-600 text-white rounded-tl-sm' : 'bg-slate-700 border border-slate-600 text-slate-200 rounded-tr-sm'}`}>
                               {msg.text}
                             </div>
                           </div>
                         ))}
                         {isDashboardChatting && (
                           <div className="flex justify-start">
                             <div className="bg-slate-700 border border-slate-600 text-slate-400 p-2.5 rounded-2xl rounded-tr-sm flex items-center gap-2 text-xs">
                               <Loader className="text-xs animate-spin" /> جاري التحليل والرد...
                             </div>
                           </div>
                         )}
                         <div ref={dashboardChatEndRef} />
                       </div>

                       <div className="p-2.5 bg-slate-800 border-t border-slate-700 flex gap-2">
                         <input 
                           type="text" value={dashboardChatInput} onChange={e => setDashboardChatInput(e.target.value)}
                           onKeyDown={e => e.key === 'Enter' && handleDashboardChatSendMessage()}
                           placeholder="ناقش أو اطلب نصيحة مخصصة..."
                           disabled={!globalApiKey || isDashboardChatting}
                           className="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 font-medium disabled:opacity-50"
                         />
                         <button onClick={handleDashboardChatSendMessage} disabled={isDashboardChatting || !dashboardChatInput.trim() || !globalApiKey} className="bg-blue-600 text-white p-2 rounded-xl disabled:opacity-50 hover:bg-blue-700 transition shrink-0">
                           <Send className="text-base" />
                         </button>
                       </div>
                     </div>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const EntryFormView = ({ selectedDate, setSelectedDate, entries, criteria, saveEntry, goToCalendar, goToDetails, globalApiKey, plannedTasks, finances }) => {
          const [transcript, setTranscript] = useState("");
          const [isRecording, setIsRecording] = useState(false);
          const [recordingTime, setRecordingTime] = useState(0);
          const [audioData, setAudioData] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [error, setError] = useState(null);
          
          const mediaRecorderRef = useRef(null);
          const timerRef = useRef(null);
          const recognitionRef = useRef(null);

          useEffect(() => {
            setTranscript(""); setAudioData(null); setError(null);
            return () => {
              if (timerRef.current) clearInterval(timerRef.current);
              if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
            };
          }, [selectedDate]);

          useEffect(() => {
            try {
              const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              if (SpeechRecognition) {
                recognitionRef.current = new SpeechRecognition();
                recognitionRef.current.continuous = true;
                recognitionRef.current.interimResults = true;
                recognitionRef.current.lang = 'ar-SA';
                recognitionRef.current.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    if (final) setTranscript(prev => prev + final);
                };
                recognitionRef.current.onerror = () => setIsRecording(false);
                recognitionRef.current.onend = () => setIsRecording(false);
              }
            } catch (e) { }
            return () => { if (recognitionRef.current) recognitionRef.current.stop(); };
          }, []);

          const toggleRecording = async () => {
            if (!recognitionRef.current) return setError("المتصفح لا يدعم التسجيل المباشر. استخدم الكتابة.");
            if (isRecording) {
              if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
              if (recognitionRef.current) recognitionRef.current.stop();
              clearInterval(timerRef.current);
              setIsRecording(false);
            } else { 
              try { 
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                mediaRecorderRef.current = mediaRecorder;
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                  stream.getTracks().forEach(t => t.stop());
                  let mimeType = mediaRecorder.mimeType.split(';')[0];
                  if (!mimeType) mimeType = 'audio/webm';
                  const blob = new Blob(chunks, { type: mimeType });
                  const reader = new FileReader();
                  reader.readAsDataURL(blob);
                  reader.onloadend = () => {
                    setAudioData({ base64: reader.result.split(',')[1], mimeType: mimeType });
                  };
                };

                setAudioData(null); setRecordingTime(0);
                mediaRecorder.start(); setIsRecording(true); setError(null);
                timerRef.current = setInterval(() => setRecordingTime(prev => prev + 1), 1000);
              } catch(e) { 
                setIsRecording(false); setError("لا يمكن الوصول للميكروفون.");
              } 
            }
          };

          const handleAnalyze = async () => {
            if (!globalApiKey || globalApiKey.trim() === "") return setError("مفتاح الذكاء الاصطناعي مفقود.");
            if (!transcript.trim() && !audioData) return setError("الرجاء إدخال نص أو تسجيل مقطع صوتي.");

            setIsAnalyzing(true); setError(null);
            try {
              const dObj = new Date(selectedDate);
              const recentKeys = Object.keys(entries).filter(k => new Date(k) < dObj).sort((a,b) => new Date(b) - new Date(a)).slice(0, 5);
              const recentEntries = recentKeys.map(k => ({ date: k, ...entries[k] }));
              
              const existingText = entries[selectedDate]?.text || "";
              const combinedTextForAI = existingText ? `[الأحداث السابقة]:\n${existingText}\n\n[إضافات جديدة]:\n${transcript}` : transcript;

              const aiResult = await analyzeJournalWithAI(combinedTextForAI, audioData, recentEntries, criteria, plannedTasks, finances?.learnedPrices, globalApiKey);
              
              let scoresObj = {}, detailsObj = {};
              criteria.forEach(c => {
                 if(c.subCriteria && c.subCriteria.length > 0) {
                     c.subCriteria.forEach(sub => {
                         scoresObj[sub.id] = parseInt(aiResult?.[`score_${sub.id}`]) || 0;
                         detailsObj[sub.id] = aiResult?.[`detail_${sub.id}`] || "";
                     });
                 } else {
                     scoresObj[c.id] = parseInt(aiResult?.[`score_${c.id}`]) || 0;
                     detailsObj[c.id] = aiResult?.[`detail_${c.id}`] || "";
                 }
              });
              
              const newAudioTranscript = audioData ? (aiResult.transcript || "") : "";
              let finalSavedText = existingText;
              if (transcript.trim() || newAudioTranscript.trim()) {
                 const addition = `${transcript} ${newAudioTranscript}`.trim();
                 finalSavedText = existingText ? `${existingText}\n\n[إضافة]: ${addition}` : addition;
              }

              const newFinances = {
                 transactions: Array.isArray(aiResult.financial_transactions) ? aiResult.financial_transactions.map(tx => ({...tx, id: `tx_${Date.now()}_${Math.random()}`})) : []
              };

              await saveEntry(selectedDate, {
                text: finalSavedText, 
                scores: scoresObj, 
                categoryDetails: detailsObj, 
                tasks: Array.isArray(aiResult?.tasks) ? aiResult.tasks : [],
                linkedTaskIds: aiResult?.completedPlannedTaskIds || [],
                finances: newFinances,
                title: aiResult?.title || "يومياتي", 
                comparison: aiResult?.comparison || "لا تتوفر مقارنة حالياً.", 
                tips: aiResult?.tips || "استمر بانتظام.",
                averageScore: calculateOverallAverage(scoresObj, criteria), 
                chatHistory: entries[selectedDate]?.chatHistory || [] 
              });
            } catch (err) { setError(err.message || "حدث خطأ غير متوقع."); } finally { setIsAnalyzing(false); }
          };

          const isExpired = entries?.[selectedDate] && (Date.now() - (entries[selectedDate].timestamp || Date.now())) > (24 * 60 * 60 * 1000);
          if (isExpired) {
            return (
              <div className="flex-1 flex flex-col items-center justify-center bg-slate-50 p-6 text-center h-full">
                <Lock className="text-6xl text-gray-400 mb-4 mx-auto" />
                <h2 className="text-xl font-bold text-gray-800 mb-6">انتهى وقت التعديل</h2>
                <button onClick={() => goToDetails(selectedDate)} className="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-blue-500/30">عرض اليوميات</button>
              </div>
            );
          }

          const formatTime = (sec) => `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative flex flex-col pb-10">
              <header className="bg-white p-4 shadow-sm flex items-center justify-between border-b border-gray-100 shrink-0 md:px-8">
                <button onClick={goToCalendar} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ArrowRight className="text-lg" /></button>
                <div className="flex flex-col items-center bg-gray-50 px-4 py-1.5 rounded-xl border border-gray-200">
                   <label className="text-[10px] font-bold text-gray-400 uppercase">تاريخ اليوميات</label>
                   <input type="date" value={selectedDate} onChange={(e) => { setSelectedDate(e.target.value); if(entries[e.target.value]) goToDetails(e.target.value); }} className="bg-transparent text-sm border-none outline-none font-black text-blue-600 cursor-pointer" />
                </div>
                <div className="w-9"></div>
              </header>

              <div className="p-6 flex-1 flex flex-col gap-4 md:max-w-2xl md:mx-auto md:w-full">
                <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex-1 flex flex-col items-center relative min-h-[300px]">
                  {entries[selectedDate] && <div className="absolute top-4 w-[90%] bg-blue-50 text-blue-700 py-2 px-3 rounded-xl text-xs font-bold text-center border border-blue-100 z-20">أنت تضيف لليوم المسجل</div>}
                  {isRecording && <div className="absolute top-1/3 flex items-center justify-center pointer-events-none opacity-20"><div className="w-40 h-40 bg-red-500 rounded-full animate-ping absolute"></div></div>}
                  
                  <button onClick={toggleRecording} className={`relative z-10 w-24 h-24 rounded-full flex items-center justify-center transition-all duration-500 shadow-xl shrink-0 mt-8 ${isRecording ? 'bg-red-500 text-white scale-110' : 'bg-slate-900 text-white hover:bg-slate-800 hover:scale-105'}`}>
                    {isRecording ? <MicOff className="text-4xl" /> : <Mic className="text-4xl" />}
                  </button>
                  <p className="mt-4 text-gray-400 font-bold text-sm z-10 shrink-0">{isRecording ? `جاري التسجيل... (${formatTime(recordingTime)})` : 'تحدث أو اكتب أحداث اليوم (بما فيها مصاريفك)'}</p>

                  {audioData && !isRecording && (
                    <div className="mt-4 w-full bg-blue-50 border border-blue-100 p-4 rounded-2xl flex items-center justify-between">
                      <div className="flex items-center gap-3"><PlayCircle className="text-3xl text-blue-500" /><div><p className="text-sm font-bold text-blue-900">مقطع صوتي جاهز</p><p className="text-xs text-blue-600">سيتم تفريغه أوتوماتيكياً</p></div></div>
                      <button onClick={() => setAudioData(null)} className="p-2 text-red-500 hover:bg-red-100 rounded-xl transition"><Trash className="text-lg"/></button>
                    </div>
                  )}

                  <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)} placeholder="مثال: ذهبت للعمل وأنهيت التقرير، ثم اشتريت قهوة بـ 15 ومشتريات للمنزل..." className="mt-6 w-full flex-1 bg-slate-50 rounded-2xl p-5 text-gray-700 resize-none border-none focus:ring-2 focus:ring-blue-100 z-10 text-base leading-relaxed font-medium shadow-inner" />
                </div>
                
                {error && (
                  <div className="bg-red-50 p-4 rounded-2xl flex flex-col gap-2 shrink-0 border border-red-100">
                    <div className="flex items-start gap-3">
                      <AlertCircle className="text-lg text-red-500 shrink-0 mt-0.5" />
                      <div><p className="text-red-700 text-sm font-bold mb-1">تنبيه</p><p className="text-red-600 text-xs font-medium leading-relaxed">{error}</p></div>
                    </div>
                  </div>
                )}
                
                <button onClick={handleAnalyze} disabled={isAnalyzing || (!transcript.trim() && !audioData)} className="bg-blue-600 text-white w-full py-5 rounded-2xl font-black text-lg flex justify-center gap-2 shadow-xl shadow-blue-500/50 disabled:opacity-50 hover:bg-blue-700 shrink-0 mt-2">
                  {isAnalyzing ? <><Loader className="text-xl animate-spin" /> <span>جاري التحليل والإضافة...</span></> : (error && globalApiKey ? <><RefreshCw className="text-lg"/> <span>إعادة المحاولة</span></> : <span>حفظ وتحليل</span>)}
                </button>
              </div>
            </div>
          );
        };

        const EntryDetailsView = ({ selectedDate, entries, criteria, saveCriteria, goToCalendar, goToForm, updateEntryData, deleteEntry, globalApiKey }) => {
          const entry = entries?.[selectedDate];
          const [chatInput, setChatInput] = useState("");
          const [isChatting, setIsChatting] = useState(false);
          const [isDeletingTasks, setIsDeletingTasks] = useState(false);
          const [isReanalyzing, setIsReanalyzing] = useState(false);
          const [tempTasks, setTempTasks] = useState([]); 
          const chatEndRef = useRef(null);
          const topRef = useRef(null);
          const prevChatLength = useRef(entry?.chatHistory?.length || 0);

          useEffect(() => { topRef.current?.scrollIntoView({ behavior: 'instant' }); }, [selectedDate]);
          useEffect(() => { 
            if (entry?.chatHistory && entry.chatHistory.length > prevChatLength.current) chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); 
            prevChatLength.current = entry?.chatHistory?.length || 0;
          }, [entry?.chatHistory]);

          if (!entry) return <div className="p-6 text-center mt-20 font-bold">لا يوجد سجل متاح</div>;

          const { scores = {}, categoryDetails = {}, tasks = [], linkedTaskIds = [], finances, title = "بدون لقب", averageScore = "0.0", chatHistory = [], comparison = "", tips = "" } = entry;
          const safeTasks = Array.isArray(tasks) ? tasks : []; 
          const displayTasks = isDeletingTasks ? tempTasks : safeTasks; 

          // حساب ملخص مالي لليوم
          const dailyFinanceStats = useMemo(() => {
              if(!finances || !finances.transactions) return { income: 0, expense: 0, net: 0 };
              let inc = 0, exp = 0;
              finances.transactions.forEach(tx => {
                  if(tx.type === 'income') inc += tx.amount;
                  else exp += tx.amount;
              });
              return { income: inc, expense: exp, net: inc - exp };
          }, [finances]);

          const handleSendMessage = async () => {
            if (!chatInput.trim()) return;
            if (!globalApiKey) return alert("المفتاح العام غير متوفر.");
            
            const userMsg = chatInput;
            setChatInput("");
            
            const updatedHistory = [...(chatHistory || []), { sender: 'user', text: userMsg }];
            updateEntryData(selectedDate, { chatHistory: updatedHistory });
            
            setIsChatting(true);
            try {
              const aiResponse = await chatWithJournalAI(entry, updatedHistory, userMsg, criteria, globalApiKey);
              const finalHistory = [...updatedHistory, { sender: 'ai', text: aiResponse.reply || "تم التحديث بنجاح." }];
              
              let newScores = { ...scores };
              criteria.forEach(c => { 
                 if(c.subCriteria) {
                    c.subCriteria.forEach(sub => { if (aiResponse[`score_${sub.id}`] !== undefined) newScores[sub.id] = aiResponse[`score_${sub.id}`]; });
                 } else {
                    if (aiResponse[`score_${c.id}`] !== undefined) newScores[c.id] = aiResponse[`score_${c.id}`]; 
                 }
              });

              let updates = {
                chatHistory: finalHistory, scores: newScores,
                title: aiResponse.title || title, averageScore: calculateOverallAverage(newScores, criteria)
              };

              if (aiResponse.tasks) updates.tasks = aiResponse.tasks;
              if (aiResponse.updated_finances) updates.finances = { ...finances, transactions: aiResponse.updated_finances };

              updateEntryData(selectedDate, updates);

              if (aiResponse.learned_rule && aiResponse.learned_rule.target_id) {
                 const targetId = aiResponse.learned_rule.target_id;
                 const ruleText = aiResponse.learned_rule.rule_text;
                 let updatedCriteria = criteria.map(c => {
                    if (c.id === targetId) return { ...c, desc: (c.desc ? c.desc + "\n" : "") + "ملاحظة هامة: " + ruleText };
                    if (c.subCriteria) return { ...c, subCriteria: c.subCriteria.map(sub => sub.id === targetId ? { ...sub, desc: (sub.desc ? sub.desc + "\n" : "") + "ملاحظة هامة: " + ruleText } : sub) };
                    return c;
                 });
                 saveCriteria(updatedCriteria);
              }

              // إذا تعلم الذكاء سعراً جديداً، نقوم بحفظه في إعدادات التطبيق لكي يستخدمه مستقبلاً
              if (aiResponse.learned_price && aiResponse.learned_price.item_name) {
                  // This requires updating global finances state, but since we are in a sub-component, we should ideally lift it up.
                  // For simplicity in this massive file, we trigger a custom event or let the root listen, or just pass a callback.
                  // We'll dispatch a custom event to root to update learnedPrices
                  window.dispatchEvent(new CustomEvent('updateLearnedPrice', { detail: aiResponse.learned_price }));
              }

            } catch (err) {
              updateEntryData(selectedDate, { chatHistory: [...updatedHistory, { sender: 'ai', text: "عذراً، حدث خطأ في الاتصال." }] });
            } finally { setIsChatting(false); }
          };

          const startEditingTasks = () => { setTempTasks([...safeTasks]); setIsDeletingTasks(true); };
          
          const confirmTaskChanges = async () => { 
            if (tempTasks.length === 0) {
                if(window.confirm("حذف جميع المهام سيؤدي إلى مسح اليوم بالكامل. هل أنت متأكد؟")) {
                    deleteEntry(selectedDate);
                    goToCalendar();
                }
                return;
            }
            if (tempTasks.length < safeTasks.length) {
               setIsReanalyzing(true);
               try {
                  const hiddenMsg = `تحديث نظام: قام المستخدم بحذف بعض المهام. المهام المتبقية هي: [${tempTasks.join('، ')}]. أعد تقييم يومه واضبط الدرجات بناءً على هذه المهام المتبقية فقط.`;
                  const aiResponse = await chatWithJournalAI(entry, chatHistory, hiddenMsg, criteria, globalApiKey);
                  let newScores = { ...scores };
                  criteria.forEach(c => { 
                     if(c.subCriteria) c.subCriteria.forEach(sub => { if (aiResponse[`score_${sub.id}`] !== undefined) newScores[sub.id] = aiResponse[`score_${sub.id}`]; });
                     else if (aiResponse[`score_${c.id}`] !== undefined) newScores[c.id] = aiResponse[`score_${c.id}`]; 
                  });
                  updateEntryData(selectedDate, { tasks: tempTasks, scores: newScores, averageScore: calculateOverallAverage(newScores, criteria) });
               } catch(e) { updateEntryData(selectedDate, { tasks: tempTasks }); } 
               finally { setIsReanalyzing(false); setIsDeletingTasks(false); }
            } else {
               updateEntryData(selectedDate, { tasks: tempTasks }); setIsDeletingTasks(false);
            }
          };

          const cancelTaskChanges = () => { setIsDeletingTasks(false); setTempTasks([]); };
          const removeTempTask = (indexToRemove) => { setTempTasks(tempTasks.filter((_, i) => i !== indexToRemove)); };
          const removeAllTempTasks = () => { setTempTasks([]); };

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-10">
              <div ref={topRef} />
              <header className={`${getColorClass(averageScore)} p-6 pt-8 rounded-b-[3rem] shadow-xl text-center relative z-20 md:px-8 lg:px-12`}>
                <div className="flex justify-between mb-4">
                   <button onClick={goToCalendar} className="p-2 bg-black/10 rounded-full hover:bg-black/20 text-white transition"><ArrowRight className="text-xl" /></button>
                   <div className="flex gap-2">
                     <button onClick={() => goToForm(selectedDate)} className="p-2 bg-black/10 rounded-full hover:bg-black/20 text-white transition" title="إضافة لليوم">
                       <Plus className="text-xl" />
                     </button>
                   </div>
                </div>
                <div className="text-white/80 text-sm font-bold tracking-widest mb-2">{selectedDate}</div>
                <h2 className="text-2xl font-black text-white mb-4 leading-tight text-wrap break-words px-2">"{title}"</h2>
                <div className="inline-flex items-center justify-center bg-white/20 px-6 py-2 rounded-full text-white font-black text-xl backdrop-blur-md shadow-inner">{averageScore} / 10</div>
              </header>

              <div className="px-4 -mt-6 z-10 flex flex-col gap-6 relative md:max-w-2xl md:mx-auto md:w-full lg:max-w-4xl lg:grid lg:grid-cols-2 lg:items-start">
                
                {/* قسم إدارة المهام */}
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 pt-10 lg:col-span-1">
                  <div className="flex justify-between items-center mb-4">
                     <div className="flex items-center gap-3">
                       <h3 className="text-gray-800 font-black text-lg flex items-center gap-2"><CheckCircle2 className="text-xl text-blue-500"/> الإنجازات اليومية</h3>
                       {!isDeletingTasks ? (
                         <button onClick={startEditingTasks} className="p-1.5 bg-red-50 text-red-500 hover:bg-red-100 rounded-lg transition-colors" title="تعديل المهام">
                           <Trash2 className="text-sm" />
                         </button>
                       ) : (
                         <div className="flex items-center gap-1.5">
                           <button onClick={confirmTaskChanges} disabled={isReanalyzing} className="p-1.5 bg-green-100 text-green-700 hover:bg-green-200 rounded-lg transition-colors">
                             {isReanalyzing ? <Loader className="text-sm animate-spin" /> : <Check className="text-sm" />}
                           </button>
                           <button onClick={cancelTaskChanges} disabled={isReanalyzing} className="p-1.5 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-lg transition-colors"><X className="text-sm" /></button>
                           <button onClick={removeAllTempTasks} disabled={isReanalyzing} className="px-2 py-1.5 bg-red-100 text-red-600 text-xs font-bold rounded-lg hover:bg-red-200 transition-colors">حذف الكل</button>
                         </div>
                       )}
                     </div>
                     <div className="bg-blue-50 text-blue-600 font-black px-3 py-1 rounded-lg text-sm">{displayTasks.length} مهام</div>
                  </div>
                  
                  {isReanalyzing && <div className="text-center text-sm font-bold text-blue-600 mb-4 animate-pulse">جاري إعادة تقييم اليوم...</div>}

                  {displayTasks.length > 0 ? (
                    <ul className="space-y-3">
                      {displayTasks.map((task, idx) => (
                        <li key={idx} className="flex items-start gap-3 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                          {isDeletingTasks ? (
                             <button onClick={() => removeTempTask(idx)} className="w-6 h-6 bg-red-100 text-red-600 rounded-full flex items-center justify-center shrink-0 hover:bg-red-200 transition-colors"><X className="text-xs" /></button>
                          ) : (
                             <span className="w-6 h-6 bg-white rounded-full flex items-center justify-center text-xs font-bold text-gray-400 shrink-0 border border-gray-200">{idx+1}</span>
                          )}
                          <span className="text-gray-700 font-medium text-sm pt-0.5 leading-relaxed">{task}</span>
                        </li>
                      ))}
                    </ul>
                  ) : <p className="text-gray-400 text-sm">لم يتم تسجيل مهام.</p>}
                  
                  {linkedTaskIds && linkedTaskIds.length > 0 && (
                     <div className="mt-4 p-3 bg-amber-50 rounded-xl border border-amber-100 flex items-center gap-2">
                        <LinkIcon className="w-4 h-4 text-amber-500" />
                        <span className="text-xs font-bold text-amber-700">تم شطب {linkedTaskIds.length} مهام من خطتك العامة.</span>
                     </div>
                  )}
                </div>

                {/* التقرير المالي */}
                {(finances?.transactions?.length > 0 || dailyFinanceStats.expense > 0 || dailyFinanceStats.income > 0) && (
                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 lg:col-span-1">
                      <h3 className="text-gray-800 font-black text-lg mb-4 flex items-center gap-2"><DollarSign className="text-xl text-green-500" /> التقرير المالي اليومي</h3>
                      
                      <div className="flex gap-2 mb-4">
                         <div className="flex-1 bg-green-50 rounded-2xl p-3 border border-green-100 text-center">
                            <p className="text-xs font-bold text-green-600 mb-1">المدخول</p>
                            <p className="text-lg font-black text-green-500">+{dailyFinanceStats.income}</p>
                         </div>
                         <div className="flex-1 bg-rose-50 rounded-2xl p-3 border border-rose-100 text-center">
                            <p className="text-xs font-bold text-rose-600 mb-1">المصروف</p>
                            <p className="text-lg font-black text-rose-500">-{dailyFinanceStats.expense}</p>
                         </div>
                      </div>

                      <div className="flex justify-between items-center bg-slate-800 text-white p-4 rounded-2xl shadow-inner mb-4">
                         <span className="font-bold text-sm">صافي اليوم</span>
                         <span className={`text-xl font-black ${dailyFinanceStats.net >= 0 ? 'text-green-400' : 'text-rose-400'}`} dir="ltr">
                             {dailyFinanceStats.net > 0 ? '+' : ''}{dailyFinanceStats.net} SAR
                         </span>
                      </div>

                      {finances.transactions.length > 0 && (
                          <div className="flex flex-col gap-2 border-t border-gray-100 pt-4">
                              <p className="text-xs font-bold text-gray-400 mb-1">تفاصيل العمليات:</p>
                              {finances.transactions.map((tx, idx) => (
                                  <div key={idx} className="flex justify-between items-center text-sm p-2 bg-gray-50 rounded-xl border border-gray-100">
                                      <div className="flex items-center gap-2">
                                          <div className={`w-2 h-2 rounded-full ${tx.type === 'expense' ? 'bg-rose-400' : 'bg-green-400'}`}></div>
                                          <span className="font-bold text-gray-700">{tx.desc}</span>
                                          {tx.isEstimated && <span className="text-[9px] bg-amber-100 text-amber-700 px-1 rounded font-bold">تقديري 🤖</span>}
                                      </div>
                                      <span className={`font-black ${tx.type === 'expense' ? 'text-rose-500' : 'text-green-500'}`}>
                                          {tx.type === 'expense' ? '-' : '+'}{tx.amount}
                                      </span>
                                  </div>
                              ))}
                          </div>
                      )}
                    </div>
                )}

                {/* التحليل التفصيلي */}
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 lg:col-span-1">
                  <h3 className="text-gray-800 font-black text-lg mb-5 flex items-center gap-2"><Activity className="text-xl text-blue-500" /> التحليل التفصيلي</h3>
                  <div className="flex flex-col gap-6">
                    {criteria.map(cat => {
                      const IconComp = IconMap[cat.icon] || Star;
                      const catScore = getCategoryScore(scores, cat).toFixed(1);
                      const hasSubScores = cat.subCriteria && cat.subCriteria.some(sub => scores[sub.id] !== undefined && !isNaN(scores[sub.id]));

                      return (
                        <div key={cat.id} className="relative bg-gray-50 p-4 rounded-3xl border border-gray-100">
                          <div className="flex items-center gap-3 mb-2">
                            <div className={`w-10 h-10 flex items-center justify-center rounded-xl shadow-md ${cat.colorObj.main}`}><IconComp className="text-base text-white" /></div>
                            <div className="flex-1 flex justify-between items-end"><span className="font-bold text-gray-800">{cat.label}</span><span className={`font-black text-lg text-gray-900`}>{catScore}/10</span></div>
                          </div>
                          
                          {hasSubScores ? (
                              <div className="flex flex-col gap-4 pr-4 border-r-2 border-gray-200 mt-4 mb-2">
                                  {cat.subCriteria.map(sub => {
                                      if(scores[sub.id] === undefined || isNaN(scores[sub.id])) return null;
                                      const subScore = scores[sub.id];
                                      const detail = categoryDetails[sub.id] || "لا يوجد تحليل مفصل.";
                                      return (
                                          <div key={sub.id} className="flex flex-col gap-1.5">
                                              <div className="flex justify-between items-center text-sm">
                                                  <span className="font-bold text-gray-700 flex items-center gap-2">
                                                    <span className="w-2 h-2 rounded-full bg-gray-400"></span>{sub.label}
                                                  </span>
                                                  <span className="font-black text-gray-500">{subScore}/10</span>
                                              </div>
                                              <div className="h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                                <div className={`h-full ${cat.colorObj.main} opacity-75 rounded-full transition-all`} style={{ width: `${(subScore / 10) * 100}%` }}></div>
                                              </div>
                                              <div className="text-xs text-gray-500 font-medium leading-relaxed pr-3 mt-1">{detail}</div>
                                          </div>
                                      )
                                  })}
                              </div>
                          ) : (
                              <div className="mt-3">
                                  <div className="h-2.5 bg-gray-200 rounded-full overflow-hidden mb-2">
                                    <div className={`h-full ${cat.colorObj.main} rounded-full transition-all`} style={{ width: `${(catScore / 10) * 100}%` }}></div>
                                  </div>
                                  <div className={`${cat.colorObj.light} p-3 rounded-xl text-sm leading-relaxed text-gray-700 font-medium border border-white`}>{categoryDetails[cat.id] || "لا يوجد تحليل."}</div>
                              </div>
                          )}
                        </div>
                      )
                    })}
                  </div>
                </div>

                <div className="flex flex-col gap-4 lg:col-span-1">
                  {comparison && (
                    <div className="bg-blue-50 p-5 rounded-3xl border border-blue-100 shadow-sm">
                      <h3 className="text-blue-800 font-black text-sm mb-2 flex items-center gap-2"><TrendingUp className="text-sm"/> مقارنة وتطور</h3>
                      <p className="text-blue-700 text-sm leading-relaxed font-medium">{comparison}</p>
                    </div>
                  )}
                  {tips && (
                    <div className="bg-amber-50 p-5 rounded-3xl border border-amber-100 shadow-sm">
                      <h3 className="text-amber-800 font-black text-sm mb-2 flex items-center gap-2"><Lightbulb className="text-sm"/> اقتراحات للتحسين</h3>
                      <p className="text-amber-700 text-sm leading-relaxed font-medium">{tips}</p>
                    </div>
                  )}
                </div>

                <div className="bg-white rounded-3xl shadow-sm border border-gray-100 flex flex-col overflow-hidden lg:col-span-full">
                  <div className="bg-slate-900 p-4 flex justify-between items-center gap-3">
                    <div className="flex items-center gap-3">
                        <MessageSquare className="text-xl text-blue-400" />
                        <h3 className="text-white font-bold text-sm">الدردشة وتعديل التقييم</h3>
                    </div>
                  </div>
                  
                  <div className="p-4 bg-slate-50 min-h-[150px] max-h-[300px] overflow-y-auto flex flex-col gap-3">
                    {(!chatHistory || chatHistory.length === 0) && (
                      <div className="text-center text-gray-400 font-medium text-xs my-auto">
                        هل أخطأ الذكاء الاصطناعي في تقدير سعر منتج؟ أو تقييم جانب؟<br/>أخبرني ليتم التعديل وحفظ القاعدة المالية أو التقييمية!
                      </div>
                    )}
                    {chatHistory && chatHistory.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[85%] p-3 rounded-2xl text-sm font-medium leading-relaxed ${msg.sender === 'user' ? 'bg-blue-600 text-white rounded-tl-sm' : 'bg-white border border-gray-200 text-gray-800 rounded-tr-sm shadow-sm'}`}>
                          {msg.text}
                        </div>
                      </div>
                    ))}
                    {isChatting && (
                      <div className="flex justify-start">
                        <div className="bg-white border border-gray-200 text-gray-500 p-3 rounded-2xl rounded-tr-sm shadow-sm flex items-center gap-2 text-sm">
                          <Loader className="text-sm animate-spin" /> جاري التفكير والتعلم...
                        </div>
                      </div>
                    )}
                    <div ref={chatEndRef} />
                  </div>

                  <div className="p-3 bg-white border-t border-gray-100 flex gap-2">
                    <input 
                      type="text" value={chatInput} onChange={e => setChatInput(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && handleSendMessage()}
                      placeholder="مثال: سعر الغداء كان 50 وليس 30"
                      disabled={!globalApiKey}
                      className="flex-1 bg-gray-100 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium disabled:opacity-50"
                    />
                    <button onClick={handleSendMessage} disabled={isChatting || !chatInput.trim() || !globalApiKey} className="bg-blue-600 text-white p-2.5 rounded-xl disabled:opacity-50 hover:bg-blue-700 transition">
                      <Send className="text-lg" />
                    </button>
                  </div>
                </div>

              </div>
            </div>
          );
        };

        // ==========================================
        // 8. المكون الرئيسي الشامل (Root App)
        // ==========================================
        function MainApp({ user }) {
          const [entries, setEntries] = useState({});
          const [monthlyTitles, setMonthlyTitles] = useState({});
          const [criteria, setCriteria] = useState(defaultCriteria);
          const [savedInsights, setSavedInsights] = useState(null);
          
          // State for Planned Tasks & Finances
          const [plannedTasks, setPlannedTasks] = useState([]);
          const [finances, setFinances] = useState({ balance: 0, learnedPrices: {} });
          
          const [globalApiKey, setGlobalApiKey] = useState(null);
          const [isCheckingKey, setIsCheckingKey] = useState(true);
          const [showKeyModal, setShowKeyModal] = useState(false);
          const [inputKey, setInputKey] = useState("");
          
          const [currentView, setCurrentView] = useState('dashboard');
          const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
          const [currentMonth, setCurrentMonth] = useState(new Date());
          const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
          const [isLoadingData, setIsLoadingData] = useState(true);

          // الاستماع للأحداث المخصصة من الدردشة لتحديث الأسعار المتعلمة
          useEffect(() => {
              const handleLearnedPrice = async (e) => {
                  const detail = e.detail;
                  if(detail && detail.item_name) {
                      const newLearned = { ...finances.learnedPrices, [detail.item_name]: detail.price };
                      const newFinances = { ...finances, learnedPrices: newLearned };
                      setFinances(newFinances);
                      try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ finances: newFinances }, { merge: true }); } catch(err){}
                  }
              };
              window.addEventListener('updateLearnedPrice', handleLearnedPrice);
              return () => window.removeEventListener('updateLearnedPrice', handleLearnedPrice);
          }, [finances, user]);

          // حساب الرصيد المالي ديناميكياً
          useEffect(() => {
             let totalBalance = 0;
             Object.values(entries).forEach(e => {
                 if (e.finances?.transactions) {
                     e.finances.transactions.forEach(tx => {
                         if (tx.type === 'income') totalBalance += tx.amount;
                         else totalBalance -= tx.amount;
                     });
                 }
             });
             setFinances(prev => ({ ...prev, balance: totalBalance }));
          }, [entries]);

          useEffect(() => {
            if (!user || !db) return;
            let isMounted = true;

            const loadKeyFallback = async () => {
              try {
                const publicDoc = await db.doc(`artifacts/${appIdStr}/public/data/appSettings/globalKey`).get();
                if (publicDoc.exists && publicDoc.data().apiKey) {
                  if(isMounted) { setGlobalApiKey(publicDoc.data().apiKey); setIsCheckingKey(false); } return;
                }
              } catch(e) { }
              try {
                const privateDoc = await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).get();
                if (privateDoc.exists && privateDoc.data().geminiKey) {
                  if(isMounted) { setGlobalApiKey(privateDoc.data().geminiKey); setIsCheckingKey(false); } return;
                }
              } catch(e) { }
              const localKey = localStorage.getItem('geminiApiKey');
              if(isMounted) { setGlobalApiKey(localKey || ""); setIsCheckingKey(false); }
            };

            loadKeyFallback();

            const unsubEntries = db.collection(`artifacts/${appIdStr}/users/${user.uid}/entries`).onSnapshot((snapshot) => {
              const loadedEntries = {};
              snapshot.forEach(doc => { loadedEntries[doc.id] = doc.data(); });
              if(isMounted) { setEntries(loadedEntries); setIsLoadingData(false); }
            }, (err) => { if(isMounted) setIsLoadingData(false); });

            const unsubSettings = db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).onSnapshot((docSnap) => {
              if (docSnap.exists) {
                const data = docSnap.data();
                if (data.criteria && Array.isArray(data.criteria) && data.criteria.length > 0 && isMounted) {
                   let mergedCriteria = data.criteria.map(savedCat => {
                       const defaultCat = defaultCriteria.find(dc => dc.id === savedCat.id);
                       if (defaultCat && (!savedCat.subCriteria || savedCat.subCriteria.length === 0)) return { ...savedCat, subCriteria: defaultCat.subCriteria };
                       return savedCat;
                   });
                   setCriteria(mergedCriteria);
                }
                if (data.monthlyTitles && isMounted) setMonthlyTitles(data.monthlyTitles);
                if (data.savedInsights && isMounted) setSavedInsights(data.savedInsights);
                if (data.plannedTasks && isMounted) setPlannedTasks(data.plannedTasks);
                if (data.finances && isMounted) setFinances(prev => ({...prev, learnedPrices: data.finances.learnedPrices || {}}));
              }
            });

            return () => { isMounted = false; unsubEntries(); unsubSettings(); };
          }, [user]);

          // ... (دوال الحفظ saveGlobalKey, updateEntryData, saveCriteria, savePlannedTasks)
          const handleSaveGlobalKey = async () => {
            if(!inputKey.trim()) return alert("يرجى إدخال المفتاح أولاً.");
            const keyToSave = inputKey.trim();
            let saved = false;
            try { await db.doc(`artifacts/${appIdStr}/public/data/appSettings/globalKey`).set({ apiKey: keyToSave }, { merge: true }); saved = true; } catch(e) { }
            if (!saved) { try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ geminiKey: keyToSave }, { merge: true }); } catch(e) { } }
            localStorage.setItem('geminiApiKey', keyToSave);
            setGlobalApiKey(keyToSave); setShowKeyModal(false);
          };

          const updateEntryData = async (date, updatedData) => {
            const newData = { ...entries[date], ...updatedData };
            setEntries(prev => ({ ...prev, [date]: newData }));
            try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/entries/${date}`).set(newData, { merge: true }); } catch(e) {}
            
            // إذا تم تحديث المهام المنجزة المربوطة من داخل اليوميات يجب تحديث الخطة الرئيسية أيضاً
            if (updatedData.linkedTaskIds) {
                const markTreeComplete = (tasks, ids) => tasks.map(t => {
                    const isNowCompleted = t.isCompleted || ids.includes(t.id);
                    if (t.children) return { ...t, isCompleted: isNowCompleted, children: markTreeComplete(t.children, ids) };
                    return { ...t, isCompleted: isNowCompleted };
                });
                savePlannedTasksData(markTreeComplete(plannedTasks, updatedData.linkedTaskIds));
            }
          };

          const deleteEntryData = async (date) => {
            const newEntries = { ...entries }; delete newEntries[date]; setEntries(newEntries);
            try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/entries/${date}`).delete(); } catch(e) {}
          };

          const saveEntryData = async (date, data) => {
            const newEntries = { ...entries, [date]: { ...data, timestamp: Date.now() } };
            setEntries(newEntries); setSelectedDate(date); setCurrentView('details');
            try {
              await db.doc(`artifacts/${appIdStr}/users/${user.uid}/entries/${date}`).set({ ...data, timestamp: Date.now() }, { merge: true });
              if(data.linkedTaskIds && data.linkedTaskIds.length > 0) {
                 const markTreeComplete = (tasks, ids) => tasks.map(t => {
                    const isNowCompleted = t.isCompleted || ids.includes(t.id);
                    if (t.children) return { ...t, isCompleted: isNowCompleted, children: markTreeComplete(t.children, ids) };
                    return { ...t, isCompleted: isNowCompleted };
                 });
                 savePlannedTasksData(markTreeComplete(plannedTasks, data.linkedTaskIds));
              }
              const dateObj = new Date(date);
              if (!isNaN(dateObj.getTime())) {
                const mKey = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
                const mEntries = Object.keys(newEntries).filter(k => k.startsWith(mKey)).map(k => ({ date: k, ...newEntries[k] }));
                if (mEntries.length > 0 && globalApiKey) { 
                  const text = mEntries.map(e => `- ${e.date}: [${e.averageScore}/10] ${e.title}`).join('\n');
                  generateMonthlyTitleAI(text, globalApiKey).then(async newTitle => {
                    if (newTitle) {
                      const newTitles = { ...monthlyTitles, [mKey]: newTitle }; setMonthlyTitles(newTitles);
                      await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ monthlyTitles: newTitles }, { merge: true });
                    }
                  }).catch(()=>{});
                }
              }
            } catch (e) { }
          };

          const saveCriteriaData = async (newCriteria) => {
            setCriteria(newCriteria);
            try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ criteria: newCriteria }, { merge: true }); } catch(e) {}
          };

          const savePlannedTasksData = async (newTasks) => {
            setPlannedTasks(newTasks);
            try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ plannedTasks: newTasks }, { merge: true }); } catch(e) {}
          };

          const saveDashboardInsightsData = async (filterKey, insightsData, chatHistory, dateString) => {
            const currentSaved = savedInsights || {};
            const newSaved = { ...currentSaved, [filterKey]: { data: insightsData, chatHistory: chatHistory || [], lastUpdated: dateString } };
            setSavedInsights(newSaved);
            try { await db.doc(`artifacts/${appIdStr}/users/${user.uid}/settings/userSettings`).set({ savedInsights: newSaved }, { merge: true }); } catch(e) {}
          };

          if (isLoadingData || isCheckingKey) return <div className="max-w-md mx-auto h-screen bg-slate-50 flex items-center justify-center"><Loader className="text-4xl animate-spin text-blue-500" /></div>;

          return (
            <div className="w-full min-h-[100dvh] relative flex flex-col md:max-w-5xl md:mx-auto md:shadow-2xl bg-white" dir="rtl">
              
              {(globalApiKey === "" || showKeyModal) && (
                <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
                  <div className="bg-white rounded-3xl p-6 shadow-2xl w-full max-w-sm flex flex-col gap-4 relative overflow-hidden">
                     <div className="absolute top-0 left-0 right-0 h-2 bg-blue-500"></div>
                     {globalApiKey !== "" && <button onClick={() => setShowKeyModal(false)} className="absolute top-4 left-4 p-2 text-gray-400 hover:text-gray-700 bg-gray-50 rounded-full transition-colors"><X className="text-sm" /></button>}
                     <h2 className="text-xl font-black text-gray-800 flex items-center gap-2 mt-2"><Key className="text-xl text-blue-500" /> المفتاح العام</h2>
                     <p className="text-sm text-gray-600 font-medium leading-relaxed">أدخل مفتاح Gemini API. سيتم حفظه بأمان ليعمل النظام كلياً.</p>
                     <input type="password" value={inputKey} onChange={e => setInputKey(e.target.value)} className="bg-gray-50 border border-gray-200 p-4 rounded-xl text-sm font-mono focus:ring-2 focus:ring-blue-500 outline-none w-full mt-2" placeholder="AIzaSy..." dir="ltr" />
                     <button onClick={handleSaveGlobalKey} className="bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2">حفظ وتأكيد</button>
                  </div>
                </div>
              )}

              {currentView === 'dashboard' && <DashboardView entries={entries} criteria={criteria} globalApiKey={globalApiKey} openKeyModal={() => setShowKeyModal(true)} goToCalendar={() => goToCalendar()} goToYear={() => goToYear()} goToSettings={() => setCurrentView('settings')} savedInsights={savedInsights} saveDashboardInsightsData={saveDashboardInsightsData} plannedTasks={plannedTasks} goToPlannedTasks={() => setCurrentView('planned_tasks')} finances={finances} goToFinance={() => setCurrentView('finance')} />}
              {currentView === 'settings' && <SettingsView criteria={criteria} saveCriteria={saveCriteriaData} goToDashboard={goToDashboard} />}
              {currentView === 'calendar' && <CalendarView entries={entries} criteria={criteria} monthlyTitles={monthlyTitles} currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} goToDashboard={goToDashboard} goToForm={goToForm} goToDetails={goToDetails} />}
              {currentView === 'year' && <YearView entries={entries} criteria={criteria} monthlyTitles={monthlyTitles} currentYear={currentYear} setCurrentYear={setCurrentYear} goToDashboard={goToDashboard} setCurrentMonth={setCurrentMonth} setCurrentView={setCurrentView} />}
              {currentView === 'form' && <EntryFormView selectedDate={selectedDate} setSelectedDate={setSelectedDate} entries={entries} criteria={criteria} saveEntry={saveEntryData} globalApiKey={globalApiKey} openKeyModal={() => setShowKeyModal(true)} goToSettings={() => setCurrentView('settings')} goToCalendar={goToCalendar} goToDetails={goToDetails} plannedTasks={plannedTasks} finances={finances} />}
              {currentView === 'details' && <EntryDetailsView selectedDate={selectedDate} entries={entries} criteria={criteria} updateEntryData={updateEntryData} deleteEntry={deleteEntryData} saveCriteria={saveCriteriaData} globalApiKey={globalApiKey} openKeyModal={() => setShowKeyModal(true)} goToSettings={() => setCurrentView('settings')} goToDashboard={goToDashboard} goToCalendar={goToCalendar} goToForm={goToForm} />}
              {currentView === 'planned_tasks' && <PlannedTasksView plannedTasks={plannedTasks} setPlannedTasks={savePlannedTasksData} goToDashboard={goToDashboard} globalApiKey={globalApiKey} />}
              {currentView === 'finance' && <FinanceView entries={entries} finances={finances} setFinances={setFinances} goToDashboard={goToDashboard} />}

              <FloatingActionButton />
            </div>
          );
        }

        function App() {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);

          useEffect(() => {
            if (!auth) { setAuthLoading(false); return; }
            const unsubscribe = auth.onAuthStateChanged((u) => { setUser(u); setAuthLoading(false); });
            return () => unsubscribe();
          }, []);

          return (
            <ErrorBoundary>
              <div id="app-root-wrapper" className="w-full h-full min-h-screen bg-slate-200 md:py-6">
                {authLoading ? (
                  <div className="max-w-md mx-auto h-screen bg-slate-50 flex items-center justify-center"><Loader className="text-4xl animate-spin text-blue-500" /></div>
                ) : user ? (
                  <MainApp user={user} />
                ) : (
                  <div className="max-w-md mx-auto h-screen bg-slate-100 shadow-2xl overflow-hidden font-sans relative" dir="rtl"><AuthView /></div>
                )}
              </div>
            </ErrorBoundary>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
