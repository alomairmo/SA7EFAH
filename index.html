        const myFirebaseConfig = {

        let app = null, auth = null, db = null;

        const appIdStr = (isPreviewEnv && typeof __app_id !== 'undefined') ? __app_id : 'smart-journal-sa7efah';

        // ==========================================
        // 3. نظام الحماية من الانهيار (Error Boundary)
        // ==========================================
        class ErrorBoundary extends Component {
          constructor(props) { super(props); this.state = { hasError: false, errorMsg: '' }; }
          static getDerivedStateFromError(error) { return { hasError: true, errorMsg: error.toString() }; }
          componentDidCatch(error, errorInfo) { console.error("App crashed:", error, errorInfo); }
          render() {
            if (this.state.hasError) {
              return (
                <div className="flex flex-col items-center justify-center h-screen bg-slate-900 p-6 text-center" dir="rtl">
                  <AlertCircle className="text-6xl text-red-500 mb-4" />
                  <h1 className="text-2xl font-bold text-red-500 mb-2">عذراً، حدث خطأ في النظام</h1>
                  <p className="text-gray-400 mb-6 text-sm max-w-sm" dir="ltr">{this.state.errorMsg}</p>
                  <button onClick={() => window.location.reload()} className="px-6 py-3 font-bold bg-red-600 text-white rounded-xl shadow-lg hover:bg-red-700">إعادة تحميل التطبيق</button>
                </div>
              );
            }
            return this.props.children;
          }
        }

        // ==========================================
        // 4. استكشاف الذكاء الاصطناعي و الأدوات
        // ==========================================
        const getValidGeminiModel = async (apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          if (window.discoveredModelCache) return window.discoveredModelCache;
          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error.message);
            if (data.models && data.models.length > 0) {
              const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent"));
              let selected = validModels.find(m => m.name === 'models/gemini-1.5-flash') ||
                             validModels.find(m => m.name.includes("flash")) ||
                             validModels.find(m => m.name.includes("pro")) || validModels[0];
              if (selected) {
                window.discoveredModelCache = selected.name.replace('models/', '');
                return window.discoveredModelCache;
              }
            }
            throw new Error("المفتاح لا يدعم توليد النصوص.");
          } catch(e) { 
            if (e.message === "API_KEY_MISSING") throw e;
            return "gemini-1.5-flash"; 
          }
        };

        const IconMap = { Brain, Star, Heart, Users, Briefcase, Activity, Book, Coffee, Music, Sun, Moon, Zap, Shield, Target, Smile, Compass, Feather, Flame };
        const availableColors = [
          { main: 'bg-purple-500', light: 'bg-purple-50', text: 'text-purple-600' }, { main: 'bg-sky-500', light: 'bg-sky-50', text: 'text-sky-600' },
          { main: 'bg-rose-500', light: 'bg-rose-50', text: 'text-rose-600' }, { main: 'bg-orange-500', light: 'bg-orange-50', text: 'text-orange-600' },
          { main: 'bg-emerald-500', light: 'bg-emerald-50', text: 'text-emerald-600' }, { main: 'bg-indigo-500', light: 'bg-indigo-50', text: 'text-indigo-600' },
          { main: 'bg-amber-500', light: 'bg-amber-50', text: 'text-amber-600' }, { main: 'bg-teal-500', light: 'bg-teal-50', text: 'text-teal-600' },
          { main: 'bg-pink-500', light: 'bg-pink-50', text: 'text-pink-600' },
        ];
        
        const defaultCriteria = [
          { id: 'mental', label: 'عقلية وعلمية', icon: 'Brain', desc: '', colorObj: availableColors[0], subCriteria: [{id: 'ment_read', label: 'القراءة والتعلم', desc: ''}, {id: 'ment_focus', label: 'التركيز والإنتاجية', desc: ''}] },
          { id: 'spiritual', label: 'روحية', icon: 'Star', desc: '', colorObj: availableColors[1], subCriteria: [{id: 'spir_pray', label: 'الصلوات والعبادات', desc: ''}, {id: 'spir_quran', label: 'القرآن والأذكار', desc: ''}] },
          { id: 'physical', label: 'جسدية', icon: 'Heart', desc: '', colorObj: availableColors[2], subCriteria: [{id: 'phys_sport', label: 'الرياضة والحركة', desc: ''}, {id: 'phys_food', label: 'التغذية الصحية', desc: ''}, {id: 'phys_sleep', label: 'النوم والراحة', desc: ''}] },
          { id: 'social', label: 'اجتماعية', icon: 'Users', desc: '', colorObj: availableColors[3], subCriteria: [{id: 'soc_family', label: 'العائلة والوالدين', desc: ''}, {id: 'soc_friends', label: 'الأصدقاء والعلاقات', desc: ''}] },
          { id: 'career', label: 'وظيفية ومالية', icon: 'Briefcase', desc: '', colorObj: availableColors[4], subCriteria: [{id: 'car_work', label: 'إنجاز العمل', desc: ''}, {id: 'car_money', label: 'الإدارة المالية', desc: ''}] },
        ];

        const getCategoryScore = (entryScores, category) => {
            if (!entryScores) return 0;
            if (category.subCriteria && category.subCriteria.length > 0) {
               let sum = 0, count = 0;
               category.subCriteria.forEach(sub => {
                   if (entryScores[sub.id] !== undefined && !isNaN(entryScores[sub.id])) { sum += Number(entryScores[sub.id]); count++; }
               });
               if (count > 0) return sum / count;
            }
            return Number(entryScores[category.id]) || 0;
        };

        const calculateOverallAverage = (scores, criteria) => {
            if (!scores || !criteria || criteria.length === 0) return "0.0";
            let totalSum = 0; let totalCount = 0;
            criteria.forEach(c => { totalSum += getCategoryScore(scores, c); totalCount++; });
            return totalCount > 0 ? (totalSum / totalCount).toFixed(1) : "0.0";
        };

        const cleanJSONString = (str) => {
          if (!str) return "";
          try {
            let cleaned = str.replace(/```json/gi, '').replace(/```/g, '').trim();
            cleaned = cleaned.replace(/,\s*([\]}])/g, '$1'); 
            return cleaned;
          } catch (e) { return ""; }
        };

        const fetchWithRetry = async (url, payload, retries = 3) => {
          let lastError = null;
          for (let attempt = 1; attempt <= retries; attempt++) {
            try {
              const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              const data = await response.json();
              if (!response.ok) {
                  if(data.error?.message?.includes("Quota") || response.status === 429) { throw new Error("تجاوزت حد الطلبات المجانية. يرجى الانتظار لمدة دقيقة والمحاولة مجدداً."); }
                  throw new Error(data.error?.message || `خطأ اتصال مع الخادم`);
              }
              const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (!resultText) throw new Error("استجابة فارغة من الذكاء الاصطناعي");
              return JSON.parse(cleanJSONString(resultText));
            } catch (err) {
              lastError = err;
              if (err.message.includes("تجاوزت حد الطلبات المجانية")) break; 
              if (attempt === retries) break;
              await new Promise(res => setTimeout(res, 1500 * attempt));
            }
          }
          throw lastError;
        };

        const buildSafePayload = (modelName, systemPrompt, userParts, schemaProperties, requiredKeys) => {
            const isAdvanced = modelName.includes("1.5") || modelName.includes("2.0") || modelName.includes("flash");
            let payload = { contents: [{ role: "user", parts: userParts }] };
            if (isAdvanced) {
                payload.systemInstruction = { parts: [{ text: systemPrompt }] };
                if (schemaProperties) {
                    payload.generationConfig = { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: schemaProperties, required: requiredKeys } };
                }
            } else {
                const reqText = requiredKeys ? `\nيجب إرجاع JSON حصراً بالمفاتيح التالية: ${requiredKeys.join(', ')}` : "\nأرجع JSON فقط.";
                payload.contents[0].parts.unshift({ text: "تعليمات النظام:\n" + systemPrompt + reqText + "\n\n" });
            }
            return payload;
        };

        // حساب النطاق المالي (من 27 الشهر الماضي إلى 26 الحالي)
        const getFinancialMonthRange = (dateStr) => {
            const date = new Date(dateStr);
            let start = new Date(date);
            let end = new Date(date);
            if (date.getDate() >= 27) {
                start.setDate(27);
                end.setMonth(end.getMonth() + 1);
                end.setDate(26);
            } else {
                start.setMonth(start.getMonth() - 1);
                start.setDate(27);
                end.setDate(26);
            }
            return { start, end };
        };

        // ==========================================
        // 5. دوال الذكاء الاصطناعي للتحليل
        // ==========================================
        const analyzeJournalWithAI = async (combinedText, audioData, recentEntries, criteria, plannedTasks, learnedPrices, apiKey) => {
          if (!apiKey) throw new Error("مفتاح الذكاء الاصطناعي مفقود.");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          
          let recentContext = recentEntries?.length > 0 ? `الأيام السابقة:\n` + recentEntries.map(e => `- ${e.date}: تقييم (${e.averageScore}/10).`).join('\n') : "لا يوجد.";
          
          // تبسيط شجرة المهام ليتعرف عليها الذكاء
          let flatTasksContext = "المهام المخطط لها مسبقاً:\n";
          const extractUncompleted = (tasks) => {
              tasks.forEach(t => {
                  if (!t.isCompleted) flatTasksContext += `- ${t.title} (ID: ${t.id})\n`;
                  if (t.children) extractUncompleted(t.children);
              });
          };
          extractUncompleted(plannedTasks || []);

          let learnedPricesContext = "الأسعار التقديرية التي تعلمتها من المستخدم سابقاً:\n";
          if (learnedPrices && Object.keys(learnedPrices).length > 0) {
              for (const [item, price] of Object.entries(learnedPrices)) {
                  learnedPricesContext += `- ${item}: ${price}\n`;
              }
          }

          let criteriaPrompt = "المعايير المطلوبة للتقييم:\n";
          let dynamicProperties = { 
            transcript: { type: "STRING", description: "تفريغ الصوت فقط (إن وجد)." },
            tasks: { type: "ARRAY", items: { type: "STRING" }, description: "نصوص المهام العادية المنجزة." }, 
            completedPlannedTaskIds: { type: "ARRAY", items: { type: "STRING" }, description: "مصفوفة معرفات (IDs) المهام المخطط لها التي تم إنجازها اليوم بناء على النص." },
            financial_transactions: {
                type: "ARRAY",
                description: "قائمة بالعمليات المالية (مشتريات أو مدخولات) المذكورة اليوم.",
                items: {
                    type: "OBJECT",
                    properties: {
                        desc: { type: "STRING", description: "وصف العملية (مثال: غداء، راتب)" },
                        amount: { type: "NUMBER", description: "المبلغ. خمنه إذا لم يُذكر." },
                        type: { type: "STRING", description: "إما 'income' أو 'expense'" },
                        isEstimated: { type: "BOOLEAN", description: "true إذا لم يذكر المستخدم السعر وقمت بتخمينه" }
                    }
                }
            },
            title: { type: "STRING", description: "لقب يصف اليوم (4 كلمات أقصى حد)." },
            comparison: { type: "STRING", description: "قارن الأداء بأسلوب مشجع." },
            tips: { type: "STRING", description: "نصائح للتحسين." }
          };
          let requiredKeys = ["transcript", "tasks", "completedPlannedTaskIds", "financial_transactions", "title", "comparison", "tips"];

          criteria.forEach(c => {
             if (c.subCriteria && c.subCriteria.length > 0) {
                c.subCriteria.forEach(sub => {
                   const desc = sub.desc || `قيّم مستوى إنجاز ${sub.label}`;
                   criteriaPrompt += `- ${c.label} -> ${sub.label}: ${desc}\n`;
                   dynamicProperties[`score_${sub.id}`] = { type: "INTEGER", description: `تقييم ${sub.label} (0-10)` };
                   dynamicProperties[`detail_${sub.id}`] = { type: "STRING", description: `سبب التقييم لـ ${sub.label} (سطر واحد)` };
                   requiredKeys.push(`score_${sub.id}`, `detail_${sub.id}`);
                });
             } else {
                const desc = c.desc || 'استنتج التقييم';
                criteriaPrompt += `- ${c.label}: ${desc}\n`;
                dynamicProperties[`score_${c.id}`] = { type: "INTEGER", description: `تقييم ${c.label} (0-10)` };
                dynamicProperties[`detail_${c.id}`] = { type: "STRING", description: `سبب التقييم لـ ${c.label} (سطر واحد)` };
                requiredKeys.push(`score_${c.id}`, `detail_${c.id}`);
             }
          });

          const systemPrompt = `أنت محلل حياة. حلل يوميات المستخدم. 
اللقب: 4 كلمات. المهام: استخرجها جميعاً. التقييم: 0-10.
مهم جداً: راجع قائمة (المهام المخطط لها). إذا ذكر المستخدم أنه أنجز أياً منها، ضع ID الخاص بها في مصفوفة 'completedPlannedTaskIds'.
مهم جداً: استخرج أي عمليات مالية (مصروف أو دخل). إذا لم يذكر السعر لمصروف عادي (مثل غداء، قهوة)، استخدم الأسعار المتعلمة أو ضع تقديراً منطقياً واجعل isEstimated = true.

${recentContext}
${flatTasksContext}
${learnedPricesContext}
${criteriaPrompt}`;

          const parts = [];
          if (combinedText && combinedText.trim() !== "") parts.push({ text: `نص أحداث اليوم:\n${combinedText}` });
          if (audioData) {
            parts.push({ inlineData: { mimeType: audioData.mimeType, data: audioData.base64 } });
            parts.push({ text: "\nفرّغ الصوت وحلله مع النص." });
          } else if (!combinedText || combinedText.trim() === "") throw new Error("لا يوجد نص أو صوت.");

          const payload = buildSafePayload(modelName, systemPrompt, parts, dynamicProperties, requiredKeys);
          return await fetchWithRetry(url, payload);
        };

        const parsePlannedTasksAI = async (text, audioData, apiKey) => {
          if (!apiKey) throw new Error("مفتاح الذكاء الاصطناعي مفقود.");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          
          let dynamicProperties = { 
            tasks: {
              type: "ARRAY",
              description: "قائمة المهام الرئيسية",
              items: {
                type: "OBJECT",
                properties: {
                  title: { type: "STRING", description: "عنوان المهمة الرئيسية" },
                  children: {
                    type: "ARRAY",
                    description: "مهام ثانوية (اختياري)",
                    items: {
                      type: "OBJECT",
                      properties: {
                        title: { type: "STRING", description: "عنوان المهمة الثانوية" },
                        children: {
                          type: "ARRAY",
                          description: "خطوات إجرائية (اختياري)",
                          items: { type: "OBJECT", properties: { title: { type: "STRING" } } }
                        }
                      }
                    }
                  }
                }
              }
            }
          };

          const systemPrompt = `أنت مخطط ذكي. خذ كلام المستخدم وحوله إلى شجرة مهام هرمية.
إذا أعطاك مهمة عامة كبيرة، قم بتقسيمها تلقائياً إلى مهام ثانوية وخطوات إجرائية منطقية.
إذا أعطاك مهام محددة، رتبها بشكل هرمي (رئيسي -> ثانوي -> إجرائي).`;

          const parts = [];
          if (text && text.trim() !== "") parts.push({ text: `المدخلات:\n${text}` });
          if (audioData) {
            parts.push({ inlineData: { mimeType: audioData.mimeType, data: audioData.base64 } });
          }

          const payload = buildSafePayload(modelName, systemPrompt, parts, dynamicProperties, ["tasks"]);
          const res = await fetchWithRetry(url, payload);
          
          // Add IDs to the generated tasks
          const addIds = (tasks, type) => {
             if(!tasks) return [];
             return tasks.map(t => ({
                id: `task_${type}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                title: t.title,
                isCompleted: false,
                type: type,
                children: addIds(t.children, type === 'main' ? 'sub' : 'step')
             }));
          };
          
          return addIds(res.tasks || [], 'main');
        };

        const chatWithJournalAI = async (currentEntry, chatHistory, userMessage, criteria, apiKey) => {
          if (!apiKey) throw new Error("مفتاح الذكاء الاصطناعي مفقود.");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const historyContext = chatHistory.map(msg => `${msg.sender === 'user' ? 'المستخدم' : 'الذكاء الاصطناعي'}: ${msg.text}`).join('\n');
          
          let scoresContext = "";
          let idMapText = "معرفات الجوانب (IDs) المتاحة للتقييم:\n";
          let dynamicProperties = { 
            reply: { type: "STRING" }, title: { type: "STRING", description: "تحديث اللقب إن لزم الأمر (أقصى 4 كلمات)" },
            tasks: { type: "ARRAY", items: { type: "STRING" }, description: "تحديث قائمة المهام العادية." },
            learned_rule: {
              type: "OBJECT",
              description: "إذا قام المستخدم بتوجيهك لإضافة قاعدة تقييم جديدة.",
              properties: { target_id: { type: "STRING" }, rule_text: { type: "STRING" } }
            },
            learned_price: {
               type: "OBJECT",
               description: "إذا صحح المستخدم سعر منتج (مثال: الغداء بـ 50)، ضعه هنا لتتعلمه.",
               properties: { item_name: { type: "STRING" }, price: { type: "NUMBER" } }
            },
            updated_finances: {
               type: "ARRAY",
               description: "إذا تم تعديل العمليات المالية، أرجع القائمة المحدثة بالكامل",
               items: {
                    type: "OBJECT",
                    properties: {
                        desc: { type: "STRING" }, amount: { type: "NUMBER" }, type: { type: "STRING" }, isEstimated: { type: "BOOLEAN" }, id: {type: "STRING"}
                    }
                }
            }
          };
          
          criteria.forEach(c => { 
             idMapText += `- رئيسي: "${c.label}" (ID: ${c.id})\n`;
             if (c.subCriteria && c.subCriteria.length > 0) {
                 c.subCriteria.forEach(sub => {
                     idMapText += `  - فرعي: "${sub.label}" (ID: ${sub.id})\n`;
                     scoresContext += `${sub.label}(${currentEntry.scores?.[sub.id] || 0}), `;
                     dynamicProperties[`score_${sub.id}`] = { type: "INTEGER" };
                 });
             } else {
                 scoresContext += `${c.label}(${currentEntry.scores?.[c.id] || 0}), `;
                 dynamicProperties[`score_${c.id}`] = { type: "INTEGER" }; 
             }
          });
          
          const financesContext = JSON.stringify(currentEntry.finances?.transactions || []);
          const entryContext = `اللقب الحالي: ${currentEntry.title}\nالمهام الحالية: ${(currentEntry.tasks || []).join('، ')}\nالعمليات المالية اليوم: ${financesContext}\nالتقييمات الحالية: ${scoresContext}`;
          
          const systemPrompt = `أنت مساعد ليومياتي. رد على المستخدم وعدّل التقييمات أو اللقب أو المهام أو العمليات المالية بناء على الدردشة.
إذا طلب المستخدم تصحيح قاعدة تقييم، استخدم 'learned_rule'.
إذا صحح سعر منتج خمنته سابقاً، استخدم 'learned_price' وقم بتحديث 'updated_finances'.
\n${idMapText}\n\n${entryContext}`;

          const payload = buildSafePayload(modelName, systemPrompt, [{ text: `سجل المحادثة:\n${historyContext}\n\nرسالة المستخدم: ${userMessage}` }], dynamicProperties, ["reply"]);
          return await fetchWithRetry(url, payload);
        };

        const generateDashboardInsightsAI = async (entries, criteria, finances, apiKey) => {
          if (!apiKey) throw new Error("مفتاح الذكاء الاصطناعي مفقود.");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const entriesSummary = entries.map(e => `[${e.date}]: اللقب(${e.title}), المهام(${e.tasks?.join('، ') || 'لا يوجد'})`).join('\n').substring(0, 15000);
          const financeSummary = `الرصيد المالي الحالي: ${finances?.balance || 0}`;

          let dynamicProperties = { 
            overallTitle: { type: "STRING", description: "لقب عام لملخص هذه الفترة" },
            general_description: { type: "STRING", description: "وصف عام يلخص شخصية المستخدم وسلوكه ووضعه المالي في هذه الفترة بناءً على يومياته" },
            general_positives: { type: "ARRAY", items: { type: "STRING" }, description: "أهم إيجابيات في مسيرته" },
            general_negatives: { type: "ARRAY", items: { type: "STRING" }, description: "أبرز السلبيات أو القصور" },
            general_trends: { type: "STRING", description: "التطور والتراجع (شاملاً الوضع المالي)" },
            general_suggestions: { type: "STRING", description: "خطة عمل وتحسينات شاملة" }
          };
          let requiredKeys = ["overallTitle", "general_description", "general_positives", "general_negatives", "general_trends", "general_suggestions"];
          
          criteria.forEach(c => { dynamicProperties[`advice_${c.id}`] = { type: "STRING", description: `توصية لجانب ${c.label}` }; requiredKeys.push(`advice_${c.id}`); });

          const systemPrompt = "أنت خبير نفسي ومحلل مالي محترف. ادرس ملخص يوميات المستخدم خلال هذه الفترة بدقة، ثم استخرج تحليلاً شاملاً لشخصيته، تطوره، ووضعه المالي، وضع له خطة عمل.";
          const payload = buildSafePayload(modelName, systemPrompt, [{ text: `${financeSummary}\n\nملخص أيامي:\n${entriesSummary}` }], dynamicProperties, requiredKeys);
          
          return await fetchWithRetry(url, payload);
        };

        const chatWithDashboardAI = async (currentInsights, chatHistory, userMessage, apiKey) => {
          if (!apiKey) throw new Error("مفتاح الذكاء الاصطناعي مفقود.");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const historyContext = chatHistory.map(msg => `${msg.sender === 'user' ? 'المستخدم' : 'الذكاء الاصطناعي'}: ${msg.text}`).join('\n');

          const insightsContext = `التحليل الشامل الحالي للمستخدم:
          - الوصف العام: ${currentInsights.general_description || "غير متوفر"}
          - الإيجابيات: ${(currentInsights.general_positives || []).join('، ')}
          - السلبيات: ${(currentInsights.general_negatives || []).join('، ')}
          - التطور: ${currentInsights.general_trends || "غير متوفر"}
          - خطة العمل الحالية: ${currentInsights.general_suggestions || "غير متوفر"}`;

          const systemPrompt = `أنت خبير نفسي ومدرب حياة ومالي ذكي.
أنت تناقش المستخدم حول "التحليل الشامل".
أرجع النتيجة بصيغة JSON تحتوي على:
1. "reply": ردك على المستخدم.
2. "updated_insights": (اختياري) كائن يحتوي على "general_description" و/أو "general_suggestions" إذا لزم التعديل.`;

          let dynamicProperties = {
            reply: { type: "STRING", description: "ردك المباشر على المستخدم" },
            updated_insights: {
              type: "OBJECT",
              properties: {
                general_description: { type: "STRING" },
                general_suggestions: { type: "STRING" }
              }
            }
          };

          const payload = buildSafePayload(modelName, systemPrompt, [{ text: `التحليل الحالي:\n${insightsContext}\n\nسجل المحادثة:\n${historyContext}\n\nرسالة المستخدم: ${userMessage}` }], dynamicProperties, ["reply"]);
          return await fetchWithRetry(url, payload);
        };

        // ==========================================
        // 6. الرسوم البيانية المتطورة ومتحكمات التكبير
        // ==========================================
        const getColorClass = (score) => {
          const s = parseFloat(score);
          if (isNaN(s) || s === 0) return 'bg-gray-100 text-gray-400 border-gray-200';
          if (s <= 2) return 'bg-yellow-100 text-yellow-800 border-yellow-300';
          if (s <= 4) return 'bg-yellow-300 text-yellow-900 border-yellow-400';
          if (s <= 6) return 'bg-lime-300 text-lime-900 border-lime-400';
          if (s <= 8) return 'bg-green-400 text-white border-green-500';
          return 'bg-green-600 text-white border-green-700 shadow-md';
        };

        const getChartBgColorClass = (score, maxVal = 10) => {
          if (maxVal === 0) return 'bg-gray-200';
          const ratio = score / maxVal;
          if (ratio <= 0.2) return 'bg-yellow-500';
          if (ratio <= 0.4) return 'bg-yellow-400';
          if (ratio <= 0.6) return 'bg-lime-400';
          if (ratio <= 0.8) return 'bg-green-400';
          return 'bg-green-600';
        };

        const getChartStrokeColorClass = (score, maxVal = 10) => {
          if (maxVal === 0) return 'text-gray-200';
          const ratio = score / maxVal;
          if (ratio <= 0.2) return 'text-yellow-500';
          if (ratio <= 0.4) return 'text-yellow-400';
          if (ratio <= 0.6) return 'text-lime-400';
          if (ratio <= 0.8) return 'text-green-400';
          return 'text-green-600';
        };

        const ChartControls = ({ zoomLevel, setZoomLevel, isFullscreen, setIsFullscreen }) => (
          <div className={`flex justify-center items-center gap-4 bg-gray-100 p-2 rounded-2xl w-fit mx-auto shadow-inner border border-gray-200 ${isFullscreen ? 'm-4' : 'mt-4'}`}>
             <button onClick={() => setZoomLevel(Math.max(0.1, zoomLevel - 0.2))} className="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm hover:bg-blue-50 text-gray-700 hover:text-blue-600 transition" title="تصغير">
               <MinusIcon className="text-sm"/>
             </button>
             <button onClick={() => setIsFullscreen(!isFullscreen)} className="px-6 py-2 h-10 bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 font-bold text-sm flex items-center gap-2 transition">
                {isFullscreen ? <Minimize className="text-sm"/> : <Maximize className="text-sm"/>}
                <span>{isFullscreen ? 'إلغاء ملء الشاشة' : 'ملء الشاشة بالعرض'}</span>
             </button>
             <button onClick={() => setZoomLevel(zoomLevel + 0.2)} className="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm hover:bg-blue-50 text-gray-700 hover:text-blue-600 transition" title="تكبير">
               <PlusIcon className="text-sm"/>
             </button>
          </div>
        );

        const BarChartComponent = ({ data, onBarClick, zoomLevel, isFullscreen, chartMetric }) => {
          const isTasks = chartMetric === 'tasksCount';
          const maxVal = isTasks ? Math.max(10, ...data.map(d => d.entry?.tasks?.length || d.entriesCount || 0)) : 10;
          const containerWidth = Math.max(100, zoomLevel * 100);
          
          return (
            <div className={`w-full overflow-x-auto scrollbar-hide ${isFullscreen ? 'flex-1 pt-6' : 'h-[300px] pt-12'}`}>
              <div className={`flex items-end justify-between min-w-full px-2 gap-1 ${isFullscreen ? 'h-[90%]' : 'h-full'}`} style={{ minWidth: `${containerWidth}%` }}>
                 {data.map((d, i) => {
                    const score = isTasks ? (d.entry?.tasks?.length || (d.entriesCount > 0 ? d.avgTasks : 0)) : parseFloat(d.displayScore || 0);
                    const hasData = d.entry || d.entriesCount > 0;
                    const heightPercentage = hasData ? Math.max(8, (score / maxVal) * 100) : 4;

                    return (
                      <button key={i} onClick={() => hasData ? onBarClick(d) : null} className={`flex flex-col items-center group relative flex-1 h-full justify-end ${hasData ? 'cursor-pointer' : 'cursor-default opacity-50'}`}>
                        {hasData && (
                          <div className="opacity-0 group-hover:opacity-100 absolute -top-10 bg-slate-800 text-white text-xs font-bold py-1.5 px-3 rounded-lg pointer-events-none whitespace-nowrap z-10 transition-opacity">
                            {score} {isTasks ? 'مهمة' : ''} - {d.entry?.title || d.title || ''}
                          </div>
                        )}
                        <div className={`w-full rounded-sm transition-all duration-500 ${hasData ? getChartBgColorClass(score, maxVal) : 'bg-gray-200'} group-hover:opacity-80`} style={{ height: `${heightPercentage}%` }}></div>
                        <span className={`text-[10px] mt-2 font-bold ${hasData ? 'text-gray-700' : 'text-gray-400'}`}>{d.label || d.dayNum}</span>
                      </button>
                    )
                 })}
              </div>
            </div>
          )
        };

        const LineChartComponent = ({ data, totalItems, onPointClick, zoomLevel, isFullscreen, chartMetric }) => {
          const validData = data.filter(d => d.entry || d.entriesCount > 0);
          if(validData.length === 0) return <div className="text-center p-10 text-gray-500 bg-white rounded-3xl border border-gray-100 mt-4 w-full">لا توجد بيانات كافية للرسم البياني.</div>;

          const isTasks = chartMetric === 'tasksCount';
          const maxVal = isTasks ? Math.max(10, ...validData.map(d => d.entry?.tasks?.length || d.avgTasks || 0)) : 10;
          
          const padding = 40;
          const svgWidth = Math.max(400, totalItems * 50 * zoomLevel);
          const getFullscreenHeight = () => { if (window.innerHeight > window.innerWidth) return window.innerWidth - 120; return window.innerHeight - 120; };
          const svgHeight = isFullscreen ? getFullscreenHeight() : 260;
          const usableHeight = svgHeight - padding * 2;

          const points = validData.map(d => {
            const idx = d.dayNum || (d.index + 1);
            const x = padding + (idx - 1) * ((svgWidth - padding * 2) / Math.max(1, totalItems - 1));
            const score = isTasks ? (d.entry?.tasks?.length || d.avgTasks || 0) : parseFloat(d.displayScore || 0);
            const y = svgHeight - padding - ((score / maxVal) * usableHeight);
            return { x, y, score, ...d };
          });

          const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
          const yAxisLabels = [0, maxVal*0.25, maxVal*0.5, maxVal*0.75, maxVal].map(v => Math.round(v));

          return (
            <div className={`w-full overflow-x-auto scrollbar-hide ${isFullscreen ? 'flex-1 flex items-center' : ''}`}>
              <svg width={svgWidth} height={svgHeight} className="overflow-visible min-w-full">
                 {yAxisLabels.map(val => (
                   <g key={val}>
                      <line x1={padding} y1={svgHeight - padding - (val/maxVal)*usableHeight} x2={svgWidth - padding} y2={svgHeight - padding - (val/maxVal)*usableHeight} stroke="#f3f4f6" strokeWidth="2" strokeDasharray="4 4" />
                      <text x={padding - 15} y={svgHeight - padding - (val/maxVal)*usableHeight + 4} fontSize="10" fill="#9ca3af" textAnchor="end" fontWeight="bold">{val}</text>
                   </g>
                 ))}
                 <path d={pathD} fill="none" stroke="#cbd5e1" strokeWidth="4" strokeLinejoin="round" strokeLinecap="round" />
                 {points.map((p, i) => (
                   <g key={i} className="group cursor-pointer outline-none" onClick={() => onPointClick(p)}>
                     <circle cx={p.x} cy={p.y} r="6" fill="#fff" className={`${getChartStrokeColorClass(p.score, maxVal)} transition-all duration-300 group-hover:r-8`} strokeWidth="4" stroke="currentColor" />
                     <text x={p.x} y={svgHeight - 10} fontSize="11" fill="#6b7280" textAnchor="middle" fontWeight="bold">{p.label || p.dayNum}</text>
                     <rect x={p.x - 20} y={p.y - 35} width="40" height="20" rx="4" fill="#1e293b" className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none" />
                     <text x={p.x} y={p.y - 21} fontSize="12" fill="#fff" fontWeight="bold" textAnchor="middle" className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">{p.score}</text>
                   </g>
                 ))}
              </svg>
            </div>
          )
        };

        // ==========================================
        // 7. شاشات العرض (Auth, Settings)
        // ==========================================
        const AuthView = () => {
          const [isLogin, setIsLogin] = useState(true);
          const [name, setName] = useState(''); const [phone, setPhone] = useState('');
          const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
          const [rememberMe, setRememberMe] = useState(true); 
          const [error, setError] = useState(''); const [loading, setLoading] = useState(false);

          const handleSubmit = async (e) => {
            e.preventDefault();
            if (isLogin) { if (!email || !password) return setError('يرجى تعبئة جميع الحقول'); } 
            else { if (!name || !phone || !email || !password) return setError('يرجى تعبئة جميع الحقول'); }
            if (!auth) return setError('خطأ في الاتصال بقاعدة البيانات.');
            
            setError(''); setLoading(true);
            try {
              await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
              if (isLogin) { await auth.signInWithEmailAndPassword(email, password); } 
              else {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                if (db) await db.doc(`artifacts/${appIdStr}/users/${userCred.user.uid}/profile/info`).set({ name, phone, email, createdAt: Date.now() });
              }
            } catch (err) {
              if (err.code === 'auth/email-already-in-use') setError('البريد مستخدم مسبقاً');
              else if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') setError('بيانات الدخول غير صحيحة');
              else if (err.code === 'auth/weak-password') setError('كلمة المرور ضعيفة جداً');
              else setError('حدث خطأ: ' + err.message);
            } finally { setLoading(false); }
          };

          return (
            <div className="flex-1 flex items-center justify-center bg-slate-50 p-6 min-h-[100dvh]">
              <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl border border-gray-100 relative overflow-hidden">
                <div className="absolute top-0 left-0 right-0 h-32 bg-slate-900 rounded-b-[3rem] z-0"></div>
                <div className="relative z-10 flex flex-col items-center mb-8 pt-4">
                  <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg mb-4 border-4 border-slate-50"><Brain className="text-4xl text-blue-600" /></div>
                  <h1 className="text-2xl font-black text-gray-800">يومياتي الذكية</h1>
                  <p className="text-sm text-gray-500 font-medium mt-1">حلل يومك، طوّر ذاتك</p>
                </div>

                <form onSubmit={handleSubmit} className="flex flex-col gap-4 relative z-10">
                  {!isLogin && (
                    <>
                      <div className="relative"><User className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" /><input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="الاسم الكامل" /></div>
                      <div className="relative"><Phone className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" /><input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="05XXXXXXXX" dir="ltr" /></div>
                    </>
                  )}
                  <div className="relative"><Mail className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" /><input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="البريد الإلكتروني" /></div>
                  <div className="relative"><Key className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" /><input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="كلمة المرور" /></div>
                  <div className="flex items-center gap-2 mt-1">
                    <input type="checkbox" id="rememberMe" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer" />
                    <label htmlFor="rememberMe" className="text-xs font-bold text-gray-600 cursor-pointer select-none">تذكرني (البقاء متصلاً)</label>
                  </div>
                  {error && <div className="text-red-600 text-xs font-bold bg-red-50 p-3 rounded-lg flex items-start gap-2"><AlertCircle className="text-sm shrink-0 mt-0.5" /><span>{error}</span></div>}
                  <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white font-bold text-lg rounded-xl py-3.5 shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition mt-2 flex justify-center items-center gap-2">
                    {loading ? <><Loader className="text-lg animate-spin" /><span>جاري التحميل...</span></> : (isLogin ? <><LogIn className="text-lg"/><span>تسجيل الدخول</span></> : <><UserPlus className="text-lg"/><span>إنشاء حساب</span></>)}
                  </button>
                </form>
                <div className="mt-6 flex flex-col gap-4 relative z-10">
                  <button onClick={() => {setIsLogin(!isLogin); setError('');}} className="text-sm font-bold text-gray-500 hover:text-blue-600 transition">
                    <span>{isLogin ? "ليس لديك حساب؟ سجل الآن" : "لديك حساب بالفعل؟ سجل دخولك"}</span>
                  </button>
                </div>
              </div>
            </div>
          );
        };

        const SettingsView = ({ criteria, saveCriteria, goToDashboard }) => {
          const [editingId, setEditingId] = useState(null);
          const [formData, setFormData] = useState({ label: '', desc: '', icon: '' }); 
          const [isFormOpen, setIsFormOpen] = useState(false);
          const [showIconModal, setShowIconModal] = useState(false);

          const handleEditMain = (c) => { 
             setEditingId(c.id); setFormData({ label: c.label, desc: c.desc || '', icon: c.icon }); setIsFormOpen(true);
             setTimeout(() => { document.getElementById('main-category-form')?.scrollIntoView({ behavior: 'smooth' }); }, 100);
          };

          const handleDeleteMain = (id) => {
            if (criteria.length <= 1) return alert("يجب أن يكون هناك جانب رئيسي واحد على الأقل.");
            if (window.confirm("تحذير: سيتم حذف هذا الجانب الرئيسي وجميع فروعه بالكامل. هل أنت متأكد؟")) saveCriteria(criteria.filter(c => c.id !== id));
          };

          const handleSaveMain = () => {
            if (!formData.label.trim()) return alert("اسم الجانب الرئيسي مطلوب");
            let iconToSave = formData.icon;
            if (!iconToSave) {
               const usedIcons = criteria.map(c => c.icon);
               const availableIcons = Object.keys(IconMap).filter(k => !usedIcons.includes(k));
               iconToSave = availableIcons.length > 0 ? availableIcons[Math.floor(Math.random() * availableIcons.length)] : 'Star';
            }

            if (editingId) saveCriteria(criteria.map(c => c.id === editingId ? { ...c, label: formData.label, desc: formData.desc, icon: iconToSave } : c));
            else {
              const newId = `crit_${Date.now()}`;
              const randomColor = availableColors[Math.floor(Math.random() * availableColors.length)];
              saveCriteria([...criteria, { id: newId, label: formData.label, desc: formData.desc, icon: iconToSave, colorObj: randomColor, subCriteria: [] }]);
            }
            setEditingId(null); setFormData({ label: '', desc: '', icon: '' }); setIsFormOpen(false);
          };

          const handleAddSub = (parentId) => {
             const newSub = { id: `sub_${Date.now()}`, label: 'جانب فرعي جديد', desc: '' };
             saveCriteria(criteria.map(c => c.id === parentId ? {...c, subCriteria: [...(c.subCriteria||[]), newSub]} : c));
          };

          const handleUpdateSub = (parentId, subId, field, value) => {
             saveCriteria(criteria.map(c => c.id === parentId ? {...c, subCriteria: c.subCriteria.map(sub => sub.id === subId ? {...sub, [field]: value} : sub)} : c));
          };

          const handleDeleteSub = (parentId, subId) => {
             if(window.confirm("حذف هذا الجانب الفرعي؟")) saveCriteria(criteria.map(c => c.id === parentId ? {...c, subCriteria: c.subCriteria.filter(sub => sub.id !== subId)} : c));
          };

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-10">
              <header className="bg-white p-6 pb-6 shadow-sm rounded-b-[2.5rem] flex justify-between items-center sticky top-0 z-20">
                <button onClick={goToDashboard} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ArrowRight className="text-lg text-gray-700" /></button>
                <h1 className="text-xl font-black text-gray-800">إعدادات المعايير</h1>
                <button onClick={() => { if(auth) auth.signOut(); }} className="p-2 bg-red-50 text-red-600 rounded-full hover:bg-red-100" title="تسجيل الخروج"><LogOut className="text-lg" /></button>
              </header>

              <div className="p-5">
                <div className="bg-blue-50 border border-blue-100 p-4 rounded-2xl mb-6 text-sm text-blue-800 font-medium">
                  هنا يمكنك إدارة "الجوانب الرئيسية" للتقييم، وإضافة "جوانب فرعية" تندرج تحتها ليقوم الذكاء الاصطناعي بتقييمها بدقة مفصلة.
                </div>

                <div className="flex flex-col gap-5 mb-6">
                  {criteria.map(c => {
                    const IconComp = IconMap[c.icon] || Star;
                    return (
                      <div key={c.id} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        <div className="flex items-start justify-between mb-4 pb-4 border-b border-gray-100">
                          <div className="flex items-start gap-3">
                            <div className={`w-10 h-10 flex items-center justify-center rounded-xl ${c.colorObj.main}`}><IconComp className="text-white" /></div>
                            <div>
                              <h4 className="font-black text-gray-800 text-base">{c.label}</h4>
                              {c.desc && <p className="text-xs text-gray-500 mt-1 max-w-[200px] leading-relaxed break-words whitespace-pre-wrap">{c.desc}</p>}
                            </div>
                          </div>
                          <div className="flex gap-1">
                            <button onClick={() => handleEditMain(c)} className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition" title="تعديل الرئيسي"><Edit className="text-sm" /></button>
                            <button onClick={() => handleDeleteMain(c.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition" title="حذف الرئيسي"><Trash className="text-sm" /></button>
                          </div>
                        </div>
                        
                        <div className="flex flex-col gap-3 pr-6 border-r-2 border-gray-100 mr-2">
                           <div className="text-xs font-bold text-gray-400 mb-1">الفروع التابعة:</div>
                           {(c.subCriteria || []).map(sub => (
                             <div key={sub.id} className="bg-gray-50 p-3 rounded-xl border border-gray-200 flex flex-col gap-2 relative group">
                                <div className="flex justify-between items-center">
                                   <input type="text" value={sub.label} onChange={(e) => handleUpdateSub(c.id, sub.id, 'label', e.target.value)} className="bg-transparent font-bold text-sm text-gray-800 focus:outline-none focus:border-b border-blue-500 w-1/2" placeholder="اسم الفرع..." />
                                   <button onClick={() => handleDeleteSub(c.id, sub.id)} className="text-red-400 hover:text-red-600 p-1 opacity-0 group-hover:opacity-100 transition"><Trash className="text-xs" /></button>
                                </div>
                                <textarea value={sub.desc} onChange={(e) => handleUpdateSub(c.id, sub.id, 'desc', e.target.value)} className="bg-transparent text-xs text-gray-500 focus:outline-none w-full resize-none h-14 whitespace-pre-wrap" placeholder="قواعد وشرح الذكاء الاصطناعي..."></textarea>
                             </div>
                           ))}
                           <button onClick={() => handleAddSub(c.id)} className="flex items-center gap-2 text-blue-600 font-bold text-xs p-2 hover:bg-blue-50 rounded-lg w-fit transition mt-1">
                             <Plus className="text-xs" /> <span>إضافة جانب فرعي جديد</span>
                           </button>
                        </div>
                      </div>
                    )
                  })}
                </div>

                {!isFormOpen ? (
                   <button onClick={() => setIsFormOpen(true)} className="w-full flex items-center justify-center gap-2 bg-blue-50 text-blue-600 font-bold p-4 rounded-2xl border border-blue-100 hover:bg-blue-100 transition">
                     <Plus className="text-lg" /> <span>إضافة جانب رئيسي جديد</span>
                   </button>
                ) : (
                  <div id="main-category-form" className="bg-white rounded-3xl p-5 shadow-sm border border-blue-200 mt-2 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                    <h2 className="text-gray-800 font-bold mb-4 flex items-center gap-2">
                      {editingId ? <><Edit3 className="text-blue-500 text-lg"/> <span>تعديل الجانب الرئيسي</span></> : <><Plus className="text-blue-500 text-lg"/> <span>إضافة جانب رئيسي جديد</span></>}
                    </h2>
                    <div className="flex flex-col gap-4">
                      <div>
                        <label className="text-xs font-bold text-gray-500 mb-2 block">الأيقونة</label>
                        <button onClick={() => setShowIconModal(true)} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-4 flex items-center justify-between hover:bg-blue-50 transition text-right">
                           <span className="text-sm font-bold text-gray-600">{formData.icon ? 'تم اختيار الأيقونة بنجاح' : 'اضغط لاختيار أيقونة (أو سيتم الاختيار تلقائياً)'}</span>
                           {formData.icon ? React.createElement(IconMap[formData.icon], {className: "text-xl text-blue-600"}) : <Grid className="text-xl text-gray-400" />}
                        </button>
                      </div>
                      <div>
                        <label className="text-xs font-bold text-gray-500 mb-1 block">اسم الجانب الرئيسي</label>
                        <input type="text" value={formData.label} onChange={e => setFormData({...formData, label: e.target.value})} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="مثال: الصحة النفسية..." />
                      </div>
                      <div>
                        <label className="text-xs font-bold text-gray-500 mb-1 block">شرح الجانب للذكاء الاصطناعي (اختياري)</label>
                        <textarea value={formData.desc} onChange={e => setFormData({...formData, desc: e.target.value})} rows="2" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="اكتب تعليمات مخصصة ليراعيها الذكاء الاصطناعي..."></textarea>
                      </div>
                      <div className="flex gap-2 mt-2">
                        <button onClick={handleSaveMain} className="flex-1 bg-blue-600 text-white font-bold rounded-xl py-3 shadow-md hover:bg-blue-700 transition">حفظ الجانب الرئيسي</button>
                        <button onClick={() => {setEditingId(null); setFormData({ label: '', desc: '', icon: '' }); setIsFormOpen(false);}} className="px-4 bg-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-300 transition">إلغاء</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {showIconModal && (
                <div className="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                    <div className="flex justify-between items-center mb-6">
                       <h3 className="font-black text-gray-800 text-lg">اختر أيقونة</h3>
                       <button onClick={() => setShowIconModal(false)} className="p-2 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-full transition"><X className="text-sm" /></button>
                    </div>
                    <div className="grid grid-cols-5 gap-3 max-h-[50vh] overflow-y-auto p-1 scrollbar-hide" dir="ltr">
                       {Object.keys(IconMap).map(iconName => {
                          const IconComp = IconMap[iconName];
                          const isSelected = formData.icon === iconName;
                          const isUsed = criteria.some(c => c.icon === iconName) && !isSelected;
                          return (
                             <button key={iconName} onClick={() => { setFormData({...formData, icon: iconName}); setShowIconModal(false); }}
                               className={`aspect-square flex items-center justify-center rounded-2xl transition-all ${isSelected ? 'bg-blue-600 text-white shadow-lg scale-110' : isUsed ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'bg-gray-50 text-gray-600 hover:bg-blue-50 hover:text-blue-600'}`}
                               disabled={isUsed && !isSelected}
                             >
                               <IconComp className="text-xl" />
                             </button>
                          )
                       })}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // --- 8. إدارة المهام المخطط لها (Smart Planner) ---
        const PlannedTasksView = ({ plannedTasks, setPlannedTasks, goToDashboard, globalApiKey }) => {
            const [mode, setMode] = useState('view'); // view, edit, add
            const [expandedTasks, setExpandedTasks] = useState(new Set());
            const [addText, setAddText] = useState('');
            const [isAddingAI, setIsAddingAI] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const recognitionRef = useRef(null);

            useEffect(() => {
              const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              if (SpeechRecognition) {
                recognitionRef.current = new SpeechRecognition();
                recognitionRef.current.continuous = true;
                recognitionRef.current.interimResults = true;
                recognitionRef.current.lang = 'ar-SA';
                recognitionRef.current.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    if (final) setAddText(prev => prev + final);
                };
                recognitionRef.current.onerror = () => setIsRecording(false);
                recognitionRef.current.onend = () => setIsRecording(false);
              }
              return () => { if (recognitionRef.current) recognitionRef.current.stop(); };
            }, []);

            const toggleExpand = (id) => {
                const newExpanded = new Set(expandedTasks);
                if (newExpanded.has(id)) newExpanded.delete(id);
                else newExpanded.add(id);
                setExpandedTasks(newExpanded);
            };

            const expandAll = () => {
                const allIds = new Set();
                const extract = (tasks) => {
                    tasks.forEach(t => {
                        if(t.children && t.children.length > 0) {
                            allIds.add(t.id);
                            extract(t.children);
                        }
                    });
                };
                extract(plannedTasks);
                setExpandedTasks(allIds);
            };

            const collapseAll = () => setExpandedTasks(new Set());

            const toggleTaskCompletion = (targetId) => {
                const updateTree = (tasks) => tasks.map(t => {
                    if (t.id === targetId) return { ...t, isCompleted: !t.isCompleted };
                    if (t.children) return { ...t, children: updateTree(t.children) };
                    return t;
                });
                setPlannedTasks(updateTree(plannedTasks));
            };

            const deleteTask = (targetId) => {
                if(!window.confirm("حذف هذه المهمة وكل ما يندرج تحتها؟")) return;
                const updateTree = (tasks) => tasks.filter(t => t.id !== targetId).map(t => {
                    if (t.children) return { ...t, children: updateTree(t.children) };
                    return t;
                });
                setPlannedTasks(updateTree(plannedTasks));
            };

            const handleUpdateTaskTitle = (targetId, newTitle) => {
                const updateTree = (tasks) => tasks.map(t => {
                    if (t.id === targetId) return { ...t, title: newTitle };
                    if (t.children) return { ...t, children: updateTree(t.children) };
                    return t;
                });
                setPlannedTasks(updateTree(plannedTasks));
            };

            const handleAddWithAI = async () => {
                if(!addText.trim()) return alert("يرجى إدخال المهام أولاً.");
                setIsAddingAI(true);
                try {
                    const newTasks = await parsePlannedTasksAI(addText, null, globalApiKey);
                    if(newTasks && newTasks.length > 0) {
                        setPlannedTasks([...plannedTasks, ...newTasks]);
                        setMode('view');
                        setAddText('');
                    } else {
                        alert("لم يتم التعرف على مهام صالحة.");
                    }
                } catch(e) {
                    alert("خطأ في التحليل الذكي.");
                } finally { setIsAddingAI(false); }
            };

            const renderTaskTree = (tasks, level = 0) => {
                return tasks.map(task => {
                    const hasChildren = task.children && task.children.length > 0;
                    const isExpanded = expandedTasks.has(task.id);
                    
                    let bgClass = level === 0 ? 'bg-white shadow-sm border border-gray-200' : (level === 1 ? 'bg-gray-50 border border-gray-100' : 'bg-transparent border-b border-gray-100 border-dashed');
                    let paddingClass = level === 0 ? 'p-4' : (level === 1 ? 'p-3' : 'py-2');
                    let titleClass = level === 0 ? 'font-bold text-gray-800 text-base' : (level === 1 ? 'font-bold text-gray-700 text-sm' : 'text-gray-600 text-sm font-medium');

                    return (
                        <div key={task.id} className={`flex flex-col mb-3 rounded-2xl ${bgClass} ${paddingClass}`}>
                            <div className="flex items-start gap-3 w-full">
                                {mode === 'view' && (
                                    <button onClick={() => toggleTaskCompletion(task.id)} className={`mt-0.5 w-5 h-5 shrink-0 rounded flex items-center justify-center border transition-colors ${task.isCompleted ? 'bg-green-500 border-green-500' : 'bg-white border-gray-300'}`}>
                                        {task.isCompleted && <Check className="w-3 h-3 text-white" />}
                                    </button>
                                )}
                                {mode === 'edit' ? (
                                    <input type="text" value={task.title} onChange={(e) => handleUpdateTaskTitle(task.id, e.target.value)} className={`flex-1 bg-transparent focus:outline-none border-b border-blue-300 ${titleClass}`} />
                                ) : (
                                    <span className={`flex-1 leading-relaxed ${titleClass} ${task.isCompleted ? 'line-through text-gray-400' : ''}`}>{task.title}</span>
                                )}
                                
                                <div className="flex items-center gap-1 shrink-0">
                                    {mode === 'edit' && <button onClick={() => deleteTask(task.id)} className="p-1 text-red-400 hover:text-red-600"><Trash className="w-4 h-4"/></button>}
                                    {hasChildren && (
                                        <button onClick={() => toggleExpand(task.id)} className="p-1 text-gray-400 hover:text-gray-600 bg-gray-100 rounded-lg">
                                            {isExpanded ? <ChevronUp className="w-4 h-4"/> : <ChevronDown className="w-4 h-4"/>}
                                        </button>
                                    )}
                                </div>
                            </div>
                            
                            {hasChildren && isExpanded && (
                                <div className="mt-3 pr-4 border-r-2 border-gray-200/50 mr-2 flex flex-col gap-1">
                                    {renderTaskTree(task.children, level + 1)}
                                </div>
                            )}
                        </div>
                    );
                });
            };

            return (
                <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-10">
                    <header className="bg-white p-6 shadow-sm rounded-b-[2.5rem] sticky top-0 z-20">
                        <div className="flex justify-between items-center mb-4">
                            <button onClick={goToDashboard} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ArrowRight className="text-lg" /></button>
                            <h1 className="text-xl font-black text-gray-800 flex items-center gap-2"><ListChecks className="w-6 h-6 text-blue-600"/> المهام المخطط لها</h1>
                            <div className="w-9"></div>
                        </div>
                        <div className="flex gap-2 mt-4">
                            <button onClick={() => {setMode(mode === 'add' ? 'view' : 'add'); setAddText('');}} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${mode === 'add' ? 'bg-blue-600 text-white shadow-lg' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`}>إضافة سريعة</button>
                            <button onClick={() => setMode(mode === 'edit' ? 'view' : 'edit')} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${mode === 'edit' ? 'bg-amber-500 text-white shadow-lg' : 'bg-amber-50 text-amber-600 hover:bg-amber-100'}`}>تعديل وحذف</button>
                        </div>
                        {mode === 'view' && plannedTasks.length > 0 && (
                            <div className="flex justify-center gap-4 mt-4">
                                <button onClick={expandAll} className="text-xs font-bold text-gray-500 hover:text-blue-600">توسيع الجميع</button>
                                <button onClick={collapseAll} className="text-xs font-bold text-gray-500 hover:text-blue-600">طي الجميع</button>
                            </div>
                        )}
                    </header>

                    <div className="p-5">
                        {mode === 'add' && (
                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex flex-col items-center mb-6">
                                <p className="text-sm font-bold text-gray-600 text-center mb-4">تحدث عن مشروعك أو أهدافك، وسيقوم الذكاء بتقسيمها لهيكل متكامل (رئيسي ثم فرعي).</p>
                                <button onClick={() => { if(isRecording){recognitionRef.current?.stop();} else {recognitionRef.current?.start(); setIsRecording(true);} }} className={`w-20 h-20 rounded-full flex items-center justify-center transition-all shadow-xl mb-4 ${isRecording ? 'bg-red-500 text-white animate-pulse' : 'bg-slate-900 text-white'}`}>
                                    {isRecording ? <MicOff className="w-8 h-8" /> : <Mic className="w-8 h-8" />}
                                </button>
                                <textarea value={addText} onChange={(e) => setAddText(e.target.value)} placeholder="مثال: أريد تجهيز حقيبة السفر وشراء الهدايا..." className="w-full bg-gray-50 rounded-2xl p-4 text-sm font-medium resize-none h-32 focus:outline-none focus:ring-2 focus:ring-blue-200" />
                                <button onClick={handleAddWithAI} disabled={isAddingAI || !addText.trim()} className="mt-4 w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl flex justify-center gap-2 shadow-md hover:bg-blue-700 disabled:opacity-50">
                                    {isAddingAI ? <><Loader2 className="w-5 h-5 animate-spin"/> جاري التقسيم...</> : <><Robot className="w-5 h-5"/> تحويل لمهام بخطة ذكية</>}
                                </button>
                            </div>
                        )}

                        <div className="flex flex-col gap-2">
                            {plannedTasks.length === 0 && mode !== 'add' ? (
                                <div className="text-center py-20 text-gray-400 font-bold">لا توجد مهام مخطط لها حالياً.</div>
                            ) : (
                                renderTaskTree(plannedTasks)
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 9. الإدارة المالية (Finance System) ---
        const FinanceView = ({ entries, finances, setFinances, goToDashboard }) => {
            const [activeTab, setActiveTab] = useState('chart'); // chart, history
            const [selectedDate, setSelectedDate] = useState(null);

            // حساب النطاق المالي الحالي
            const range = useMemo(() => getFinancialMonthRange(new Date().toISOString()), []);
            
            // تصفية العمليات المالية في هذا النطاق
            const transactions = useMemo(() => {
                let allTx = [];
                const startStr = range.start.toISOString().split('T')[0];
                const endStr = range.end.toISOString().split('T')[0];
                
                Object.keys(entries).forEach(date => {
                    if (date >= startStr && date <= endStr && entries[date].finances?.transactions) {
                        entries[date].finances.transactions.forEach(tx => {
                            allTx.push({ ...tx, date });
                        });
                    }
                });
                return allTx.sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [entries, range]);

            // تجميع المصاريف حسب الأيام للرسم البياني
            const chartData = useMemo(() => {
                let daysMap = {};
                let currDate = new Date(range.start);
                while(currDate <= range.end) {
                    daysMap[currDate.toISOString().split('T')[0]] = 0;
                    currDate.setDate(currDate.getDate() + 1);
                }

                transactions.forEach(tx => {
                    if (tx.type === 'expense') {
                        if(daysMap[tx.date] !== undefined) daysMap[tx.date] += tx.amount;
                    }
                });

                return Object.keys(daysMap).map(date => {
                    const dObj = new Date(date);
                    return { date, dayNum: dObj.getDate(), displayScore: daysMap[date] };
                });
            }, [transactions, range]);

            const totalExpense = chartData.reduce((s, d) => s + d.displayScore, 0);

            return (
                <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-10">
                    <header className="bg-slate-900 p-6 pb-8 rounded-b-[2.5rem] shadow-xl relative text-white">
                        <div className="flex justify-between items-center mb-6 relative z-10">
                            <button onClick={goToDashboard} className="p-2 bg-white/10 rounded-full hover:bg-white/20"><ArrowRight className="w-5 h-5" /></button>
                            <h1 className="text-xl font-extrabold flex items-center gap-2"><Wallet className="w-6 h-6 text-green-400"/> الإدارة المالية</h1>
                            <div className="w-9"></div>
                        </div>
                        <div className="text-center relative z-10">
                            <p className="text-white/60 text-xs font-bold uppercase mb-1">الرصيد الحالي</p>
                            <div className="text-4xl font-black text-green-400 mb-2 flex justify-center items-center gap-2">
                                <span>{finances?.balance || 0}</span><span className="text-lg">SAR</span>
                            </div>
                            <p className="text-white/50 text-xs mt-4 bg-white/5 inline-block px-3 py-1 rounded-full border border-white/10">
                                الدورة المالية: {range.start.getDate()}/{range.start.getMonth()+1} - {range.end.getDate()}/{range.end.getMonth()+1}
                            </p>
                        </div>
                    </header>

                    <div className="px-5 mt-6">
                        <div className="flex bg-gray-200 p-1 rounded-xl mb-6">
                            <button onClick={() => setActiveTab('chart')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'chart' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}>الرسم البياني</button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${activeTab === 'history' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}>سجل العمليات</button>
                        </div>

                        {activeTab === 'chart' && (
                            <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold text-gray-800">مصاريف الدورة الحالية</h3>
                                    <span className="font-black text-rose-500 bg-rose-50 px-3 py-1 rounded-lg text-sm">{totalExpense} SAR</span>
                                </div>
                                <div className="h-64 w-full">
                                    {/* إعادة استخدام مكون LineChart وتمرير بيانات المصاريف */}
                                    <LineChartComponent data={chartData} totalItems={chartData.length} onPointClick={(d) => alert(`مصاريف يوم ${d.date}:\n${d.displayScore} ريال`)} zoomLevel={1.5} isFullscreen={false} chartMetric="financial" />
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="flex flex-col gap-3">
                                {transactions.length === 0 ? (
                                    <div className="text-center py-10 text-gray-400 font-bold">لا توجد عمليات مالية مسجلة.</div>
                                ) : (
                                    transactions.map((tx, idx) => (
                                        <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center ${tx.type === 'expense' ? 'bg-rose-100 text-rose-500' : 'bg-green-100 text-green-500'}`}>
                                                    {tx.type === 'expense' ? <TrendingDown className="w-5 h-5"/> : <TrendingUp className="w-5 h-5"/>}
                                                </div>
                                                <div>
                                                    <p className="font-bold text-gray-800 text-sm">{tx.desc} {tx.isEstimated && <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 rounded ml-1">تقديري</span>}</p>
                                                    <p className="text-xs text-gray-400 mt-0.5">{tx.date}</p>
                                                </div>
                                            </div>
                                            <div className={`font-black text-lg ${tx.type === 'expense' ? 'text-rose-500' : 'text-green-500'}`}>
                                                {tx.type === 'expense' ? '-' : '+'}{tx.amount}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- 10. واجهة لوحة التحكم (Dashboard) ---
        const DashboardView = ({ entries, criteria, globalApiKey, goToCalendar, goToYear, goToSettings, openKeyModal, savedInsights, saveDashboardInsightsData, plannedTasks, goToPlannedTasks, finances, goToFinance }) => {
          const [dashboardFilter, setDashboardFilter] = useState('40days');
          const [isBalanceHidden, setIsBalanceHidden] = useState(true);
          
          const currentSaved = savedInsights?.[dashboardFilter] || null;
          const [insights, setInsights] = useState(currentSaved?.data || null);
          const [dashboardChatHistory, setDashboardChatHistory] = useState(currentSaved?.chatHistory || []);
          const [isGeneratingInsights, setIsGeneratingInsights] = useState(false);
          const [dashboardChatInput, setDashboardChatInput] = useState("");
          const [isDashboardChatting, setIsDashboardChatting] = useState(false);
          const dashboardChatEndRef = useRef(null);
          const dashboardTopRef = useRef(null);
          const insightsRef = useRef(null);
          const prevDashChatLength = useRef(currentSaved?.chatHistory?.length || 0);

          useEffect(() => { dashboardTopRef.current?.scrollIntoView({ behavior: 'instant' }); }, []);

          useEffect(() => {
             const saved = savedInsights?.[dashboardFilter] || null;
             setInsights(saved?.data || null);
             setDashboardChatHistory(saved?.chatHistory || []);
          }, [dashboardFilter, savedInsights]);

          const filteredEntries = useMemo(() => {
            try {
              const now = new Date();
              const allKeys = Object.keys(entries || {});
              if (dashboardFilter === 'all') return allKeys.map(k => ({ date: k, ...entries[k] }));
              
              return allKeys.filter(key => {
                const d = new Date(key);
                if (isNaN(d.getTime())) return false;
                if (dashboardFilter === '40days') return (now - d) <= (40 * 24 * 60 * 60 * 1000);
                if (dashboardFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if (dashboardFilter === 'year') return d.getFullYear() === now.getFullYear();
                return true;
              }).map(k => ({ date: k, ...entries[k] }));
            } catch (e) { return []; }
          }, [entries, dashboardFilter]);

          const stats = useMemo(() => {
            if (!filteredEntries || filteredEntries.length === 0) return { avg: "0.0", totalTasks: 0, criteriaScores: {} };
            let sumAvg = 0, tTasks = 0;
            let cScores = {}; let cCounts = {}; 

            criteria.forEach(c => {
                cScores[c.id] = 0; cCounts[c.id] = 0;
                if(c.subCriteria) c.subCriteria.forEach(s => { cScores[s.id] = 0; cCounts[s.id] = 0; });
            });
            
            filteredEntries.forEach(e => {
              sumAvg += parseFloat(e.averageScore || 0);
              tTasks += (Array.isArray(e?.tasks) ? e.tasks.length : 0);
              
              criteria.forEach(c => { 
                  cScores[c.id] += getCategoryScore(e?.scores, c); cCounts[c.id]++; 
                  if(c.subCriteria) {
                      c.subCriteria.forEach(sub => {
                          if (e.scores && e.scores[sub.id] !== undefined && !isNaN(e.scores[sub.id])) {
                              cScores[sub.id] += parseFloat(e.scores[sub.id]); cCounts[sub.id]++;
                          }
                      });
                  }
              });
            });
            
            const len = filteredEntries.length;
            let finalScores = {};
            criteria.forEach(c => { 
                finalScores[c.id] = cCounts[c.id] > 0 ? (cScores[c.id] / cCounts[c.id]).toFixed(1) : "0.0"; 
                if(c.subCriteria) {
                    c.subCriteria.forEach(sub => {
                        finalScores[sub.id] = cCounts[sub.id] > 0 ? (cScores[sub.id] / cCounts[sub.id]).toFixed(1) : "0.0";
                    });
                }
            });

            return { avg: (sumAvg / len).toFixed(1), totalTasks: tTasks, criteriaScores: finalScores };
          }, [filteredEntries, criteria]);

          const plannedTasksStats = useMemo(() => {
              let mainCount = 0; let subCount = 0;
              plannedTasks.forEach(p => {
                  if(!p.isCompleted) {
                      mainCount++;
                      if(p.children) p.children.forEach(s => { if(!s.isCompleted) subCount++; });
                  }
              });
              return { mainCount, subCount };
          }, [plannedTasks]);

          useEffect(() => { 
            if (dashboardChatHistory && dashboardChatHistory.length > prevDashChatLength.current) {
              dashboardChatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); 
            }
            prevDashChatLength.current = dashboardChatHistory?.length || 0;
          }, [dashboardChatHistory]);

          const handleGenerateInsights = async () => {
              if (filteredEntries.length === 0 || !globalApiKey) return;
              setIsGeneratingInsights(true);
              try { 
                const res = await generateDashboardInsightsAI(filteredEntries, criteria, finances, globalApiKey); 
                if (res) {
                    const todayStr = `${new Date().getFullYear()}/${new Date().getMonth() + 1}/${new Date().getDate()}`;
                    await saveDashboardInsightsData(dashboardFilter, res, [], todayStr);
                    setTimeout(() => { insightsRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 500);
                }
              } catch(e) { alert(e.message); } 
              finally { setIsGeneratingInsights(false); }
          };

          const handleDashboardChatSendMessage = async () => {
              if (!dashboardChatInput.trim() || !insights) return;
              if (!globalApiKey) return alert("المفتاح العام غير متوفر.");
              
              const userMsg = dashboardChatInput;
              setDashboardChatInput("");
              
              const newHistory = [...dashboardChatHistory, { sender: 'user', text: userMsg }];
              setDashboardChatHistory(newHistory);
              setIsDashboardChatting(true);
              
              try {
                const aiResponse = await chatWithDashboardAI(insights, newHistory, userMsg, globalApiKey);
                const finalHistory = [...newHistory, { sender: 'ai', text: aiResponse.reply || "تم تحديث البيانات المرافقة." }];
                
                let newInsightsData = { ...insights };
                if (aiResponse.updated_insights) {
                  newInsightsData = {
                    ...newInsightsData,
                    ...(aiResponse.updated_insights.general_description ? {general_description: aiResponse.updated_insights.general_description} : {}),
                    ...(aiResponse.updated_insights.general_suggestions ? {general_suggestions: aiResponse.updated_insights.general_suggestions} : {}),
                  };
                }

                await saveDashboardInsightsData(dashboardFilter, newInsightsData, finalHistory, currentSaved?.lastUpdated);
              } catch(e) {
                 setDashboardChatHistory([...newHistory, { sender: 'ai', text: "عذراً، حدث خطأ أثناء الاتصال بالذكاء الاصطناعي." }]);
              } finally { setIsDashboardChatting(false); }
          };

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-32">
              <div ref={dashboardTopRef} />
              
              {/* Header Container */}
              <div className="bg-slate-900 rounded-b-[2.5rem] shadow-xl overflow-hidden mb-6">
                  <header className="p-6 pb-8 relative z-10 text-white">
                    <div className="flex justify-between items-center mb-6">
                      <h1 className="text-xl font-extrabold flex items-center gap-2"><LayoutDashboard className="text-xl text-blue-400" /> إحصائياتي</h1>
                      <div className="flex gap-2">
                        <select value={dashboardFilter} onChange={(e) => setDashboardFilter(e.target.value)} className="bg-white/10 text-white text-sm border border-white/20 outline-none focus:ring-2 focus:ring-blue-400 rounded-xl px-2 py-2 font-medium">
