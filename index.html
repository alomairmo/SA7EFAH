        // ==========================================

        const myFirebaseConfig = {

        // ==========================================
        // 3. نظام الحماية من الانهيار (Error Boundary)
        // ==========================================
        class ErrorBoundary extends Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, errorMsg: '' };
          }
          static getDerivedStateFromError(error) {
            return { hasError: true, errorMsg: error.toString() };
          }
          componentDidCatch(error, errorInfo) {
            console.error("App crashed:", error, errorInfo);
          }
          render() {
            if (this.state.hasError) {
              return (
                <div className="flex flex-col items-center justify-center h-[100dvh] bg-slate-900 p-6 text-center" dir="rtl">
                  <AlertCircle className="text-6xl text-red-500 mb-4" />
                  <h1 className="text-2xl font-bold text-red-500 mb-2">عذراً، حدث خطأ في النظام</h1>
                  <p className="text-gray-400 mb-6 text-sm max-w-sm" dir="ltr">{this.state.errorMsg}</p>
                  <button onClick={() => window.location.reload()} className="px-6 py-3 font-bold bg-red-600 text-white rounded-xl shadow-lg hover:bg-red-700">إعادة تحميل التطبيق</button>
                </div>
              );
            }
            return this.props.children;
          }
        }

        // ==========================================
        // 4. استكشاف الذكاء الاصطناعي التلقائي
        // ==========================================
        const getValidGeminiModel = async (apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          if (window.discoveredModelCache) return window.discoveredModelCache;

          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const data = await res.json();
            
            if (data.error) throw new Error(data.error.message);

            if (data.models && data.models.length > 0) {
              const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent"));
              let selected = validModels.find(m => m.name === 'models/gemini-1.5-flash') ||
                             validModels.find(m => m.name.includes("flash")) ||
                             validModels.find(m => m.name.includes("pro")) ||
                             validModels[0];
              
              if (selected) {
                window.discoveredModelCache = selected.name.replace('models/', '');
                return window.discoveredModelCache;
              }
            }
            throw new Error("المفتاح لا يدعم توليد النصوص.");
          } catch(e) { 
            if (e.message === "API_KEY_MISSING") throw e;
            return "gemini-1.5-flash"; 
          }
        };

        // ==========================================
        // 5. الإعدادات والمعايير الافتراضية
        // ==========================================
        const IconMap = { Brain, Star, Heart, Users, Briefcase, Activity, Book, Coffee, Music, Sun, Moon, Zap, Shield, Target, Smile, Compass, Feather, Flame };
        
        const availableColors = [
          { main: 'bg-purple-500', light: 'bg-purple-50', text: 'text-purple-600' },
          { main: 'bg-sky-500', light: 'bg-sky-50', text: 'text-sky-600' },
          { main: 'bg-rose-500', light: 'bg-rose-50', text: 'text-rose-600' },
          { main: 'bg-orange-500', light: 'bg-orange-50', text: 'text-orange-600' },
          { main: 'bg-emerald-500', light: 'bg-emerald-50', text: 'text-emerald-600' },
          { main: 'bg-indigo-500', light: 'bg-indigo-50', text: 'text-indigo-600' },
          { main: 'bg-amber-500', light: 'bg-amber-50', text: 'text-amber-600' },
          { main: 'bg-teal-500', light: 'bg-teal-50', text: 'text-teal-600' },
          { main: 'bg-pink-500', light: 'bg-pink-50', text: 'text-pink-600' },
        ];
        
        const defaultCriteria = [
          { 
            id: 'mental', label: 'عقلية وعلمية', icon: 'Brain', desc: '', colorObj: availableColors[0],
            subCriteria: [{id: 'ment_read', label: 'القراءة والتعلم', desc: ''}, {id: 'ment_focus', label: 'التركيز والإنتاجية', desc: ''}]
          },
          { 
            id: 'spiritual', label: 'روحية', icon: 'Star', desc: '', colorObj: availableColors[1],
            subCriteria: [{id: 'spir_pray', label: 'الصلوات والعبادات', desc: ''}, {id: 'spir_quran', label: 'القرآن والأذكار', desc: ''}]
          },
          { 
            id: 'physical', label: 'جسدية', icon: 'Heart', desc: '', colorObj: availableColors[2],
            subCriteria: [{id: 'phys_sport', label: 'الرياضة والحركة', desc: ''}, {id: 'phys_food', label: 'التغذية الصحية', desc: ''}, {id: 'phys_sleep', label: 'النوم والراحة', desc: ''}]
          },
          { 
            id: 'social', label: 'اجتماعية', icon: 'Users', desc: '', colorObj: availableColors[3],
            subCriteria: [{id: 'soc_family', label: 'العائلة والوالدين', desc: ''}, {id: 'soc_friends', label: 'الأصدقاء والعلاقات', desc: ''}]
          },
          { 
            id: 'career', label: 'وظيفية ومالية', icon: 'Briefcase', desc: '', colorObj: availableColors[4],
            subCriteria: [{id: 'car_work', label: 'إنجاز العمل', desc: ''}, {id: 'car_money', label: 'الإدارة المالية', desc: ''}]
          },
        ];

        const getCategoryScore = (entryScores, category) => {
            if (!entryScores) return 0;
            if (category.subCriteria && category.subCriteria.length > 0) {
               let sum = 0, count = 0;
               category.subCriteria.forEach(sub => {
                   if (entryScores[sub.id] !== undefined && !isNaN(entryScores[sub.id])) {
                       sum += Number(entryScores[sub.id]);
                       count++;
                   }
               });
               if (count > 0) return sum / count;
            }
            return Number(entryScores[category.id]) || 0;
        };

        const calculateOverallAverage = (scores, criteria) => {
            if (!scores || !criteria || criteria.length === 0) return "0.0";
            let totalSum = 0;
            let totalCount = 0;
            criteria.forEach(c => {
                let catScore = getCategoryScore(scores, c);
                totalSum += catScore;
                totalCount++;
            });
            return totalCount > 0 ? (totalSum / totalCount).toFixed(1) : "0.0";
        };

        const cleanJSONString = (str) => {
          if (!str) return "";
          try {
            let cleaned = str.replace(/```json/gi, '').replace(/```/g, '').trim();
            cleaned = cleaned.replace(/,\s*([\]}])/g, '$1'); 
            return cleaned;
          } catch (e) { return ""; }
        };

        const fetchWithRetry = async (url, payload, retries = 3) => {
          let lastError = null;
          for (let attempt = 1; attempt <= retries; attempt++) {
            try {
              const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              const data = await response.json();
              
              if (!response.ok) {
                  if(data.error?.message?.includes("Quota") || response.status === 429) {
                      throw new Error("تجاوزت حد الطلبات المجانية. يرجى الانتظار لمدة دقيقة والمحاولة مجدداً.");
                  }
                  throw new Error(data.error?.message || `خطأ اتصال مع الخادم`);
              }

              const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (!resultText) throw new Error("استجابة فارغة من الذكاء الاصطناعي");
              return JSON.parse(cleanJSONString(resultText));
            } catch (err) {
              lastError = err;
              if (err.message.includes("تجاوزت حد الطلبات المجانية")) break; 
              if (attempt === retries) break;
              await new Promise(res => setTimeout(res, 1500 * attempt));
            }
          }
          throw lastError;
        };

        const buildSafePayload = (modelName, systemPrompt, userParts, schemaProperties, requiredKeys) => {
            const isAdvanced = modelName.includes("1.5") || modelName.includes("2.0") || modelName.includes("flash");
            let payload = { contents: [{ role: "user", parts: userParts }] };

            if (isAdvanced) {
                payload.systemInstruction = { parts: [{ text: systemPrompt }] };
                if (schemaProperties) {
                    payload.generationConfig = { 
                        responseMimeType: "application/json", 
                        responseSchema: { type: "OBJECT", properties: schemaProperties, required: requiredKeys } 
                    };
                }
            } else {
                const reqText = requiredKeys ? `\nيجب إرجاع JSON حصراً بالمفاتيح التالية: ${requiredKeys.join(', ')}` : "\nأرجع JSON فقط.";
                payload.contents[0].parts.unshift({ text: "تعليمات النظام:\n" + systemPrompt + reqText + "\n\n" });
            }
            return payload;
        };

        const analyzeJournalWithAI = async (combinedText, audioData, recentEntries, criteria, plannedTasks, apiKey) => {
          if (!apiKey) throw new Error("مفتاح الذكاء الاصطناعي مفقود.");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          
          let recentContext = "لا توجد سجلات سابقة للمقارنة.";
          if (recentEntries && recentEntries.length > 0) {
            recentContext = `الأيام السابقة:\n` + recentEntries.map(e => `- ${e.date}: تقييم (${e.averageScore}/10). التفاصيل: ${JSON.stringify(e.scores)}`).join('\n');
          }

          let plannedTasksContext = "لا توجد مهام مخطط لها.";
          if (plannedTasks && plannedTasks.length > 0) {
            const availableTasks = [];
            plannedTasks.forEach(t => {
                if (!t.completed) availableTasks.push(`- رئيسية: ${t.label} (ID: ${t.id})`);
                if (t.subTasks) t.subTasks.forEach(st => {
                    if (!st.completed) availableTasks.push(`  - ثانوية: ${st.label} (ID: ${st.id})`);
                });
            });
            if (availableTasks.length > 0) plannedTasksContext = "المهام المخطط لها المتاحة:\n" + availableTasks.join('\n');
          }

          let criteriaPrompt = "المعايير المطلوبة للتقييم:\n";
          let dynamicProperties = { 
            transcript: { type: "STRING", description: "تفريغ الصوت فقط (إن وجد)." },
            tasks: { type: "ARRAY", items: { type: "STRING" }, description: "قائمة المهام والأعمال المنجزة كجمل قصيرة." }, 
            title: { type: "STRING", description: "لقب يصف اليوم (4 كلمات أقصى حد)." },
            comparison: { type: "STRING", description: "قارن الأداء بأسلوب مشجع." },
            tips: { type: "STRING", description: "نصائح للتحسين." },
            finance: { 
                type: "OBJECT",
                description: "استخراج البيانات المالية من النص والحديث",
                properties: {
                    income: { type: "NUMBER", description: "المدخولات أو المبالغ المستلمة اليوم" },
                    expenses: { type: "ARRAY", description: "المشتريات والمصروفات اليومية. إذا لم يذكر السعر ضع قيمة تقديرية بناءً على السوق.", items: { type: "OBJECT", properties: { name: { type: "STRING" }, cost: { type: "NUMBER" }, isEstimate: { type: "BOOLEAN" } } } }
                }
            },
            completed_planned_tasks_ids: { type: "ARRAY", items: { type: "STRING" }, description: "تحديد IDs من قائمة المهام المخطط لها التي تم ذكر إنجازها في التقرير اليومي ليتم شطبها تلقائياً." }
          };
          let requiredKeys = ["transcript", "tasks", "title", "comparison", "tips", "finance", "completed_planned_tasks_ids"];

          criteria.forEach(c => {
             if (c.subCriteria && c.subCriteria.length > 0) {
                c.subCriteria.forEach(sub => {
                   const desc = sub.desc || `قيّم مستوى إنجاز ${sub.label}`;
                   criteriaPrompt += `- ${c.label} -> ${sub.label}: ${desc}\n`;
                   dynamicProperties[`score_${sub.id}`] = { type: "INTEGER", description: `تقييم ${sub.label} (0-10)` };
                   dynamicProperties[`detail_${sub.id}`] = { type: "STRING", description: `سبب التقييم لـ ${sub.label} (سطر واحد)` };
                   requiredKeys.push(`score_${sub.id}`, `detail_${sub.id}`);
                });
             } else {
                const desc = c.desc || 'استنتج التقييم';
                criteriaPrompt += `- ${c.label}: ${desc}\n`;
                dynamicProperties[`score_${c.id}`] = { type: "INTEGER", description: `تقييم ${c.label} (0-10)` };
                dynamicProperties[`detail_${c.id}`] = { type: "STRING", description: `سبب التقييم لـ ${c.label} (سطر واحد)` };
                requiredKeys.push(`score_${c.id}`, `detail_${c.id}`);
             }
          });

          const systemPrompt = `أنت محلل حياة. حلل يوميات المستخدم بدقة. 
اللقب: 4 كلمات كحد أقصى.
المهام: استخرجها جميعاً كمصفوفة نصوص قصيرة.
ابحث في "المهام المخطط لها" المتاحة وإذا ذكر المستخدم إنجاز شيء منها ارجع الـ ID الخاص به في completed_planned_tasks_ids.
استخرج النفقات والدخول المالية، وإذا ذُكر شراء شيء دون سعر ضع سعراً تقديرياً معقولاً واشر أنه تقديري.
التقييم: 0-10 لكل معيار مبيّن مع التبرير.
${recentContext}
${plannedTasksContext}
${criteriaPrompt}`;

          const parts = [];
          if (combinedText && combinedText.trim() !== "") parts.push({ text: `نص أحداث اليوم:\n${combinedText}` });
          if (audioData) {
            parts.push({ inlineData: { mimeType: audioData.mimeType, data: audioData.base64 } });
            parts.push({ text: "\nفرّغ الصوت وحلله مع النص لاستخراج كافة المعلومات بما فيها المالية وإنجاز الخطط." });
          } else if (!combinedText || combinedText.trim() === "") throw new Error("لا يوجد نص أو صوت.");

          const payload = buildSafePayload(modelName, systemPrompt, parts, dynamicProperties, requiredKeys);
          return await fetchWithRetry(url, payload);
        };

        const chatWithJournalAI = async (currentEntry, chatHistory, userMessage, criteria, apiKey) => {
          if (!apiKey) throw new Error("مفتاح الذكاء الاصطناعي مفقود.");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const historyContext = chatHistory.map(msg => `${msg.sender === 'user' ? 'المستخدم' : 'الذكاء الاصطناعي'}: ${msg.text}`).join('\n');
          
          let scoresContext = "";
          let idMapText = "معرفات الجوانب (IDs) المتاحة للتقييم:\n";
          let dynamicProperties = { 
            reply: { type: "STRING" }, title: { type: "STRING", description: "تحديث اللقب إن لزم الأمر (أقصى 4 كلمات)" },
            tasks: { type: "ARRAY", items: { type: "STRING" }, description: "تحديث قائمة المهام." },
            learned_rule: {
              type: "OBJECT",
              description: "إذا قام المستخدم بتوجيهك لإضافة قاعدة تقييم جديدة، ضعها هنا.",
              properties: { target_id: { type: "STRING" }, rule_text: { type: "STRING" } }
            }
          };
          
          criteria.forEach(c => { 
             idMapText += `- رئيسي: "${c.label}" (ID: ${c.id})\n`;
             if (c.subCriteria && c.subCriteria.length > 0) {
                 c.subCriteria.forEach(sub => {
                     idMapText += `  - فرعي: "${sub.label}" (ID: ${sub.id})\n`;
                     scoresContext += `${sub.label}(${currentEntry.scores?.[sub.id] || 0}), `;
                     dynamicProperties[`score_${sub.id}`] = { type: "INTEGER" };

                    <input type="checkbox" id="rememberMe" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer" />
                    <label htmlFor="rememberMe" className="text-xs font-bold text-gray-600 cursor-pointer select-none">تذكرني (البقاء متصلاً)</label>

                  {error && <div className="text-red-600 text-xs font-bold bg-red-50 p-3 rounded-lg flex items-start gap-2"><AlertCircle className="text-sm shrink-0 mt-0.5" /><span>{error}</span></div>}
                  <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white font-bold text-lg rounded-xl py-3.5 shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition mt-2 flex justify-center items-center gap-2">
                    {loading ? <><Loader className="text-lg animate-spin" /><span>جاري التحميل...</span></> : (isLogin ? <><LogIn className="text-lg"/><span>تسجيل الدخول</span></> : <><UserPlus className="text-lg"/><span>إنشاء حساب</span></>)}
                  </button>
                </form>
                <div className="mt-6 flex flex-col gap-4 relative z-10">
                  <button onClick={() => {setIsLogin(!isLogin); setError('');}} className="text-sm font-bold text-gray-500 hover:text-blue-600 transition">
                    <span>{isLogin ? "ليس لديك حساب؟ سجل الآن" : "لديك حساب بالفعل؟ سجل دخولك"}</span>
                  </button>
                </div>
              </div>

          );
        };

        const SettingsView = ({ criteria, saveCriteria, goToDashboard }) => {
          const [editingId, setEditingId] = useState(null);
          const [formData, setFormData] = useState({ label: '', desc: '', icon: '' }); // Default empty to auto-assign
          const [isFormOpen, setIsFormOpen] = useState(false);
          const [showIconModal, setShowIconModal] = useState(false);

          const handleEditMain = (c) => { 
             setEditingId(c.id); 
             setFormData({ label: c.label, desc: c.desc || '', icon: c.icon }); 
             setIsFormOpen(true);
             setTimeout(() => {
                document.getElementById('main-category-form')?.scrollIntoView({ behavior: 'smooth' });
             }, 100);
          };

          const handleDeleteMain = (id) => {
            if (criteria.length <= 1) return alert("يجب أن يكون هناك جانب رئيسي واحد على الأقل.");
            if (window.confirm("تحذير: سيتم حذف هذا الجانب الرئيسي وجميع فروعه بالكامل. هل أنت متأكد؟")) {
              saveCriteria(criteria.filter(c => c.id !== id));
            }
          };

          const handleSaveMain = () => {
            if (!formData.label.trim()) return alert("اسم الجانب الرئيسي مطلوب");
            
            let iconToSave = formData.icon;
            if (!iconToSave) {
               const usedIcons = criteria.map(c => c.icon);
               const availableIcons = Object.keys(IconMap).filter(k => !usedIcons.includes(k));
               if (availableIcons.length > 0) {
                  iconToSave = availableIcons[Math.floor(Math.random() * availableIcons.length)];
               } else {
                  iconToSave = 'Star';
               }
            }

            if (editingId) {
              saveCriteria(criteria.map(c => c.id === editingId ? { ...c, label: formData.label, desc: formData.desc, icon: iconToSave } : c));
            } else {
              const newId = `crit_${Date.now()}`;
              const randomColor = availableColors[Math.floor(Math.random() * availableColors.length)];
              saveCriteria([...criteria, { id: newId, label: formData.label, desc: formData.desc, icon: iconToSave, colorObj: randomColor, subCriteria: [] }]);
            }
            setEditingId(null); setFormData({ label: '', desc: '', icon: '' }); setIsFormOpen(false);
          };

          const cancelEditMain = () => {
            setEditingId(null); setFormData({ label: '', desc: '', icon: '' }); setIsFormOpen(false);
          };

          const handleAddSub = (parentId) => {
             const newSub = { id: `sub_${Date.now()}`, label: 'جانب فرعي جديد', desc: '' };
             const updated = criteria.map(c => {
                if(c.id === parentId) return {...c, subCriteria: [...(c.subCriteria||[]), newSub]};
                return c;
             });
             saveCriteria(updated);
          };

          const handleUpdateSub = (parentId, subId, field, value) => {
             const updated = criteria.map(c => {
                if(c.id === parentId) {
                   const updatedSubs = c.subCriteria.map(sub => sub.id === subId ? {...sub, [field]: value} : sub);
                   return {...c, subCriteria: updatedSubs};
                }
                return c;
             });
             saveCriteria(updated);
          };

          const handleDeleteSub = (parentId, subId) => {
             if(window.confirm("حذف هذا الجانب الفرعي؟")) {
                const updated = criteria.map(c => {
                   if(c.id === parentId) {
                      return {...c, subCriteria: c.subCriteria.filter(sub => sub.id !== subId)};
                   }
                   return c;
                });
                saveCriteria(updated);
             }
          };

          const handleLogout = () => { if(auth) auth.signOut(); };

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-10">
              <header className="bg-white p-6 pb-6 shadow-sm rounded-b-[2.5rem] flex justify-between items-center sticky top-0 z-20">
                <button onClick={goToDashboard} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ArrowRight className="text-lg text-gray-700" /></button>
                <h1 className="text-xl font-black text-gray-800">إعدادات المعايير</h1>
                <button onClick={handleLogout} className="p-2 bg-red-50 text-red-600 rounded-full hover:bg-red-100" title="تسجيل الخروج"><LogOut className="text-lg" /></button>
              </header>

              <div className="p-5">
                <div className="bg-blue-50 border border-blue-100 p-4 rounded-2xl mb-6 text-sm text-blue-800 font-medium">
                  هنا يمكنك إدارة "الجوانب الرئيسية" للتقييم، وإضافة "جوانب فرعية" تندرج تحتها ليقوم الذكاء الاصطناعي بتقييمها بدقة مفصلة.
                </div>

                <h3 className="text-gray-500 font-bold text-sm mb-3 px-1">الجوانب الحالية ({criteria.length})</h3>
                <div className="flex flex-col gap-5 mb-6">
                  {criteria.map(c => {
                    const IconComp = IconMap[c.icon] || Star;
                    return (
                      <div key={c.id} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        
                        <div className="flex items-start justify-between mb-4 pb-4 border-b border-gray-100">
                          <div className="flex items-start gap-3">
                            <div className={`w-10 h-10 flex items-center justify-center rounded-xl ${c.colorObj.main}`}><IconComp className="text-white" /></div>
                            <div>
                              <h4 className="font-black text-gray-800 text-base">{c.label}</h4>
                              {c.desc && <p className="text-xs text-gray-500 mt-1 max-w-[200px] leading-relaxed break-words whitespace-pre-wrap">{c.desc}</p>}
                            </div>
                          </div>
                          <div className="flex gap-1">
                            <button onClick={() => handleEditMain(c)} className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition" title="تعديل الرئيسي"><Edit className="text-sm" /></button>
                            <button onClick={() => handleDeleteMain(c.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition" title="حذف الرئيسي"><Trash className="text-sm" /></button>
                          </div>
                        </div>
                        
                        <div className="flex flex-col gap-3 pr-6 border-r-2 border-gray-100 mr-2">
                           <div className="text-xs font-bold text-gray-400 mb-1">الفروع التابعة:</div>
                           {(c.subCriteria || []).map(sub => (
                             <div key={sub.id} className="bg-gray-50 p-3 rounded-xl border border-gray-200 flex flex-col gap-2 relative group">
                                <div className="flex justify-between items-center">
                                   <input type="text" value={sub.label} onChange={(e) => handleUpdateSub(c.id, sub.id, 'label', e.target.value)} className="bg-transparent font-bold text-sm text-gray-800 focus:outline-none focus:border-b border-blue-500 w-1/2" placeholder="اسم الفرع..." />
                                   <button onClick={() => handleDeleteSub(c.id, sub.id)} className="text-red-400 hover:text-red-600 p-1 opacity-0 group-hover:opacity-100 transition"><Trash className="text-xs" /></button>
                                </div>
                                <textarea value={sub.desc} onChange={(e) => handleUpdateSub(c.id, sub.id, 'desc', e.target.value)} className="bg-transparent text-xs text-gray-500 focus:outline-none w-full resize-none h-14 whitespace-pre-wrap" placeholder="قواعد وشرح الذكاء الاصطناعي..."></textarea>
                             </div>
                           ))}
                           <button onClick={() => handleAddSub(c.id)} className="flex items-center gap-2 text-blue-600 font-bold text-xs p-2 hover:bg-blue-50 rounded-lg w-fit transition mt-1">
                             <Plus className="text-xs" /> <span>إضافة جانب فرعي جديد</span>
                           </button>
                        </div>
                      </div>
                    )
                  })}
                </div>

                {!isFormOpen ? (
                   <button onClick={() => setIsFormOpen(true)} className="w-full flex items-center justify-center gap-2 bg-blue-50 text-blue-600 font-bold p-4 rounded-2xl border border-blue-100 hover:bg-blue-100 transition">
                     <Plus className="text-lg" /> <span>إضافة جانب رئيسي جديد</span>
                   </button>
                ) : (
                  <div id="main-category-form" className="bg-white rounded-3xl p-5 shadow-sm border border-blue-200 mt-2 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                    <h2 className="text-gray-800 font-bold mb-4 flex items-center gap-2">
                      {editingId ? <><Edit3 className="text-blue-500 text-lg"/> <span>تعديل الجانب الرئيسي</span></> : <><Plus className="text-blue-500 text-lg"/> <span>إضافة جانب رئيسي جديد</span></>}
                    </h2>
                    <div className="flex flex-col gap-4">
                      <div>
                        <label className="text-xs font-bold text-gray-500 mb-2 block">الأيقونة</label>
                        <button onClick={() => setShowIconModal(true)} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-4 flex items-center justify-between hover:bg-blue-50 transition text-right">
                           <span className="text-sm font-bold text-gray-600">{formData.icon ? 'تم اختيار الأيقونة بنجاح' : 'اضغط لاختيار أيقونة (أو سيتم الاختيار تلقائياً)'}</span>
                           {formData.icon ? React.createElement(IconMap[formData.icon], {className: "text-xl text-blue-600"}) : <Grid className="text-xl text-gray-400" />}
                        </button>
                      </div>
                      <div>
                        <label className="text-xs font-bold text-gray-500 mb-1 block">اسم الجانب الرئيسي</label>
                        <input type="text" value={formData.label} onChange={e => setFormData({...formData, label: e.target.value})} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="مثال: الصحة النفسية..." />
                      </div>
                      <div>
                        <label className="text-xs font-bold text-gray-500 mb-1 block">شرح الجانب للذكاء الاصطناعي (اختياري)</label>
                        <textarea value={formData.desc} onChange={e => setFormData({...formData, desc: e.target.value})} rows="2" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="اكتب تعليمات مخصصة ليراعيها الذكاء الاصطناعي..."></textarea>
                      </div>
                      <div className="flex gap-2 mt-2">
                        <button onClick={handleSaveMain} className="flex-1 bg-blue-600 text-white font-bold rounded-xl py-3 shadow-md hover:bg-blue-700 transition">حفظ الجانب الرئيسي</button>
                        <button onClick={cancelEditMain} className="px-4 bg-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-300 transition">إلغاء</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* نافذة اختيار الأيقونات */}
              {showIconModal && (
                <div className="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                    <div className="flex justify-between items-center mb-6">
                       <h3 className="font-black text-gray-800 text-lg">اختر أيقونة</h3>
                       <button onClick={() => setShowIconModal(false)} className="p-2 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-full transition"><X className="text-sm" /></button>
                    </div>
                    <div className="grid grid-cols-5 gap-3 max-h-[50vh] overflow-y-auto p-1 scrollbar-hide" dir="ltr">
                       {Object.keys(IconMap).map(iconName => {
                          const IconComp = IconMap[iconName];
                          const isSelected = formData.icon === iconName;
                          const isUsed = criteria.some(c => c.icon === iconName) && !isSelected;
                          return (
                             <button key={iconName} onClick={() => { setFormData({...formData, icon: iconName}); setShowIconModal(false); }}
                               className={`aspect-square flex items-center justify-center rounded-2xl transition-all ${isSelected ? 'bg-blue-600 text-white shadow-lg scale-110' : isUsed ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'bg-gray-50 text-gray-600 hover:bg-blue-50 hover:text-blue-600'}`}
                               disabled={isUsed && !isSelected}
                             >
                               <IconComp className="text-xl" />
                             </button>
                          )
                       })}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const DashboardView = ({ entries, criteria, globalApiKey, goToCalendar, goToYear, goToSettings, openKeyModal, savedInsights, saveDashboardInsightsData, plannedTasks = [], financialState, goToPlannedTasks, goToFinancialDetails }) => {
          const [dashboardFilter, setDashboardFilter] = useState('40days');
          const [isBalanceVisible, setIsBalanceVisible] = useState(false);
          
          const currentSaved = savedInsights?.[dashboardFilter] || null;
          const [insights, setInsights] = useState(currentSaved?.data || null);
          const [dashboardChatHistory, setDashboardChatHistory] = useState(currentSaved?.chatHistory || []);
          const [isGeneratingInsights, setIsGeneratingInsights] = useState(false);
          const [dashboardChatInput, setDashboardChatInput] = useState("");
          const [isDashboardChatting, setIsDashboardChatting] = useState(false);
          const dashboardChatEndRef = useRef(null);
          const dashboardTopRef = useRef(null);
          const insightsRef = useRef(null);
          const prevDashChatLength = useRef(currentSaved?.chatHistory?.length || 0);

          useEffect(() => { dashboardTopRef.current?.scrollIntoView({ behavior: 'instant' }); }, []);

          useEffect(() => {
             const saved = savedInsights?.[dashboardFilter] || null;
             setInsights(saved?.data || null);
             setDashboardChatHistory(saved?.chatHistory || []);
          }, [dashboardFilter, savedInsights]);

          const filteredEntries = useMemo(() => {
            try {
              const now = new Date();
              const allKeys = Object.keys(entries || {});
              if (dashboardFilter === 'all') return allKeys.map(k => ({ date: k, ...entries[k] }));
              
              return allKeys.filter(key => {
                const d = new Date(key);
                if (isNaN(d.getTime())) return false;
                if (dashboardFilter === '40days') return (now - d) <= (40 * 24 * 60 * 60 * 1000);
                if (dashboardFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if (dashboardFilter === 'year') return d.getFullYear() === now.getFullYear();
                return true;
              }).map(k => ({ date: k, ...entries[k] }));
            } catch (e) { return []; }
          }, [entries, dashboardFilter]);

          const stats = useMemo(() => {
            if (!filteredEntries || filteredEntries.length === 0) return { avg: "0.0", totalTasks: 0, criteriaScores: {} };
            let sumAvg = 0, tTasks = 0;
            let cScores = {};
            let cCounts = {}; 

            criteria.forEach(c => {
                cScores[c.id] = 0; cCounts[c.id] = 0;
                if(c.subCriteria) c.subCriteria.forEach(s => { cScores[s.id] = 0; cCounts[s.id] = 0; });
            });
            
            filteredEntries.forEach(e => {
              sumAvg += parseFloat(e.averageScore || 0);
              tTasks += (Array.isArray(e?.tasks) ? e.tasks.length : 0);
              
              criteria.forEach(c => { 
                  cScores[c.id] += getCategoryScore(e?.scores, c); 
                  cCounts[c.id]++; 
                  
                  if(c.subCriteria) {
                      c.subCriteria.forEach(sub => {
                          if (e.scores && e.scores[sub.id] !== undefined && !isNaN(e.scores[sub.id])) {
                              cScores[sub.id] += parseFloat(e.scores[sub.id]);
                              cCounts[sub.id]++;
                          }
                      });
                  }
              });
            });
            
            const len = filteredEntries.length;
            let finalScores = {};
            criteria.forEach(c => { 
                finalScores[c.id] = cCounts[c.id] > 0 ? (cScores[c.id] / cCounts[c.id]).toFixed(1) : "0.0"; 
                if(c.subCriteria) {
                    c.subCriteria.forEach(sub => {
                        finalScores[sub.id] = cCounts[sub.id] > 0 ? (cScores[sub.id] / cCounts[sub.id]).toFixed(1) : "0.0";
                    });
                }
            });

            return { avg: (sumAvg / len).toFixed(1), totalTasks: tTasks, criteriaScores: finalScores };
          }, [filteredEntries, criteria]);

          useEffect(() => { 
            if (dashboardChatHistory && dashboardChatHistory.length > prevDashChatLength.current) {
              dashboardChatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); 
            }
            prevDashChatLength.current = dashboardChatHistory?.length || 0;
          }, [dashboardChatHistory]);

          const handleGenerateInsights = async () => {
              if (filteredEntries.length === 0 || !globalApiKey) return;
              setIsGeneratingInsights(true);
              try { 
                const res = await generateDashboardInsightsAI(filteredEntries, criteria, globalApiKey); 
                if (res) {
                    const todayStr = `${new Date().getFullYear()}/${new Date().getMonth() + 1}/${new Date().getDate()}`;
                    await saveDashboardInsightsData(dashboardFilter, res, [], todayStr);
                    setTimeout(() => {
                        insightsRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 500);
                }
              } catch(e) { alert(e.message); } 
              finally { setIsGeneratingInsights(false); }
          };

          const handleDashboardChatSendMessage = async () => {
              if (!dashboardChatInput.trim() || !insights) return;
              if (!globalApiKey) return alert("المفتاح العام غير متوفر.");
              
              const userMsg = dashboardChatInput;
              setDashboardChatInput("");
              
              const newHistory = [...dashboardChatHistory, { sender: 'user', text: userMsg }];
              setDashboardChatHistory(newHistory);
              setIsDashboardChatting(true);
              
              try {
                const aiResponse = await chatWithDashboardAI(insights, newHistory, userMsg, globalApiKey);
                const finalHistory = [...newHistory, { sender: 'ai', text: aiResponse.reply || "تم تحديث البيانات المرافقة." }];
                
                let newInsightsData = { ...insights };
                if (aiResponse.updated_insights) {
                  newInsightsData = {
                    ...newInsightsData,
                    ...(aiResponse.updated_insights.general_description ? {general_description: aiResponse.updated_insights.general_description} : {}),
                    ...(aiResponse.updated_insights.general_suggestions ? {general_suggestions: aiResponse.updated_insights.general_suggestions} : {}),
                  };
                }

                await saveDashboardInsightsData(dashboardFilter, newInsightsData, finalHistory, currentSaved?.lastUpdated);
                
              } catch(e) {
                 setDashboardChatHistory([...newHistory, { sender: 'ai', text: "عذراً، حدث خطأ أثناء الاتصال بالذكاء الاصطناعي." }]);
              } finally {
                 setIsDashboardChatting(false);
              }
          };

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-32">
              <div ref={dashboardTopRef} />
              <header className="bg-slate-900 text-white p-6 pb-8 shadow-xl rounded-b-[2.5rem] relative overflow-hidden">
                <div className="flex justify-between items-center mb-6 relative z-10">
                  <h1 className="text-xl font-extrabold flex items-center gap-2"><LayoutDashboard className="text-xl text-blue-400" /> إحصائياتي</h1>
                  <div className="flex gap-2">
                    <select value={dashboardFilter} onChange={(e) => setDashboardFilter(e.target.value)} className="bg-white/10 text-white text-sm border border-white/20 outline-none focus:ring-2 focus:ring-blue-400 rounded-xl px-2 py-2 font-medium">
                      <option value="40days" className="text-gray-800">40 يوم</option>
                      <option value="month" className="text-gray-800">الشهر</option>
                      <option value="year" className="text-gray-800">السنة</option>
                      <option value="all" className="text-gray-800">الكل</option>
                    </select>
                    <button onClick={goToSettings} className="p-2 bg-white/10 border border-white/20 rounded-xl hover:bg-white/20 transition relative">
                      <Settings className="text-lg text-white" />
                    </button>
                  </div>
                </div>
                
                {filteredEntries.length === 0 ? (
                  <div className="text-center py-6 relative z-10"><p className="text-white/70 font-medium">لا توجد بيانات مسجلة.</p></div>
                ) : (
                  <div className="flex flex-col gap-6 relative z-10">
                    <div className="flex justify-between items-center">
                      <div className="flex-1 pr-2">
                        <p className="text-white/60 text-xs font-bold uppercase mb-1">اللقب العام</p>
                        <h2 className="text-2xl font-black text-white leading-tight">
                          {!globalApiKey ? "جاري الإعداد..." : (insights?.overallTitle || (isGeneratingInsights ? <><Loader className="text-xl animate-spin inline" /> <span>مُنجز</span></> : "مُنجز"))}
                        </h2>
                      </div>
                      <div className="text-center bg-white/10 p-3 rounded-2xl border border-white/10 min-w-[80px]">
                        <p className="text-white/60 text-[10px] font-bold uppercase mb-1">المتوسط</p>
                        <div className="text-3xl font-black text-green-400">{stats.avg}</div>
                      </div>
                    </div>
                    <div className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4">
                      <div className="p-3 bg-blue-500/20 rounded-xl"><ListTodo className="text-xl text-blue-300" /></div>
                      <div><div className="text-3xl font-black text-white">{stats.totalTasks}</div><div className="text-xs text-white/60 font-bold uppercase">مهمة وعمل منجز</div></div>
                    </div>

                    {/* المهام المخطط لها */}
                    <button onClick={goToPlannedTasks} className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center justify-between w-full hover:bg-white/10 transition text-right">
                      <div className="flex items-center gap-4">
                        <div className="p-3 bg-fuchsia-500/20 rounded-xl"><List className="text-xl text-fuchsia-300" /></div>
                        <div>
                          <div className="text-xl font-black text-white">المهام المخطط لها</div>
                          <div className="text-xs text-white/60 font-bold mt-1">
                             {plannedTasks.filter(t => !t.completed).length} مهمة رئيسية | {plannedTasks.reduce((acc, t) => acc + (t.subTasks ? t.subTasks.filter(sub => !sub.completed).length : 0), 0)} مهمة ثانوية
                          </div>
                        </div>
                      </div>
                      <ChevronLeft className="text-white/50 text-lg" />
                    </button>
                    
                    {/* الرصيد المالي */}

            if (sortOption === 'status') { if (a.entry && !b.entry) return -1; if (!a.entry && b.entry) return 1; return b.dayNum - a.dayNum; }
            if (sortOption === 'score_desc') return (parseFloat(b.entry?.averageScore) || -1) - (parseFloat(a.entry?.averageScore) || -1);

            criteria.forEach(c => {
                criteriaSums[c.id] = 0;
                if(c.subCriteria) c.subCriteria.forEach(s => criteriaSums[s.id] = 0);
            });

            mEntries.forEach(e => {
               sumAvg += parseFloat(e.averageScore || 0);
               totalTasks += (e.tasks?.length || 0);
               criteria.forEach(c => { 
                   criteriaSums[c.id] += getCategoryScore(e.scores, c); 
                   if(c.subCriteria) c.subCriteria.forEach(sub => criteriaSums[sub.id] += parseFloat(e.scores?.[sub.id]||0));
               });
            });

            const len = mEntries.length;
            const avg = len > 0 ? (sumAvg / len).toFixed(1) : 0;
            const avgCriteria = {};
            if (len > 0) {
               criteria.forEach(c => {
                   avgCriteria[c.id] = (criteriaSums[c.id] / len).toFixed(1);
                   if(c.subCriteria) c.subCriteria.forEach(sub => avgCriteria[sub.id] = (criteriaSums[sub.id] / len).toFixed(1));
               });
            }

            const title = monthlyTitles[monthPrefix] || (len > 0 ? "يتم التحليل" : "فارغ");
            return { index, name, label: name, dayNum: index + 1, avg: parseFloat(avg), avgCriteria, title, entriesCount: len, avgTasks: len>0 ? totalTasks/len : 0, totalTasks };
          }), [currentYear, entries, monthlyTitles, criteria]);

          const sortedMonths = [...monthsData].sort((a, b) => {
            if (yearSortOption === 'month_desc') return b.index - a.index;
            if (yearSortOption === 'month_asc') return a.index - b.index;
            if (yearSortOption === 'tasks_desc') return b.totalTasks - a.totalTasks;
            if (yearSortOption === 'tasks_asc') return a.totalTasks - b.totalTasks;
            if (yearSortOption === 'score_desc') return b.avg - a.avg;
            if (yearSortOption === 'score_asc') return a.avg - b.avg;
            return 0;
          });

          const chartData = useMemo(() => {
            return monthsData.map(m => {
              let score = 0;
              if (m.entriesCount > 0) {
                if (chartMetric === 'average') score = m.avg;
                else if (chartMetric === 'tasksCount') score = m.avgTasks;
                else score = parseFloat(m.avgCriteria[chartMetric] || 0);
              }
              return { ...m, displayScore: score };
            });
          }, [monthsData, chartMetric]);

          return (
            <div className={`flex-1 overflow-y-auto relative pb-10 ${isFullscreen ? 'bg-slate-900 fixed inset-0 z-[100] flex flex-col p-4' : 'bg-slate-50'}`}>
               {!isFullscreen && (
                 <header className="bg-white p-6 pb-6 shadow-sm rounded-b-[2.5rem]">
                  <div className="flex justify-between items-center mb-4">
                    <button onClick={() => setCurrentYear(currentYear - 1)} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ChevronRight className="text-lg" /></button>
                    <h1 className="text-xl font-extrabold text-gray-800">سنة {currentYear}</h1>
                    <button onClick={() => setCurrentYear(currentYear + 1)} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ChevronLeft className="text-lg" /></button>
                  </div>
                  <button onClick={goToDashboard} className="mt-2 w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white hover:bg-blue-700 rounded-xl transition font-bold text-sm shadow-md">
                    <Home className="text-sm" /> <span>الرئيسية</span>
                  </button>
                </header>
               )}

              <div className={`px-5 mt-6 mb-6 ${isFullscreen ? 'flex-1 flex flex-col h-full' : ''}`}>
                {!isFullscreen && (
                  <div className="flex justify-between items-center mb-4 bg-white p-2 rounded-2xl shadow-sm border border-gray-100 overflow-x-auto scrollbar-hide">
                    <div className="flex gap-1 flex-1 justify-center mx-2 shrink-0">
                      <button onClick={() => setViewMode('grid')} className={`p-2 rounded-xl transition ${viewMode === 'grid' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><Grid className="text-lg" /></button>
                      <button onClick={() => setViewMode('list')} className={`p-2 rounded-xl transition ${viewMode === 'list' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><AlignLeft className="text-lg" /></button>
                      <button onClick={() => setViewMode('bar')} className={`p-2 rounded-xl transition ${viewMode === 'bar' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><BarChart className="text-lg" /></button>
                      <button onClick={() => setViewMode('line')} className={`p-2 rounded-xl transition ${viewMode === 'line' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><LineChart className="text-lg" /></button>
                    </div>
                    {viewMode === 'list' && (
                      <select value={yearSortOption} onChange={(e) => setYearSortOption(e.target.value)} className="bg-gray-50 text-xs border-none outline-none focus:ring-2 focus:ring-blue-100 rounded-xl px-2 py-2 text-gray-600 font-bold max-w-[100px] shrink-0">
                        <option value="month_desc">الأحدث</option><option value="month_asc">الأقدم</option>
                        <option value="score_desc">الأعلى</option><option value="score_asc">الأقل</option>
                      </select>
                    )}
                    {(viewMode === 'bar' || viewMode === 'line') && (
                       <select value={chartMetric} onChange={(e) => setChartMetric(e.target.value)} className="bg-blue-50 text-blue-700 text-xs border-none outline-none focus:ring-2 focus:ring-blue-200 rounded-xl px-2 py-2 font-bold max-w-[120px] shrink-0">
                         <option value="average">التقييم الكلي</option>
                         {criteria.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                       </select>
                    )}
                  </div>
                )}

                {viewMode === 'grid' && !isFullscreen && (
                   <div className="grid grid-cols-3 gap-3">
                     {monthsData.map((m) => (
                       <button key={m.index} onClick={() => { setCurrentMonth(new Date(currentYear, m.index, 1)); setCurrentView('calendar'); }} className={`aspect-square rounded-2xl p-3 flex flex-col items-center justify-center border-2 transition-transform hover:scale-105 ${getColorClass(m.avg)}`}>
                         <span className="font-bold text-sm mb-1">{m.name}</span>
                         {m.entriesCount > 0 && <span className="text-lg font-black">{m.avg}</span>}
                       </button>
                     ))}
                   </div>
                )}
                
                {viewMode === 'list' && !isFullscreen && (
                   <div className="flex flex-col gap-3">
                    {sortedMonths.map((m) => (
                      <button key={m.index} onClick={() => { setCurrentMonth(new Date(currentYear, m.index, 1)); setCurrentView('calendar'); }} className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all hover:scale-[1.02] ${m.entriesCount > 0 ? 'bg-white border-gray-100 shadow-sm' : 'bg-gray-50 border-gray-200 border-dashed text-gray-400'}`}>
                        <div className="flex items-center gap-4">
                          <div className={`w-14 h-14 rounded-xl flex items-center justify-center font-black text-sm ${getColorClass(m.avg)}`}>{m.name}</div>
                          <div className="text-right flex-1 overflow-hidden">
                            <div className={`font-bold truncate w-full ${m.entriesCount > 0 ? 'text-gray-800' : 'text-gray-400'}`}>{m.title}</div>
                            <div className="text-xs text-gray-500">{m.entriesCount} أيام مسجلة</div>
                          </div>
                        </div>
                        {m.entriesCount > 0 && <div className="text-lg font-black bg-white/50 px-3 py-1 rounded-lg text-gray-700 ml-2">{m.avg}</div>}
                      </button>
                    ))}
                  </div>
                )}

                {(viewMode === 'bar' || viewMode === 'line') && (
                  <div className={isFullscreen ? 'chart-fullscreen p-4' : 'w-full flex flex-col bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden mt-4'}>
                    <div className="w-full flex-1 overflow-x-auto scrollbar-hide flex items-center">
                       {viewMode === 'bar' && <BarChartComponent data={chartData} onBarClick={(m) => { setCurrentMonth(new Date(currentYear, m.index, 1)); setCurrentView('calendar'); }} zoomLevel={zoomLevel} isFullscreen={isFullscreen} chartMetric={chartMetric} />}
                       {viewMode === 'line' && <LineChartComponent data={chartData} totalItems={12} onPointClick={(m) => { setCurrentMonth(new Date(currentYear, m.index, 1)); setCurrentView('calendar'); }} zoomLevel={zoomLevel} isFullscreen={isFullscreen} chartMetric={chartMetric} />}
                    </div>
                    <ChartControls zoomLevel={zoomLevel} setZoomLevel={setZoomLevel} isFullscreen={isFullscreen} setIsFullscreen={setIsFullscreen} />
                  </div>
                )}
              </div>
            </div>
          );
        };

        const EntryFormView = ({ selectedDate, setSelectedDate, entries, criteria, saveEntry, goToCalendar, goToDetails, globalApiKey, openKeyModal, plannedTasks }) => {
          const [transcript, setTranscript] = useState("");
          const [isRecording, setIsRecording] = useState(false);
          const [recordingTime, setRecordingTime] = useState(0);
          const [audioData, setAudioData] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [error, setError] = useState(null);
          
          const mediaRecorderRef = useRef(null);
          const timerRef = useRef(null);
          const recognitionRef = useRef(null);

          useEffect(() => {
            setTranscript(""); 
            setAudioData(null);
            setError(null);
            return () => {
              if (timerRef.current) clearInterval(timerRef.current);
              if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
            };
          }, [selectedDate]);

          useEffect(() => {
            try {
              const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              if (SpeechRecognition) {
                recognitionRef.current = new SpeechRecognition();
                recognitionRef.current.continuous = true;
                recognitionRef.current.interimResults = true;
                recognitionRef.current.lang = 'ar-SA';
                recognitionRef.current.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    if (final) setTranscript(prev => prev + final);
                };
                recognitionRef.current.onerror = () => setIsRecording(false);
                recognitionRef.current.onend = () => setIsRecording(false);
              }
            } catch (e) { }
            return () => { if (recognitionRef.current) recognitionRef.current.stop(); };
          }, []);

          const toggleRecording = async () => {
            if (!recognitionRef.current) return setError("المتصفح لا يدعم التسجيل المباشر. استخدم الكتابة.");
            if (isRecording) {
              if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
              if (recognitionRef.current) recognitionRef.current.stop();
              clearInterval(timerRef.current);
              setIsRecording(false);
            } else { 
              try { 
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                mediaRecorderRef.current = mediaRecorder;
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

                mediaRecorder.onstop = () => {
                  stream.getTracks().forEach(t => t.stop());
                  let mimeType = mediaRecorder.mimeType.split(';')[0];
                  if (!mimeType) mimeType = 'audio/webm';
                  
                  const blob = new Blob(chunks, { type: mimeType });
                  const reader = new FileReader();
                  reader.readAsDataURL(blob);
                  reader.onloadend = () => {
                    const base64data = reader.result.split(',')[1];
                    setAudioData({ base64: base64data, mimeType: mimeType });
                  };
                };

                setAudioData(null); setRecordingTime(0);
                mediaRecorder.start(); setIsRecording(true); setError(null);
                timerRef.current = setInterval(() => setRecordingTime(prev => prev + 1), 1000);
              } catch(e) { 
                setIsRecording(false); setError("لا يمكن الوصول للميكروفون.");
              } 
            }
          };

          const handleAnalyze = async () => {
            if (!globalApiKey || globalApiKey.trim() === "") {
                return setError("مفتاح الذكاء الاصطناعي مفقود. يرجى إدخاله لكي تتمكن من تحليل يومياتك.");
            }
            if (!transcript.trim() && !audioData) return setError("الرجاء إدخال نص أو تسجيل مقطع صوتي.");

            setIsAnalyzing(true); setError(null);
            try {
              const dObj = new Date(selectedDate);
              const recentKeys = Object.keys(entries).filter(k => new Date(k) < dObj).sort((a,b) => new Date(b) - new Date(a)).slice(0, 5);
              const recentEntries = recentKeys.map(k => ({ date: k, ...entries[k] }));
              
              const existingText = entries[selectedDate]?.text || "";
              const combinedTextForAI = existingText ? `[الأحداث السابقة]:\n${existingText}\n\n[إضافات جديدة]:\n${transcript}` : transcript;

              const aiResult = await analyzeJournalWithAI(combinedTextForAI, audioData, recentEntries, criteria, plannedTasks, globalApiKey);
              
              let scoresObj = {}, detailsObj = {};
              criteria.forEach(c => {
                 if(c.subCriteria && c.subCriteria.length > 0) {
                     c.subCriteria.forEach(sub => {
                         scoresObj[sub.id] = parseInt(aiResult?.[`score_${sub.id}`]) || 0;
                         detailsObj[sub.id] = aiResult?.[`detail_${sub.id}`] || "";
                     });
                 } else {
                     scoresObj[c.id] = parseInt(aiResult?.[`score_${c.id}`]) || 0;
                     detailsObj[c.id] = aiResult?.[`detail_${c.id}`] || "";
                 }
              });

              let sumAvgs = 0, countCriteria = 0;
              criteria.forEach(c => {
                  if(c.subCriteria) c.subCriteria.forEach(() => countCriteria++);
                  else countCriteria++;
              });
              Object.values(scoresObj).forEach(val => sumAvgs += val);
              const dayAvg = countCriteria > 0 ? (sumAvgs / countCriteria).toFixed(1) : 0;
              
              // --- دمج ذكي: لا نستبدل البيانات القديمة بل ندمج معها ---
              const prevEntry = entries[selectedDate] || {};

              // دمج المهام: احتفظ بالقديمة + أضف أي مهمة جديدة غير موجودة
              const prevTasks = Array.isArray(prevEntry.tasks) ? prevEntry.tasks : [];
              const newAiTasks = Array.isArray(aiResult?.tasks) ? aiResult.tasks : [];
              const mergedTasks = [...prevTasks];
              newAiTasks.forEach(t => { if (!mergedTasks.includes(t)) mergedTasks.push(t); });

              // دمج المالية: احتفظ بالأسعار المدخلة يدوياً (isEstimate=false)
              // وفقط أضف مصروفات جديدة من الـ AI للمصروفات التي لم تذكر من قبل
              const prevFinance = prevEntry.finance || { income: 0, expenses: [] };
              const prevExpenses = prevFinance.expenses || [];
              const aiFinance = aiResult?.finance || null;
              let mergedFinance = null;

              if (aiFinance || prevFinance.income > 0 || prevExpenses.length > 0) {
                  // الدخل: نأخذ الجديد فقط إن وُجد، وإلا نحتفظ بالقديم
                  const mergedIncome = (aiFinance?.income && aiFinance.income > 0)
                      ? aiFinance.income
                      : (prevFinance.income || 0);

                  // المصروفات: الأولوية للأسعار المعدّلة يدوياً (isEstimate=false)
                  // نضيف مصروفات الذكاء الجديدة التي لا يوجد لها مطابق في القديمة
                  const mergedExpenses = [...prevExpenses.filter(e => !e.isEstimate)]; // احتفظ بالمعدّلة يدوياً
                  const estimatedOld = prevExpenses.filter(e => e.isEstimate); // القديمة التقديرية
                  const aiExpenses = aiFinance?.expenses || [];

                  // أضف من AI أي مصروف لا يوجد اسماً مطابقاً في المعدّلة يدوياً
                  aiExpenses.forEach(aiExp => {
                      const alreadyManual = mergedExpenses.find(e =>
                          e.name?.trim().toLowerCase() === aiExp.name?.trim().toLowerCase()
                      );
                      if (!alreadyManual) mergedExpenses.push(aiExp);
                  });

                  // أضف أي تقديرية قديمة لا يوجد لها مطابق لا في اليدوية ولا في AI الجديدة
                  estimatedOld.forEach(oldExp => {
                      const inMerged = mergedExpenses.find(e =>
                          e.name?.trim().toLowerCase() === oldExp.name?.trim().toLowerCase()
                      );
                      if (!inMerged) mergedExpenses.push(oldExp);
                  });

                  mergedFinance = { income: mergedIncome, expenses: mergedExpenses };
              }

              const newEntryData = {
                  text: combinedTextForAI,
                  transcript: (prevEntry.transcript || "") + (aiResult?.transcript ? "\n\n" + aiResult.transcript : ""),
                  tasks: mergedTasks,
                  title: aiResult?.title || prevEntry.title || "يوم جديد",
                  comparison: aiResult?.comparison || prevEntry.comparison || "",
                  tips: aiResult?.tips || prevEntry.tips || "",
                  scores: scoresObj,
                  details: detailsObj,
                  averageScore: dayAvg,
                  finance: mergedFinance,
                  completed_planned_tasks_ids: aiResult?.completed_planned_tasks_ids || []
              };

              await saveEntry(selectedDate, newEntryData);
              setTranscript(""); setAudioData(null);
            } catch (err) { setError(err.message || "حدث خطأ غير متوقع."); } finally { setIsAnalyzing(false); }
          };

          const isExpired = entries?.[selectedDate] && (Date.now() - (entries[selectedDate].timestamp || Date.now())) > (24 * 60 * 60 * 1000);
          if (isExpired) {
            return (
              <div className="flex-1 flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
                <Lock className="text-6xl text-gray-400 mb-4 mx-auto" />
                <h2 className="text-xl font-bold text-gray-800 mb-6">انتهى وقت التعديل</h2>
                <button onClick={() => goToDetails(selectedDate)} className="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-blue-500/30">عرض اليوميات</button>
              </div>
            );
          }

          const handleDateChange = (e) => {
            const newDateStr = e.target.value || new Date().toISOString().split('T')[0];
            setSelectedDate(newDateStr);
            if (entries[newDateStr]) goToDetails(newDateStr);
          };

          const formatTime = (sec) => `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative flex flex-col pb-10">
              <header className="bg-white p-4 shadow-sm flex items-center justify-between border-b border-gray-100 shrink-0">
                <button onClick={goToCalendar} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ArrowRight className="text-lg" /></button>
                <div className="flex flex-col items-center bg-gray-50 px-4 py-1.5 rounded-xl border border-gray-200">
                   <label className="text-[10px] font-bold text-gray-400 uppercase">تاريخ اليوميات</label>
                   <input type="date" value={selectedDate} onChange={handleDateChange} className="bg-transparent text-sm border-none outline-none font-black text-blue-600 cursor-pointer" />
                </div>
                <div className="w-9"></div>
              </header>

              <div className="p-6 flex-1 flex flex-col gap-4">
                
                {!globalApiKey && (
                   <div className="bg-amber-50 p-4 rounded-2xl flex items-center justify-between border border-amber-200 shrink-0">
                      <div className="flex items-center gap-3 text-amber-800">
                         <AlertCircle className="text-xl shrink-0" />
                         <span className="text-sm font-bold">المفتاح مفقود لتفعيل الذكاء الاصطناعي</span>
                      </div>
                      <button onClick={openKeyModal} className="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold rounded-xl shadow-md transition-colors">إدخال المفتاح</button>
                   </div>
                )}

                <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex-1 flex flex-col items-center relative min-h-[300px]">
                  
                  {entries[selectedDate] && (
                    <div className="absolute top-4 w-[90%] bg-blue-50 text-blue-700 py-2 px-3 rounded-xl text-xs font-bold text-center border border-blue-100 z-20">
                      أنت تقوم بإضافة أحداث جديدة ليوم مسجل مسبقاً
                    </div>
                  )}

                  {isRecording && <div className="absolute top-1/3 flex items-center justify-center pointer-events-none opacity-20"><div className="w-40 h-40 bg-red-500 rounded-full animate-ping absolute"></div></div>}
                  
                  <button onClick={toggleRecording} className={`relative z-10 w-24 h-24 rounded-full flex items-center justify-center transition-all duration-500 shadow-xl shrink-0 mt-8 ${isRecording ? 'bg-red-500 text-white scale-110' : 'bg-slate-900 text-white hover:bg-slate-800 hover:scale-105'}`}>
                    {isRecording ? <MicOff className="text-4xl" /> : <Mic className="text-4xl" />}
                  </button>
                  
                  <p className="mt-4 text-gray-400 font-bold text-sm z-10 shrink-0">
                    {isRecording ? `جاري التسجيل... (${formatTime(recordingTime)})` : 'تحدث أو اكتب أحداث اليوم'}
                  </p>

                  {audioData && !isRecording && (
                    <div className="mt-4 w-full bg-blue-50 border border-blue-100 p-4 rounded-2xl flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <PlayCircle className="text-3xl text-blue-500" />
                        <div><p className="text-sm font-bold text-blue-900">مقطع صوتي جاهز</p><p className="text-xs text-blue-600">سيتم تفريغه وتحليله تلقائياً</p></div>
                      </div>
                      <button onClick={() => setAudioData(null)} className="p-2 text-red-500 hover:bg-red-100 rounded-xl transition"><Trash className="text-lg"/></button>
                    </div>
                  )}

                  <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)} placeholder="أضف تفاصيل اليوم هنا..." className="mt-6 w-full flex-1 bg-slate-50 rounded-2xl p-5 text-gray-700 resize-none border-none focus:ring-2 focus:ring-blue-100 z-10 text-base leading-relaxed font-medium shadow-inner" />
                </div>
                
                {error && (
                  <div className="bg-red-50 p-4 rounded-2xl flex flex-col gap-2 shrink-0 border border-red-100">
                    <div className="flex items-start gap-3">
                      <AlertCircle className="text-lg text-red-500 shrink-0 mt-0.5" />
                      <div>
                        <p className="text-red-700 text-sm font-bold mb-1">تنبيه</p>
                        <p className="text-red-600 text-xs font-medium leading-relaxed">{error}</p>
                      </div>
                    </div>
                    {error.includes("مفتاح") && (
                       <button onClick={openKeyModal} className="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-xl mt-2 text-xs transition self-start ml-8">إدخال المفتاح الآن</button>
                    )}
                  </div>
                )}
                
                <button onClick={handleAnalyze} disabled={isAnalyzing || (!transcript.trim() && !audioData)} className="bg-blue-600 text-white w-full py-5 rounded-2xl font-black text-lg flex justify-center gap-2 shadow-xl shadow-blue-500/50 disabled:opacity-50 hover:bg-blue-700 shrink-0 mt-2">
                  {isAnalyzing ? <><Loader className="text-xl animate-spin" /> <span>جاري التحليل والإضافة...</span></> : (error && globalApiKey ? <><RefreshCw className="text-lg"/> <span>إعادة المحاولة</span></> : <span>حفظ وتحليل</span>)}
                </button>

                {entries?.[selectedDate]?.tasks && entries[selectedDate].tasks.length > 0 && (
                  <div className="bg-indigo-50 p-5 rounded-3xl border border-indigo-100 shadow-sm shrink-0 mt-2">
                    <h3 className="text-indigo-800 font-black text-sm mb-3 flex items-center gap-2">
                      <CheckCircle className="text-sm" /> أحداث تم تسجيلها سابقاً اليوم:
                    </h3>
                    <ul className="space-y-2">
                      {entries[selectedDate].tasks.map((task, idx) => (
                        <li key={idx} className="flex items-start gap-2 text-indigo-900 text-sm font-medium leading-relaxed">
                          <span className="w-1.5 h-1.5 bg-indigo-400 rounded-full shrink-0 mt-2"></span>
                          <span>{task}</span>
                        </li>
                      ))}

        const EntryDetailsView = ({ selectedDate, entries, criteria, saveCriteria, goToCalendar, goToDashboard, goToForm, updateEntryData, deleteEntry, globalApiKey, openKeyModal }) => {

            const userMsg = chatInput;

              const finalHistory = [...updatedHistory, { sender: 'ai', text: aiResponse.reply || "تم التحديث بنجاح." }];
              
              let newScores = { ...scores };
              criteria.forEach(c => {

              let newTasks = aiResponse.tasks && Array.isArray(aiResponse.tasks) ? aiResponse.tasks : tasks;

              updateEntryData(selectedDate, { 
                chatHistory: finalHistory, scores: newScores, tasks: newTasks,

                     <div className="flex justify-between items-center mb-4">
