        // ==========================================
        // 3. نظام الحماية من الانهيار (Error Boundary)
        // ==========================================
        class ErrorBoundary extends Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, errorMsg: '' };
          }
          static getDerivedStateFromError(error) {
            return { hasError: true, errorMsg: error.toString() };
          }
          componentDidCatch(error, errorInfo) {
            console.error("App crashed:", error, errorInfo);
          }
          render() {
            if (this.state.hasError) {
              return (
                <div className="flex flex-col items-center justify-center h-screen bg-slate-900 p-6 text-center" dir="rtl">
                  <AlertCircle className="text-6xl text-red-500 mb-4" />
                  <h1 className="text-2xl font-bold text-red-500 mb-2">عذراً، حدث خطأ في النظام</h1>
                  <p className="text-gray-400 mb-6 text-sm max-w-sm" dir="ltr">{this.state.errorMsg}</p>
                  <button onClick={() => window.location.reload()} className="px-6 py-3 font-bold bg-red-600 text-white rounded-xl shadow-lg hover:bg-red-700">إعادة تحميل التطبيق</button>
                </div>
              );
            }
            return this.props.children;
          }
        }

        // ==========================================
        // 4. استكشاف الذكاء الاصطناعي التلقائي
        // ==========================================
        const getValidGeminiModel = async (apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          if (window.discoveredModelCache) return window.discoveredModelCache;

          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
            const data = await res.json();
            
            if (data.error) throw new Error(data.error.message);

            if (data.models && data.models.length > 0) {
              const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent"));
              let selected = validModels.find(m => m.name === 'models/gemini-1.5-flash') ||
                             validModels.find(m => m.name.includes("flash")) ||
                             validModels.find(m => m.name.includes("pro")) ||
                             validModels[0];
              
              if (selected) {
                window.discoveredModelCache = selected.name.replace('models/', '');
                return window.discoveredModelCache;
              }
            }
            throw new Error("المفتاح لا يدعم توليد النصوص.");
          } catch(e) { 
            if (e.message === "API_KEY_MISSING") throw e;
            return "gemini-1.5-flash"; 
          }
        };

        // ==========================================
        // 5. الإعدادات والمعايير الافتراضية
        // ==========================================
        const IconMap = { Brain, Star, Heart, Users, Briefcase, Activity, Book, Coffee, Music, Sun, Moon, Zap, Shield, Target, Smile, Compass, Feather, Flame };
        
        const availableColors = [

          { main: 'bg-rose-500', light: 'bg-rose-50', text: 'text-rose-600' },
          { main: 'bg-orange-500', light: 'bg-orange-50', text: 'text-orange-600' },
          { main: 'bg-emerald-500', light: 'bg-emerald-50', text: 'text-emerald-600' },
          { main: 'bg-indigo-500', light: 'bg-indigo-50', text: 'text-indigo-600' },
          { main: 'bg-amber-500', light: 'bg-amber-50', text: 'text-amber-600' },
          { main: 'bg-teal-500', light: 'bg-teal-50', text: 'text-teal-600' },

        ];
        
        // إعدادات المعايير شاملة "الجوانب الفرعية"
        const defaultCriteria = [
          { 
            id: 'mental', label: 'عقلية وعلمية', icon: 'Brain', desc: '', colorObj: availableColors[0],
            subCriteria: [{id: 'ment_read', label: 'القراءة والتعلم', desc: ''}, {id: 'ment_focus', label: 'التركيز والإنتاجية', desc: ''}]
          },
          { 
            id: 'spiritual', label: 'روحية', icon: 'Star', desc: '', colorObj: availableColors[1],
            subCriteria: [{id: 'spir_pray', label: 'الصلوات والعبادات', desc: ''}, {id: 'spir_quran', label: 'القرآن والأذكار', desc: ''}]
          },
          { 
            id: 'physical', label: 'جسدية', icon: 'Heart', desc: '', colorObj: availableColors[2],
            subCriteria: [{id: 'phys_sport', label: 'الرياضة والحركة', desc: ''}, {id: 'phys_food', label: 'التغذية الصحية', desc: ''}, {id: 'phys_sleep', label: 'النوم والراحة', desc: ''}]
          },
          { 
            id: 'social', label: 'اجتماعية', icon: 'Users', desc: '', colorObj: availableColors[3],
            subCriteria: [{id: 'soc_family', label: 'العائلة والوالدين', desc: ''}, {id: 'soc_friends', label: 'الأصدقاء والعلاقات', desc: ''}]
          },
          { 
            id: 'career', label: 'وظيفية ومالية', icon: 'Briefcase', desc: '', colorObj: availableColors[4],
            subCriteria: [{id: 'car_work', label: 'إنجاز العمل', desc: ''}, {id: 'car_money', label: 'الإدارة المالية', desc: ''}]
          },
        ];

        // دالة مساعدة لحساب متوسط جانب رئيسي بناءً على جوانبه الفرعية (أو إرجاع تقييمه المباشر لو كان قديماً)
        const getCategoryScore = (entryScores, category) => {
            if (!entryScores) return 0;
            if (category.subCriteria && category.subCriteria.length > 0) {
               let sum = 0, count = 0;
               category.subCriteria.forEach(sub => {
                   if (entryScores[sub.id] !== undefined) {
                       sum += Number(entryScores[sub.id]);
                       count++;
                   }
               });
               return count > 0 ? (sum / count) : 0;
            }
            return Number(entryScores[category.id]) || 0;
        };

        const calculateOverallAverage = (scores, criteria) => {
            if (!scores || !criteria || criteria.length === 0) return "0.0";
            let totalSum = 0;
            let totalCount = 0;
            criteria.forEach(c => {
                if(c.subCriteria && c.subCriteria.length > 0) {
                    c.subCriteria.forEach(sub => {
                        const s = Math.max(0, Math.min(10, parseInt(scores[sub.id]) || 0));
                        totalSum += s;
                        totalCount++;
                    });
                } else {
                    const s = Math.max(0, Math.min(10, parseInt(scores[c.id]) || 0));
                    totalSum += s;
                    totalCount++;
                }
            });
            return totalCount > 0 ? (totalSum / totalCount).toFixed(1) : "0.0";
        };

        const cleanJSONString = (str) => {
          if (!str) return "";
          try {
            let cleaned = str.replace(/```json/gi, '').replace(/```/g, '').trim();
            cleaned = cleaned.replace(/,\s*([\]}])/g, '$1'); 
            return cleaned;
          } catch (e) { return ""; }
        };

        const fetchWithRetry = async (url, payload, retries = 3) => {
          let lastError = null;
          for (let attempt = 1; attempt <= retries; attempt++) {
            try {
              const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              const data = await response.json();
              if (!response.ok) throw new Error(data.error?.message || `خطأ اتصال مع الخادم`);
              const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (!resultText) throw new Error("استجابة فارغة من الذكاء الاصطناعي");
              return JSON.parse(cleanJSONString(resultText));
            } catch (err) {
              lastError = err;
              if (attempt === retries) break;
              await new Promise(res => setTimeout(res, 1500 * attempt));
            }
          }
          throw lastError;
        };

        // --- دوال الذكاء الاصطناعي المعدلة للجوانب الفرعية ---
        const analyzeJournalWithAI = async (combinedText, audioData, recentEntries, criteria, apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          
          let recentContext = "لا توجد سجلات سابقة للمقارنة.";
          if (recentEntries && recentEntries.length > 0) {
            recentContext = `الأيام السابقة:\n` + recentEntries.map(e => `- ${e.date}: تقييم (${e.averageScore}/10). التفاصيل: ${JSON.stringify(e.scores)}`).join('\n');
          }

          let criteriaPrompt = "المعايير المطلوبة للتقييم:\n";
          let dynamicProperties = { 
            transcript: { type: "STRING", description: "تفريغ الصوت فقط (إن وجد)." },
            tasks: { type: "ARRAY", items: { type: "STRING" }, description: "قائمة المهام والأعمال المنجزة كجمل قصيرة." }, 
            title: { type: "STRING", description: "لقب يصف اليوم (4 كلمات أقصى حد)." },
            comparison: { type: "STRING", description: "قارن الأداء بأسلوب مشجع." },
            tips: { type: "STRING", description: "نصائح للتحسين." }
          };
          let requiredKeys = ["transcript", "tasks", "title", "comparison", "tips"];

          criteria.forEach(c => {
             if (c.subCriteria && c.subCriteria.length > 0) {
                c.subCriteria.forEach(sub => {
                   const desc = sub.desc || `قيّم مستوى إنجاز ${sub.label}`;
                   criteriaPrompt += `- ${c.label} -> ${sub.label}: ${desc}\n`;
                   dynamicProperties[`score_${sub.id}`] = { type: "INTEGER", description: `تقييم ${sub.label} (0-10)` };
                   dynamicProperties[`detail_${sub.id}`] = { type: "STRING", description: `سبب التقييم لـ ${sub.label} (سطر واحد)` };
                   requiredKeys.push(`score_${sub.id}`, `detail_${sub.id}`);
                });
             } else {
                const desc = c.desc || 'استنتج التقييم';
                criteriaPrompt += `- ${c.label}: ${desc}\n`;
                dynamicProperties[`score_${c.id}`] = { type: "INTEGER", description: `تقييم ${c.label} (0-10)` };
                dynamicProperties[`detail_${c.id}`] = { type: "STRING", description: `سبب التقييم لـ ${c.label} (سطر واحد)` };
                requiredKeys.push(`score_${c.id}`, `detail_${c.id}`);
             }
          });

          const systemPrompt = `أنت محلل حياة. حلل يوميات المستخدم بدقة. 
اللقب: 4 كلمات كحد أقصى.
المهام: استخرجها جميعاً كمصفوفة نصوص قصيرة.
التقييم: 0-10 لكل معيار أو معيار فرعي مع تبرير بسطر واحد.
${recentContext}\n\n${criteriaPrompt}`;

          const parts = [];
          if (combinedText && combinedText.trim() !== "") parts.push({ text: `نص أحداث اليوم:\n${combinedText}` });
          if (audioData) {
            parts.push({ inlineData: { mimeType: audioData.mimeType, data: audioData.base64 } });
            parts.push({ text: "\nفرّغ الصوت وحلله مع النص." });
          } else if (!combinedText || combinedText.trim() === "") throw new Error("لا يوجد نص أو صوت.");

          const payload = {
            contents: [{ role: "user", parts: parts }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: dynamicProperties, required: requiredKeys } }
          };
          return await fetchWithRetry(url, payload);
        };

        const chatWithJournalAI = async (currentEntry, chatHistory, userMessage, criteria, apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const historyContext = chatHistory.map(msg => `${msg.sender === 'user' ? 'المستخدم' : 'الذكاء الاصطناعي'}: ${msg.text}`).join('\n');
          
          let scoresContext = "";
          let dynamicProperties = { 
            reply: { type: "STRING" }, title: { type: "STRING", description: "تحديث اللقب إن لزم الأمر (أقصى 4 كلمات)" },
            tasks: { type: "ARRAY", items: { type: "STRING" }, description: "تحديث قائمة المهام." }
          };
          
          criteria.forEach(c => { 
             if (c.subCriteria && c.subCriteria.length > 0) {
                 c.subCriteria.forEach(sub => {
                     scoresContext += `${sub.label}(${currentEntry.scores?.[sub.id] || 0}), `;
                     dynamicProperties[`score_${sub.id}`] = { type: "INTEGER" };
                 });
             } else {
                 scoresContext += `${c.label}(${currentEntry.scores?.[c.id] || 0}), `;
                 dynamicProperties[`score_${c.id}`] = { type: "INTEGER" }; 
             }
          });
          
          const entryContext = `اللقب الحالي: ${currentEntry.title}\nالمهام الحالية: ${(currentEntry.tasks || []).join('، ')}\nالتقييمات الحالية: ${scoresContext}`;

          const payload = {
            contents: [{ role: "user", parts: [{ text: `سجل المحادثة:\n${historyContext}\n\nرسالة المستخدم: ${userMessage}` }] }],
            systemInstruction: { parts: [{ text: `أنت مساعد ليومياتي. رد على المستخدم وعدّل التقييمات أو اللقب أو أضف مهام جديدة إذا استدعى الأمر.\n\n${entryContext}` }] },
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: dynamicProperties, required: ["reply", "tasks"] } }
          };
          return await fetchWithRetry(url, payload);

          if (!apiKey) throw new Error("API_KEY_MISSING");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

          let dynamicProperties = { overallTitle: { type: "STRING" } };
          let requiredKeys = ["overallTitle"];
          criteria.forEach(c => { dynamicProperties[`advice_${c.id}`] = { type: "STRING", description: `توصية شاملة لجانب ${c.label}` }; requiredKeys.push(`advice_${c.id}`); });

          const payload = {
            contents: [{ role: "user", parts: [{ text: `ملخص أيامي:\n${entriesSummary}\nاستخرج لقباً دقيقاً يصفني ونصيحة لكل معيار رئيسي.` }] }],
            systemInstruction: { parts: [{ text: "أرجع JSON بلقب شامل يعكس حقيقة الأفعال (أقصى 4 كلمات) وتوصيات قصيرة." }] },
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: dynamicProperties, required: requiredKeys } }
          };
          return await fetchWithRetry(url, payload);
        };

        const generateMonthlyTitleAI = async (entriesText, apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const payload = {
            contents: [{ role: "user", parts: [{ text: `استخرج لقباً يصف هذا الشهر (4 كلمات كحد أقصى):\n${entriesText}` }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { monthlyTitle: { type: "STRING" } }, required: ["monthlyTitle"] } }
          };
          const res = await fetchWithRetry(url, payload);
          return res ? res.monthlyTitle : "شهر جديد";
        };

        const getColorClass = (score) => {
          const s = parseFloat(score);
          if (isNaN(s) || s === 0) return 'bg-gray-100 text-gray-400 border-gray-200';
          if (s <= 2) return 'bg-yellow-100 text-yellow-800 border-yellow-300';
          if (s <= 4) return 'bg-yellow-300 text-yellow-900 border-yellow-400';
          if (s <= 6) return 'bg-lime-300 text-lime-900 border-lime-400';
          if (s <= 8) return 'bg-green-400 text-white border-green-500';
          return 'bg-green-600 text-white border-green-700 shadow-md';
        };

        const getChartBgColorClass = (score, maxVal = 10) => {
          const ratio = score / maxVal;
          if (ratio <= 0.2) return 'bg-yellow-500';
          if (ratio <= 0.4) return 'bg-yellow-400';
          if (ratio <= 0.6) return 'bg-lime-400';
          if (ratio <= 0.8) return 'bg-green-400';
          return 'bg-green-600';
        };

        const getChartStrokeColorClass = (score, maxVal = 10) => {
          const ratio = score / maxVal;
          if (ratio <= 0.2) return 'text-yellow-500';
          if (ratio <= 0.4) return 'text-yellow-400';
          if (ratio <= 0.6) return 'text-lime-400';
          if (ratio <= 0.8) return 'text-green-400';
          return 'text-green-600';
        };

        // ==========================================
        // 6. الرسوم البيانية المتطورة ومتحكمات التكبير
        // ==========================================
        const ChartControls = ({ zoomLevel, setZoomLevel, isFullscreen, setIsFullscreen }) => (
          <div className={`flex justify-center items-center gap-4 bg-gray-100 p-2 rounded-2xl w-fit mx-auto shadow-inner border border-gray-200 ${isFullscreen ? 'm-4' : 'mt-4'}`}>
             <button onClick={() => setZoomLevel(Math.max(0.1, zoomLevel - 0.2))} className="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm hover:bg-blue-50 text-gray-700 hover:text-blue-600 transition" title="تصغير">
               <MinusIcon className="text-sm"/>
             </button>
             <button onClick={() => setIsFullscreen(!isFullscreen)} className="px-6 py-2 h-10 bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 font-bold text-sm flex items-center gap-2 transition">
                {isFullscreen ? <Minimize className="text-sm"/> : <Maximize className="text-sm"/>}
                {isFullscreen ? 'إلغاء ملء الشاشة' : 'ملء الشاشة بالعرض'}
             </button>
             <button onClick={() => setZoomLevel(zoomLevel + 0.2)} className="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm hover:bg-blue-50 text-gray-700 hover:text-blue-600 transition" title="تكبير">
               <PlusIcon className="text-sm"/>
             </button>
          </div>
        );

        const BarChartComponent = ({ data, onBarClick, zoomLevel, isFullscreen, chartMetric }) => {
          // حساب الحد الأقصى الديناميكي ليتوافق مع عدد المهام إذا تم اختياره
          const isTasks = chartMetric === 'tasksCount';
          const maxVal = isTasks ? Math.max(10, ...data.map(d => d.entry?.tasks?.length || d.entriesCount || 0)) : 10;
          
          // عرض الحاوية يعتمد على الزووم ليتمدد داخله
          const containerWidth = Math.max(100, zoomLevel * 100);
          
          return (
            <div className={`w-full overflow-x-auto scrollbar-hide ${isFullscreen ? 'flex-1 pt-6' : 'h-[300px] pt-12'}`}>
              <div className={`flex items-end justify-between min-w-full px-2 gap-[2px] ${isFullscreen ? 'h-[90%]' : 'h-full'}`} style={{ width: `${containerWidth}%` }}>
                 {data.map((d, i) => {
                    const score = isTasks ? (d.entry?.tasks?.length || (d.entriesCount > 0 ? d.avgTasks : 0)) : parseFloat(d.displayScore || 0);
                    const hasData = d.entry || d.entriesCount > 0;
                    const heightPercentage = hasData ? Math.max(8, (score / maxVal) * 100) : 4;

                    return (
                      <button key={i} onClick={() => hasData ? onBarClick(d) : null} className={`flex flex-col items-center group relative flex-1 h-full justify-end ${hasData ? 'cursor-pointer' : 'cursor-default opacity-50'}`}>
                        {hasData && (
                          <div className="opacity-0 group-hover:opacity-100 absolute -top-10 bg-slate-800 text-white text-xs font-bold py-1.5 px-3 rounded-lg pointer-events-none whitespace-nowrap z-10 transition-opacity">
                            {score} {isTasks ? 'مهمة' : ''} - {d.entry?.title || d.title || ''}
                          </div>
                        )}
                        <div className={`w-full rounded-sm transition-all duration-500 ${hasData ? getChartBgColorClass(score, maxVal) : 'bg-gray-200'} group-hover:opacity-80`} style={{ height: `${heightPercentage}%` }}></div>
                        <span className={`text-[10px] mt-2 font-bold ${hasData ? 'text-gray-700' : 'text-gray-400'}`}>{d.label || d.dayNum}</span>
                      </button>
                    )
                 })}
              </div>
            </div>
          )
        };

        const LineChartComponent = ({ data, totalItems, onPointClick, zoomLevel, isFullscreen, chartMetric }) => {
          const validData = data.filter(d => d.entry || d.entriesCount > 0);
          if(validData.length === 0) return <div className="text-center p-10 text-gray-500 bg-white rounded-3xl border border-gray-100 mt-4 w-full">لا توجد بيانات كافية للرسم البياني.</div>;

          const isTasks = chartMetric === 'tasksCount';
          const maxVal = isTasks ? Math.max(10, ...validData.map(d => d.entry?.tasks?.length || d.avgTasks || 0)) : 10;
          
          const padding = 40;
          const svgWidth = Math.max(400, totalItems * 50 * zoomLevel);
          const getFullscreenHeight = () => { if (window.innerHeight > window.innerWidth) return window.innerWidth - 120; return window.innerHeight - 120; };
          const svgHeight = isFullscreen ? getFullscreenHeight() : 260;
          const usableHeight = svgHeight - padding * 2;

          const points = validData.map(d => {
            const idx = d.dayNum || (d.index + 1);
            const x = padding + (idx - 1) * ((svgWidth - padding * 2) / Math.max(1, totalItems - 1));
            const score = isTasks ? (d.entry?.tasks?.length || d.avgTasks || 0) : parseFloat(d.displayScore || 0);
            const y = svgHeight - padding - ((score / maxVal) * usableHeight);
            return { x, y, score, ...d };
          });

          const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
          
          // مقياس رأسي للرسم البياني
          const yAxisLabels = [0, maxVal*0.25, maxVal*0.5, maxVal*0.75, maxVal].map(v => Math.round(v));

          return (
            <div className={`w-full overflow-x-auto scrollbar-hide ${isFullscreen ? 'flex-1 flex items-center' : ''}`}>
              <svg width={svgWidth} height={svgHeight} className="overflow-visible min-w-full">
                 {yAxisLabels.map(val => (
                   <g key={val}>
                      <line x1={padding} y1={svgHeight - padding - (val/maxVal)*usableHeight} x2={svgWidth - padding} y2={svgHeight - padding - (val/maxVal)*usableHeight} stroke="#f3f4f6" strokeWidth="2" strokeDasharray="4 4" />
                      <text x={padding - 15} y={svgHeight - padding - (val/maxVal)*usableHeight + 4} fontSize="10" fill="#9ca3af" textAnchor="end" fontWeight="bold">{val}</text>
                   </g>
                 ))}
                 <path d={pathD} fill="none" stroke="#cbd5e1" strokeWidth="4" strokeLinejoin="round" strokeLinecap="round" />
                 {points.map((p, i) => (
                   <g key={i} className="group cursor-pointer outline-none" onClick={() => onPointClick(p)}>
                     <circle cx={p.x} cy={p.y} r="6" fill="#fff" className={`${getChartStrokeColorClass(p.score, maxVal)} transition-all duration-300 group-hover:r-8`} strokeWidth="4" stroke="currentColor" />
                     <text x={p.x} y={svgHeight - 10} fontSize="11" fill="#6b7280" textAnchor="middle" fontWeight="bold">{p.label || p.dayNum}</text>
                     <rect x={p.x - 20} y={p.y - 35} width="40" height="20" rx="4" fill="#1e293b" className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none" />
                     <text x={p.x} y={p.y - 21} fontSize="12" fill="#fff" fontWeight="bold" textAnchor="middle" className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">{p.score}</text>
                   </g>
                 ))}
              </svg>
            </div>
          )
        };

        // ==========================================
        // 7. شاشات العرض والتسجيل
        // ==========================================
        const AuthView = () => {
          const [isLogin, setIsLogin] = useState(true);
          const [name, setName] = useState('');
          const [phone, setPhone] = useState('');
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');
          const [rememberMe, setRememberMe] = useState(true); 
          const [error, setError] = useState('');
          const [loading, setLoading] = useState(false);

          const handleSubmit = async (e) => {
            e.preventDefault();
            if (isLogin) {
              if (!email || !password) return setError('يرجى تعبئة جميع الحقول');
            } else {
              if (!name || !phone || !email || !password) return setError('يرجى تعبئة جميع الحقول لإنشاء الحساب');
            }
            
            if (!auth) return setError('حدث خطأ في الاتصال بقاعدة البيانات.');
            
            setError('');
            setLoading(true);
            try {
              await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
              
              if (isLogin) {
                await auth.signInWithEmailAndPassword(email, password);
              } else {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                if (db) {
                  await db.doc(`artifacts/${appIdStr}/users/${userCred.user.uid}/profile/info`).set({ name, phone, email, createdAt: Date.now() });
                }
              }
            } catch (err) {
              if (err.code === 'auth/email-already-in-use') setError('البريد الإلكتروني مستخدم مسبقاً');
              else if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') setError('بيانات الدخول غير صحيحة');
              else if (err.code === 'auth/weak-password') setError('كلمة المرور ضعيفة جداً');
              else setError('حدث خطأ: ' + err.message);
            } finally { setLoading(false); }
          };

          return (
            <div className="flex-1 flex items-center justify-center bg-slate-50 p-6 min-h-screen">
              <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl border border-gray-100 relative overflow-hidden">
                <div className="absolute top-0 left-0 right-0 h-32 bg-slate-900 rounded-b-[3rem] z-0"></div>
                <div className="relative z-10 flex flex-col items-center mb-8 pt-4">
                  <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg mb-4 border-4 border-slate-50"><Brain className="text-4xl text-blue-600" /></div>
                  <h1 className="text-2xl font-black text-gray-800">يومياتي الذكية</h1>
                  <p className="text-sm text-gray-500 font-medium mt-1">حلل يومك، طوّر ذاتك</p>
                </div>

                <form onSubmit={handleSubmit} className="flex flex-col gap-4 relative z-10">
                  {!isLogin && (
                    <>
                      <div>
                        <div className="relative">
                          <User className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" />
                          <input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="الاسم الكامل" />
                        </div>
                      </div>
                      <div>
                        <div className="relative">
                          <Phone className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" />
                          <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="05XXXXXXXX" dir="ltr" />
                        </div>
                      </div>
                    </>
                  )}
                  <div>
                    <div className="relative"><Mail className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" /><input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="البريد الإلكتروني" /></div>
                  </div>
                  <div>
                    <div className="relative"><Key className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" /><input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="كلمة المرور" /></div>
                  </div>
                  <div className="flex items-center gap-2 mt-1">
                    <input type="checkbox" id="rememberMe" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer" />
                    <label htmlFor="rememberMe" className="text-xs font-bold text-gray-600 cursor-pointer select-none">تذكرني (البقاء متصلاً)</label>
                  </div>
                  {error && <div className="text-red-600 text-xs font-bold bg-red-50 p-3 rounded-lg flex items-start gap-2"><AlertCircle className="text-sm shrink-0 mt-0.5" />{error}</div>}
                  <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white font-bold text-lg rounded-xl py-3.5 shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition mt-2 flex justify-center items-center gap-2">
                    {loading ? <Loader className="text-lg animate-spin" /> : (isLogin ? <><LogIn className="text-lg"/> تسجيل الدخول</> : <><UserPlus className="text-lg"/> إنشاء حساب</>)}
                  </button>
                </form>
                <div className="mt-6 flex flex-col gap-4 relative z-10">
                  <button onClick={() => {setIsLogin(!isLogin); setError('');}} className="text-sm font-bold text-gray-500 hover:text-blue-600 transition">
                    {isLogin ? "ليس لديك حساب؟ سجل الآن" : "لديك حساب بالفعل؟ سجل دخولك"}
                  </button>
                </div>
              </div>
            </div>
          );
        };

        const SettingsView = ({ criteria, saveCriteria, goToDashboard }) => {
          const handleAddSub = (parentId) => {
             const newSub = { id: `sub_${Date.now()}`, label: 'جانب جديد', desc: '' };
             const updated = criteria.map(c => {
                if(c.id === parentId) return {...c, subCriteria: [...(c.subCriteria||[]), newSub]};
                return c;
             });
             saveCriteria(updated);
          };

          const handleUpdateSub = (parentId, subId, field, value) => {
             const updated = criteria.map(c => {
                if(c.id === parentId) {
                   const updatedSubs = c.subCriteria.map(sub => sub.id === subId ? {...sub, [field]: value} : sub);
                   return {...c, subCriteria: updatedSubs};
                }
                return c;
             });
             saveCriteria(updated);
          };

          const handleDeleteSub = (parentId, subId) => {
             if(window.confirm("حذف هذا الجانب الفرعي؟")) {
                const updated = criteria.map(c => {
                   if(c.id === parentId) {
                      return {...c, subCriteria: c.subCriteria.filter(sub => sub.id !== subId)};
                   }
                   return c;
                });
                saveCriteria(updated);
             }
          };

          const handleLogout = () => { if(auth) auth.signOut(); };

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-10">
              <header className="bg-white p-6 pb-6 shadow-sm rounded-b-[2.5rem] flex justify-between items-center sticky top-0 z-20">
                <button onClick={goToDashboard} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ArrowRight className="text-lg text-gray-700" /></button>
                <h1 className="text-xl font-black text-gray-800">إعدادات المعايير</h1>
                <button onClick={handleLogout} className="p-2 bg-red-50 text-red-600 rounded-full hover:bg-red-100" title="تسجيل الخروج"><LogOut className="text-lg" /></button>
              </header>

              <div className="p-5">
                <div className="bg-blue-50 border border-blue-100 p-4 rounded-2xl mb-6 text-sm text-blue-800 font-medium">
                  يمكنك هنا إضافة "جوانب فرعية" تحت الجوانب الرئيسية ليقوم الذكاء الاصطناعي بتقييمها بدقة أكبر.
                </div>

                <div className="flex flex-col gap-5">
                  {criteria.map(c => {
                    const IconComp = IconMap[c.icon] || Star;
                    return (
                      <div key={c.id} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        <div className="flex items-center gap-3 mb-4">
                          <div className={`w-10 h-10 flex items-center justify-center rounded-xl ${c.colorObj.main}`}><IconComp className="text-white" /></div>
                          <div>
                            <h4 className="font-black text-gray-800 text-base">{c.label}</h4>
                            {c.desc && <p className="text-xs text-gray-500 mt-0.5">{c.desc}</p>}
                          </div>
                        </div>
                        
                        {/* الجوانب الفرعية */}
                        <div className="flex flex-col gap-3 pr-6 border-r-2 border-gray-100 mr-2">
                           {(c.subCriteria || []).map(sub => (
                             <div key={sub.id} className="bg-gray-50 p-3 rounded-xl border border-gray-200 flex flex-col gap-2">
                                <div className="flex justify-between items-center">
                                   <input type="text" value={sub.label} onChange={(e) => handleUpdateSub(c.id, sub.id, 'label', e.target.value)} className="bg-transparent font-bold text-sm text-gray-800 focus:outline-none focus:border-b border-blue-500 w-1/2" placeholder="اسم الجانب..." />
                                   <button onClick={() => handleDeleteSub(c.id, sub.id)} className="text-red-400 hover:text-red-600 p-1"><Trash className="text-xs" /></button>
                                </div>
                                <input type="text" value={sub.desc} onChange={(e) => handleUpdateSub(c.id, sub.id, 'desc', e.target.value)} className="bg-transparent text-xs text-gray-500 focus:outline-none w-full" placeholder="شرح للذكاء الاصطناعي (اختياري)..." />
                             </div>
                           ))}
                           <button onClick={() => handleAddSub(c.id)} className="flex items-center gap-2 text-blue-600 font-bold text-xs p-2 hover:bg-blue-50 rounded-lg w-fit transition">
                             <Plus className="text-xs" /> إضافة جانب فرعي جديد
                           </button>
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            </div>
          );
        };

        const DashboardView = ({ entries, criteria, globalApiKey, goToCalendar, goToYear, goToSettings, openKeyModal }) => {
          const [dashboardFilter, setDashboardFilter] = useState('40days');
          const [insights, setInsights] = useState(null);
          const [isGeneratingInsights, setIsGeneratingInsights] = useState(false);

          const filteredEntries = useMemo(() => {
            try {
              const now = new Date();
              const allKeys = Object.keys(entries || {});
              if (dashboardFilter === 'all') return allKeys.map(k => ({ date: k, ...entries[k] }));
              
              return allKeys.filter(key => {
                const d = new Date(key);
                if (isNaN(d.getTime())) return false;
                if (dashboardFilter === '40days') return (now - d) <= (40 * 24 * 60 * 60 * 1000);
                if (dashboardFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if (dashboardFilter === 'year') return d.getFullYear() === now.getFullYear();
                return true;
              }).map(k => ({ date: k, ...entries[k] }));
            } catch (e) { return []; }
          }, [entries, dashboardFilter]);

          const stats = useMemo(() => {
            if (!filteredEntries || filteredEntries.length === 0) return { avg: "0.0", totalTasks: 0, criteriaScores: {} };
            let sumAvg = 0, tTasks = 0;
            let cScores = {};
            criteria.forEach(c => cScores[c.id] = 0);
            
            filteredEntries.forEach(e => {
              sumAvg += parseFloat(e.averageScore || 0);
              tTasks += (Array.isArray(e?.tasks) ? e.tasks.length : 0);
              criteria.forEach(c => { cScores[c.id] += getCategoryScore(e?.scores, c); });
            });
            
            const len = filteredEntries.length;
            let finalScores = {};
            criteria.forEach(c => { finalScores[c.id] = (cScores[c.id] / len).toFixed(1); });

            return { avg: (sumAvg / len).toFixed(1), totalTasks: tTasks, criteriaScores: finalScores };
          }, [filteredEntries, criteria]);

          useEffect(() => {
            let isMounted = true;
            if (filteredEntries.length === 0 || !globalApiKey) { setInsights(null); return; }
            
            const fetchInsights = async () => {
              setIsGeneratingInsights(true);
              try { 
                const res = await generateDashboardInsightsAI(filteredEntries, criteria, globalApiKey); 
                if (isMounted && res) setInsights(res); 
              } catch(e) { } 
              finally { if(isMounted) setIsGeneratingInsights(false); }
            };
            fetchInsights();
            return () => { isMounted = false; };
          }, [dashboardFilter, filteredEntries, criteria, globalApiKey]);

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-32">
              <header className="bg-slate-900 text-white p-6 pb-8 shadow-xl rounded-b-[2.5rem] relative overflow-hidden">
                <div className="flex justify-between items-center mb-6 relative z-10">
                  <h1 className="text-xl font-extrabold flex items-center gap-2"><LayoutDashboard className="text-xl text-blue-400" /> إحصائياتي</h1>
                  <div className="flex gap-2">
                    <select value={dashboardFilter} onChange={(e) => setDashboardFilter(e.target.value)} className="bg-white/10 text-white text-sm border border-white/20 outline-none focus:ring-2 focus:ring-blue-400 rounded-xl px-2 py-2 font-medium">
                      <option value="40days" className="text-gray-800">40 يوم</option>
                      <option value="month" className="text-gray-800">الشهر</option>
                      <option value="year" className="text-gray-800">السنة</option>
                      <option value="all" className="text-gray-800">الكل</option>
                    </select>
                    <button onClick={goToSettings} className="p-2 bg-white/10 border border-white/20 rounded-xl hover:bg-white/20 transition relative">
                      <Settings className="text-lg text-white" />
                    </button>
                  </div>
                </div>
                
                {filteredEntries.length === 0 ? (
                  <div className="text-center py-6 relative z-10"><p className="text-white/70 font-medium">لا توجد بيانات مسجلة.</p></div>
                ) : (
                  <div className="flex flex-col gap-6 relative z-10">
                    <div className="flex justify-between items-center">
                      <div className="flex-1 pr-2">
                        <p className="text-white/60 text-xs font-bold uppercase mb-1">اللقب العام</p>
                        <h2 className="text-2xl font-black text-white leading-tight">
                          {!globalApiKey ? "جاري الإعداد..." : (insights?.overallTitle || (isGeneratingInsights ? <Loader className="text-xl animate-spin inline" /> : "مُنجز"))}
                        </h2>
                      </div>
                      <div className="text-center bg-white/10 p-3 rounded-2xl border border-white/10 min-w-[80px]">
                        <p className="text-white/60 text-[10px] font-bold uppercase mb-1">المتوسط</p>
                        <div className="text-3xl font-black text-green-400">{stats.avg}</div>
                      </div>
                    </div>
                    <div className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4">
                      <div className="p-3 bg-blue-500/20 rounded-xl"><ListTodo className="text-xl text-blue-300" /></div>
                      <div><div className="text-3xl font-black text-white">{stats.totalTasks}</div><div className="text-xs text-white/60 font-bold uppercase">مهمة وعمل منجز</div></div>
                    </div>
                  </div>
                )}
              </header>

              <div className="px-5 mt-6 flex flex-col gap-6 relative z-10">
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={goToCalendar} className="bg-blue-100 p-4 rounded-2xl shadow-sm border border-blue-200 flex flex-col items-center gap-2 hover:bg-blue-200 active:scale-95 transition">
                    <CalendarDays className="text-3xl text-blue-600" /><span className="font-bold text-blue-900 text-sm">التقويم الشهري</span>
                  </button>
                  <button onClick={goToYear} className="bg-purple-100 p-4 rounded-2xl shadow-sm border border-purple-200 flex flex-col items-center gap-2 hover:bg-purple-200 active:scale-95 transition">
                    <Calendar className="text-3xl text-purple-600" /><span className="font-bold text-purple-900 text-sm">التقويم السنوي</span>
                  </button>
                </div>

                {!globalApiKey && (
                   <div className="bg-amber-50 p-4 rounded-2xl flex items-center justify-between border border-amber-200">
                      <div className="flex items-center gap-3 text-amber-800">
                         <AlertCircle className="text-xl" />
                         <span className="text-sm font-bold">مفتاح الذكاء الاصطناعي مفقود!</span>
                      </div>
                      <button onClick={openKeyModal} className="px-4 py-2 bg-amber-600 text-white text-xs font-bold rounded-xl shadow-md hover:bg-amber-700 transition">إدخال المفتاح</button>
                   </div>
                )}

                {filteredEntries.length > 0 && (
                  <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6">
                    <h3 className="text-gray-800 font-black text-lg mb-6 flex items-center gap-2"><Activity className="text-lg text-blue-500" /> التحليل العام</h3>
                    <div className="flex flex-col gap-8">
                      {criteria.map(cat => {
                        const IconComp = IconMap[cat.icon] || Star;
                        const score = stats.criteriaScores[cat.id] || "0.0";
                        return (
                          <div key={cat.id} className="relative">
                            <div className="flex items-center gap-3 mb-2">
                              <div className={`w-10 h-10 flex items-center justify-center rounded-xl shadow-md ${cat.colorObj.main}`}><IconComp className="text-base text-white" /></div>
                              <div className="flex-1 flex justify-between items-end">
                                <span className="font-bold text-gray-700">{cat.label}</span>
                                <span className={`font-black text-lg text-gray-900`}>{score}/10</span>
                              </div>
                            </div>
                            <div className="h-3 bg-gray-100 rounded-full overflow-hidden mb-3">
                              <div className={`h-full ${cat.colorObj.main} rounded-full transition-all duration-1000`} style={{ width: `${(parseFloat(score) / 10) * 100}%` }}></div>
                            </div>
                            <div className="bg-gray-50 p-4 rounded-2xl text-sm leading-relaxed text-gray-600 font-medium border border-gray-100">
                               {!globalApiKey ? "أضف مفتاح API للحصول على نصائح." : (isGeneratingInsights ? <Loader className="text-sm animate-spin text-gray-400"/> : (insights?.[`advice_${cat.id}`] || "الذكاء الاصطناعي يحلل بياناتك."))}
                            </div>
                          </div>
                        )
                      })}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const CalendarView = ({ entries, criteria, monthlyTitles, currentMonth, setCurrentMonth, goToDashboard, goToForm, goToDetails }) => {
          const [calendarMode, setCalendarMode] = useState('grid');
          const [sortOption, setSortOption] = useState('date_desc');
          const [chartMetric, setChartMetric] = useState('average');
          const [zoomLevel, setZoomLevel] = useState(1); // تم تغيير الافتراضي ليناسب العرض
          const [isFullscreen, setIsFullscreen] = useState(false);
          
          const year = currentMonth.getFullYear();
          const month = currentMonth.getMonth();
          const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
          const mTitle = monthlyTitles[monthKey] || "شهر جديد";
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

          const allDays = useMemo(() => {
            return [...Array(daysInMonth)].map((_, i) => {
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
              return { date: dateStr, dayNum: i + 1, label: String(i + 1), entry: entries?.[dateStr] };
            });
          }, [daysInMonth, year, month, entries]);

          const sortedDays = [...allDays].sort((a, b) => {
            if (sortOption === 'date_desc') return b.dayNum - a.dayNum;
            if (sortOption === 'date_asc') return a.dayNum - b.dayNum;
            if (sortOption === 'tasks_desc') return (b.entry?.tasks?.length || 0) - (a.entry?.tasks?.length || 0);
            if (sortOption === 'tasks_asc') return (a.entry?.tasks?.length || 0) - (b.entry?.tasks?.length || 0);
            if (sortOption === 'status') { if (a.entry && !b.entry) return -1; if (!a.entry && b.entry) return 1; return b.dayNum - a.dayNum; }
            if (sortOption === 'score_desc') return (parseFloat(b.entry?.averageScore) || -1) - (parseFloat(a.entry?.averageScore) || -1);
            if (sortOption === 'score_asc') return (parseFloat(a.entry?.averageScore) || 11) - (parseFloat(b.entry?.averageScore) || 11);
            return 0;
          });

          const chartData = useMemo(() => {
            return allDays.map(d => {
              let score = 0;
              if (d.entry) {
                if (chartMetric === 'average') score = parseFloat(d.entry.averageScore || 0);
                else if (chartMetric === 'tasksCount') score = d.entry.tasks?.length || 0;
                else {
                    // البحث في الجوانب الرئيسية أو الفرعية
                    let foundScore = null;
                    criteria.forEach(c => {
                        if (c.id === chartMetric) foundScore = getCategoryScore(d.entry.scores, c);
                        else if (c.subCriteria) {
                            const sub = c.subCriteria.find(s => s.id === chartMetric);
                            if (sub) foundScore = d.entry.scores?.[sub.id];
                        }
                    });
                    score = parseFloat(foundScore || 0);
                }
              }
              return { ...d, displayScore: score };
            });
          }, [allDays, chartMetric, criteria]);

          return (
            <div className={`flex-1 overflow-y-auto relative pb-10 ${isFullscreen ? 'bg-slate-900 fixed inset-0 z-[100] flex flex-col p-4' : 'bg-slate-50'}`}>
              {!isFullscreen && (
                <header className="bg-white p-6 pb-6 shadow-sm rounded-b-[2.5rem]">
                  <div className="flex justify-between items-center mb-4">
                    <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ChevronRight className="text-lg" /></button>
                    <h1 className="text-xl font-extrabold text-gray-800">{monthNames[month]} {year}</h1>
                    <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ChevronLeft className="text-lg" /></button>
                  </div>
                  <div className="text-center">
                    <p className="text-gray-400 text-xs font-bold uppercase">اللقب</p>
                    <h2 className="text-lg font-bold text-gray-800 truncate">{mTitle}</h2>
                  </div>
                  {/* زر الرئيسية ممتد تحت اللقب */}
                  <button onClick={goToDashboard} className="mt-5 w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white hover:bg-blue-700 rounded-xl transition font-bold text-sm shadow-md">
                    <Home className="text-sm" /> الرئيسية
                  </button>
                </header>
              )}

              <div className={`px-5 mt-6 mb-6 ${isFullscreen ? 'flex-1 flex flex-col h-full' : ''}`}>
                {!isFullscreen && (
                  <div className="flex justify-between items-center mb-4 bg-white p-2 rounded-2xl shadow-sm border border-gray-100 overflow-x-auto scrollbar-hide">
                    <div className="flex gap-1 flex-1 justify-center mx-2 shrink-0">
                      <button onClick={() => setCalendarMode('grid')} className={`p-2 rounded-xl transition ${calendarMode === 'grid' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><Grid className="text-lg" /></button>
                      <button onClick={() => setCalendarMode('list')} className={`p-2 rounded-xl transition ${calendarMode === 'list' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><AlignLeft className="text-lg" /></button>
                      <button onClick={() => setCalendarMode('bar')} className={`p-2 rounded-xl transition ${calendarMode === 'bar' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><BarChart className="text-lg" /></button>
                      <button onClick={() => setCalendarMode('line')} className={`p-2 rounded-xl transition ${calendarMode === 'line' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><LineChart className="text-lg" /></button>
                    </div>
                    
                    {calendarMode === 'list' && (
                      <select value={sortOption} onChange={(e) => setSortOption(e.target.value)} className="bg-gray-50 text-xs border-none outline-none focus:ring-2 focus:ring-blue-100 rounded-xl px-2 py-2 text-gray-600 font-bold w-[120px] shrink-0">
                        <option value="date_desc">الأحدث</option><option value="date_asc">الأقدم</option>
                        <option value="tasks_desc">المهام (الأكثر)</option><option value="tasks_asc">المهام (الأقل)</option>
                        <option value="status">المنجزة</option><option value="score_desc">الأعلى تقييماً</option><option value="score_asc">الأقل تقييماً</option>
                      </select>
                    )}
                    {(calendarMode === 'bar' || calendarMode === 'line') && (
                       <select value={chartMetric} onChange={(e) => setChartMetric(e.target.value)} className="bg-blue-50 text-blue-700 text-xs border-none outline-none focus:ring-2 focus:ring-blue-200 rounded-xl px-2 py-2 font-bold max-w-[130px] shrink-0">
                         <option value="average">التقييم الكلي</option>
                         <option value="tasksCount">عدد المهام المنجزة</option>
                         {criteria.map(c => {
                             if(c.subCriteria && c.subCriteria.length > 0) {
                                 return (
                                     <optgroup key={c.id} label={c.label}>
                                         <option value={c.id}>{c.label} (متوسط)</option>
                                         {c.subCriteria.map(sub => <option key={sub.id} value={sub.id}>- {sub.label}</option>)}
                                     </optgroup>
                                 )
                             }
                             return <option key={c.id} value={c.id}>{c.label}</option>;
                         })}
                       </select>
                    )}
                  </div>
                )}

                {calendarMode === 'grid' && !isFullscreen && (
                  <div>
                    <div className="grid grid-cols-7 gap-2 mb-2">{['أحد', 'إثن', 'ثلا', 'أرب', 'خمي', 'جمع', 'سبت'].map(day => <div key={day} className="text-center text-xs font-bold text-gray-400">{day}</div>)}</div>
                    <div className="grid grid-cols-7 gap-2">
                      {[...Array(new Date(year, month, 1).getDay())].map((_, i) => <div key={`empty-${i}`} className="aspect-square"></div>)}
                      {allDays.map(({ date, dayNum, entry }) => {
                        const isToday = date === new Date().toISOString().split('T')[0];
                        return (
                          <button key={dayNum} onClick={() => entry ? goToDetails(date) : goToForm(date)} className={`relative aspect-square rounded-2xl flex flex-col items-center justify-center border-2 transition-transform hover:scale-105 ${getColorClass(entry?.averageScore)} ${isToday && !entry ? 'ring-2 ring-blue-500 border-transparent' : ''}`}>
                            <span className={`text-base font-bold ${entry ? '' : 'opacity-70'}`}>{dayNum}</span>
                            {entry && <span className="text-[10px] font-black mt-0.5 opacity-90">{entry.averageScore}</span>}
                          </button>
                        )
                      })}
                    </div>
                  </div>
                )}

                {calendarMode === 'list' && !isFullscreen && (
                  <div className="flex flex-col gap-3">
                    {sortedDays.map(({ date, dayNum, entry }) => (
                      <button key={date} onClick={() => entry ? goToDetails(date) : goToForm(date)} className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all hover:scale-[1.02] ${entry ? 'bg-white border-gray-100 shadow-sm' : 'bg-gray-50 border-gray-200 border-dashed text-gray-400'}`}>
                        <div className="flex items-center gap-4">
                          <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg ${getColorClass(entry?.averageScore)}`}>{dayNum}</div>
                          <div className="text-right flex-1 overflow-hidden">
                            <div className={`font-bold truncate w-full ${entry ? 'text-gray-800' : 'text-gray-400'}`}>{entry?.title || 'لم يُسجل'}</div>
                            {entry && <div className="text-xs text-blue-500 font-bold">{entry.tasks?.length || 0} مهام منجزة</div>}
                          </div>
                        </div>
                        {entry && <div className="text-lg font-black bg-gray-50 px-3 py-1 rounded-lg text-gray-700 ml-2">{entry.averageScore}</div>}
                      </button>
                    ))}
                  </div>
                )}

                {/* حاوية الرسوم البيانية المتطورة */}
                {(calendarMode === 'bar' || calendarMode === 'line') && (
                  <div className={isFullscreen ? 'chart-fullscreen p-4' : 'w-full flex flex-col bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden mt-4'}>
                    <div className="w-full flex-1 overflow-x-auto scrollbar-hide flex items-center">
                       {calendarMode === 'bar' && <BarChartComponent data={chartData} onBarClick={(d) => goToDetails(d.date)} zoomLevel={zoomLevel} isFullscreen={isFullscreen} chartMetric={chartMetric} />}
                       {calendarMode === 'line' && <LineChartComponent data={chartData} totalItems={daysInMonth} onPointClick={(d) => goToDetails(d.date)} zoomLevel={zoomLevel} isFullscreen={isFullscreen} chartMetric={chartMetric} />}
                    </div>
                    <ChartControls zoomLevel={zoomLevel} setZoomLevel={setZoomLevel} isFullscreen={isFullscreen} setIsFullscreen={setIsFullscreen} />
                  </div>
                )}
              </div>
            </div>
          );
        };

        const YearView = ({ entries, criteria, monthlyTitles, currentYear, setCurrentYear, goToDashboard, setCurrentMonth, setCurrentView }) => {
          const [viewMode, setViewMode] = useState('grid');
          const [yearSortOption, setYearSortOption] = useState('month_desc');
          const [chartMetric, setChartMetric] = useState('average');
          const [zoomLevel, setZoomLevel] = useState(1); 
          const [isFullscreen, setIsFullscreen] = useState(false);
          
          const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
          
          const monthsData = useMemo(() => monthNames.map((name, index) => {
            const monthPrefix = `${currentYear}-${String(index + 1).padStart(2, '0')}`;
            const mEntries = Object.keys(entries || {}).filter(k => k.startsWith(monthPrefix)).map(k => entries[k]);
            
            let sumAvg = 0;
            let totalTasks = 0;
            let criteriaSums = {};
            // تجهيز تجميع جميع المعايير والفروع
            criteria.forEach(c => {
                criteriaSums[c.id] = 0;
                if(c.subCriteria) c.subCriteria.forEach(s => criteriaSums[s.id] = 0);
            });

            mEntries.forEach(e => {
               sumAvg += parseFloat(e.averageScore || 0);
               totalTasks += (e.tasks?.length || 0);
               criteria.forEach(c => { 
                   criteriaSums[c.id] += getCategoryScore(e.scores, c); 
                   if(c.subCriteria) c.subCriteria.forEach(sub => criteriaSums[sub.id] += parseFloat(e.scores?.[sub.id]||0));
               });
            });

            const len = mEntries.length;
            const avg = len > 0 ? (sumAvg / len).toFixed(1) : 0;
            const avgCriteria = {};
            if (len > 0) {
               criteria.forEach(c => {
                   avgCriteria[c.id] = (criteriaSums[c.id] / len).toFixed(1);
                   if(c.subCriteria) c.subCriteria.forEach(sub => avgCriteria[sub.id] = (criteriaSums[sub.id] / len).toFixed(1));
               });
            }

            const title = monthlyTitles[monthPrefix] || (len > 0 ? "يتم التحليل" : "فارغ");
            return { index, name, label: name, dayNum: index + 1, avg: parseFloat(avg), avgCriteria, title, entriesCount: len, avgTasks: len>0 ? totalTasks/len : 0, totalTasks };
          }), [currentYear, entries, monthlyTitles, criteria]);

          const sortedMonths = [...monthsData].sort((a, b) => {
            if (yearSortOption === 'month_desc') return b.index - a.index;
            if (yearSortOption === 'month_asc') return a.index - b.index;
            if (yearSortOption === 'tasks_desc') return b.totalTasks - a.totalTasks;
            if (yearSortOption === 'tasks_asc') return a.totalTasks - b.totalTasks;
            if (yearSortOption === 'score_desc') return b.avg - a.avg;
            if (yearSortOption === 'score_asc') return a.avg - b.avg;
            return 0;
          });

          const chartData = useMemo(() => {
            return monthsData.map(m => {
              let score = 0;
              if (m.entriesCount > 0) {
                if (chartMetric === 'average') score = m.avg;
                else if (chartMetric === 'tasksCount') score = m.avgTasks; // نعرض متوسط المهام في الشهر
                else score = parseFloat(m.avgCriteria[chartMetric] || 0);
              }
              return { ...m, displayScore: score };
            });
          }, [monthsData, chartMetric]);

          return (
            <div className={`flex-1 overflow-y-auto relative pb-10 ${isFullscreen ? 'bg-slate-900 fixed inset-0 z-[100] flex flex-col p-4' : 'bg-slate-50'}`}>
               {!isFullscreen && (
                 <header className="bg-white p-6 pb-6 shadow-sm rounded-b-[2.5rem]">
                  <div className="flex justify-between items-center mb-4">
                    <button onClick={() => setCurrentYear(currentYear - 1)} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ChevronRight className="text-lg" /></button>
                    <h1 className="text-xl font-extrabold text-gray-800">سنة {currentYear}</h1>
                    <button onClick={() => setCurrentYear(currentYear + 1)} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ChevronLeft className="text-lg" /></button>
                  </div>
                  <button onClick={goToDashboard} className="mt-2 w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white hover:bg-blue-700 rounded-xl transition font-bold text-sm shadow-md">
                    <Home className="text-sm" /> الرئيسية
                  </button>
                </header>
               )}

              <div className={`px-5 mt-6 mb-6 ${isFullscreen ? 'flex-1 flex flex-col h-full' : ''}`}>
                {!isFullscreen && (
                  <div className="flex justify-between items-center mb-4 bg-white p-2 rounded-2xl shadow-sm border border-gray-100 overflow-x-auto scrollbar-hide">
                    <div className="flex gap-1 flex-1 justify-center mx-2 shrink-0">
                      <button onClick={() => setViewMode('grid')} className={`p-2 rounded-xl transition ${viewMode === 'grid' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><Grid className="text-lg" /></button>
                      <button onClick={() => setViewMode('list')} className={`p-2 rounded-xl transition ${viewMode === 'list' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><AlignLeft className="text-lg" /></button>
                      <button onClick={() => setViewMode('bar')} className={`p-2 rounded-xl transition ${viewMode === 'bar' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><BarChart className="text-lg" /></button>
                      <button onClick={() => setViewMode('line')} className={`p-2 rounded-xl transition ${viewMode === 'line' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><LineChart className="text-lg" /></button>
                    </div>
                    {viewMode === 'list' && (
                      <select value={yearSortOption} onChange={(e) => setYearSortOption(e.target.value)} className="bg-gray-50 text-xs border-none outline-none focus:ring-2 focus:ring-blue-100 rounded-xl px-2 py-2 text-gray-600 font-bold max-w-[120px] shrink-0">
                        <option value="month_desc">الأحدث</option><option value="month_asc">الأقدم</option>
                        <option value="tasks_desc">المهام (الأكثر)</option><option value="tasks_asc">المهام (الأقل)</option>
                        <option value="score_desc">الأعلى تقييماً</option><option value="score_asc">الأقل تقييماً</option>
                      </select>
                    )}
                    {(viewMode === 'bar' || viewMode === 'line') && (
                       <select value={chartMetric} onChange={(e) => setChartMetric(e.target.value)} className="bg-blue-50 text-blue-700 text-xs border-none outline-none focus:ring-2 focus:ring-blue-200 rounded-xl px-2 py-2 font-bold max-w-[130px] shrink-0">
                         <option value="average">التقييم الكلي</option>
                         <option value="tasksCount">المهام (المتوسط)</option>
                         {criteria.map(c => {
                             if(c.subCriteria && c.subCriteria.length > 0) {
                                 return (
                                     <optgroup key={c.id} label={c.label}>
                                         <option value={c.id}>{c.label} (متوسط)</option>
                                         {c.subCriteria.map(sub => <option key={sub.id} value={sub.id}>- {sub.label}</option>)}
                                     </optgroup>
                                 )
                             }
                             return <option key={c.id} value={c.id}>{c.label}</option>;
                         })}
                       </select>
                    )}
                  </div>
                )}

                {viewMode === 'grid' && !isFullscreen && (
                   <div className="grid grid-cols-3 gap-3">
                     {monthsData.map((m) => (
                       <button key={m.index} onClick={() => { setCurrentMonth(new Date(currentYear, m.index, 1)); setCurrentView('calendar'); }} className={`aspect-square rounded-2xl p-3 flex flex-col items-center justify-center border-2 transition-transform hover:scale-105 ${getColorClass(m.avg)}`}>
                         <span className="font-bold text-sm mb-1">{m.name}</span>
                         {m.entriesCount > 0 && <span className="text-lg font-black">{m.avg}</span>}
                       </button>
                     ))}
                   </div>
                )}
                
                {viewMode === 'list' && !isFullscreen && (
                   <div className="flex flex-col gap-3">
                    {sortedMonths.map((m) => (
                      <button key={m.index} onClick={() => { setCurrentMonth(new Date(currentYear, m.index, 1)); setCurrentView('calendar'); }} className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all hover:scale-[1.02] ${m.entriesCount > 0 ? 'bg-white border-gray-100 shadow-sm' : 'bg-gray-50 border-gray-200 border-dashed text-gray-400'}`}>
                        <div className="flex items-center gap-4">
                          <div className={`w-14 h-14 rounded-xl flex items-center justify-center font-black text-sm ${getColorClass(m.avg)}`}>{m.name}</div>
                          <div className="text-right flex-1 overflow-hidden">
                            <div className={`font-bold truncate w-full ${m.entriesCount > 0 ? 'text-gray-800' : 'text-gray-400'}`}>{m.title}</div>
                            <div className="text-xs text-gray-500">{m.entriesCount} أيام، {m.totalTasks} مهام</div>
                          </div>
                        </div>
                        {m.entriesCount > 0 && <div className="text-lg font-black bg-white/50 px-3 py-1 rounded-lg text-gray-700 ml-2">{m.avg}</div>}
                      </button>
                    ))}
                  </div>
                )}

                {(viewMode === 'bar' || viewMode === 'line') && (
                  <div className={isFullscreen ? 'chart-fullscreen p-4' : 'w-full flex flex-col bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden mt-4'}>
                    <div className="w-full flex-1 overflow-x-auto scrollbar-hide flex items-center">
                       {viewMode === 'bar' && <BarChartComponent data={chartData} onBarClick={(m) => { setCurrentMonth(new Date(currentYear, m.index, 1)); setCurrentView('calendar'); }} zoomLevel={zoomLevel} isFullscreen={isFullscreen} chartMetric={chartMetric} />}
                       {viewMode === 'line' && <LineChartComponent data={chartData} totalItems={12} onPointClick={(m) => { setCurrentMonth(new Date(currentYear, m.index, 1)); setCurrentView('calendar'); }} zoomLevel={zoomLevel} isFullscreen={isFullscreen} chartMetric={chartMetric} />}
                    </div>
                    <ChartControls zoomLevel={zoomLevel} setZoomLevel={setZoomLevel} isFullscreen={isFullscreen} setIsFullscreen={setIsFullscreen} />
                  </div>
                )}
              </div>
            </div>
          );
        };

        const EntryFormView = ({ selectedDate, setSelectedDate, entries, criteria, saveEntry, goToCalendar, goToDetails, globalApiKey, openKeyModal }) => {
          const [transcript, setTranscript] = useState("");
          const [isRecording, setIsRecording] = useState(false);
          const [recordingTime, setRecordingTime] = useState(0);
          const [audioData, setAudioData] = useState(null);
          const [isAnalyzing, setIsAnalyzing] = useState(false);
          const [error, setError] = useState(null);
          
          const mediaRecorderRef = useRef(null);
          const timerRef = useRef(null);
          const recognitionRef = useRef(null);

          useEffect(() => {
            setTranscript(""); setAudioData(null); setError(null);
            return () => {
              if (timerRef.current) clearInterval(timerRef.current);
              if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
            };
          }, [selectedDate]);

          useEffect(() => {
            try {
              const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
              if (SpeechRecognition) {
                recognitionRef.current = new SpeechRecognition();
                recognitionRef.current.continuous = true;
                recognitionRef.current.interimResults = true;
                recognitionRef.current.lang = 'ar-SA';
                recognitionRef.current.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    if (final) setTranscript(prev => prev + final);
                };
                recognitionRef.current.onerror = () => setIsRecording(false);
                recognitionRef.current.onend = () => setIsRecording(false);
              }
            } catch (e) { }
            return () => { if (recognitionRef.current) recognitionRef.current.stop(); };
          }, []);

          const toggleRecording = async () => {
            if (!recognitionRef.current) return setError("المتصفح لا يدعم التسجيل المباشر. استخدم الكتابة.");
            if (isRecording) {
              if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') mediaRecorderRef.current.stop();
              if (recognitionRef.current) recognitionRef.current.stop();
              clearInterval(timerRef.current);
              setIsRecording(false);
            } else { 
              try { 
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                mediaRecorderRef.current = mediaRecorder;
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

                mediaRecorder.onstop = () => {
                  stream.getTracks().forEach(t => t.stop());
                  let mimeType = mediaRecorder.mimeType.split(';')[0];
                  if (!mimeType) mimeType = 'audio/webm';
                  
                  const blob = new Blob(chunks, { type: mimeType });
                  const reader = new FileReader();
                  reader.readAsDataURL(blob);
                  reader.onloadend = () => {
                    const base64data = reader.result.split(',')[1];
                    setAudioData({ base64: base64data, mimeType: mimeType });
                  };
                };

                setAudioData(null); setRecordingTime(0);
                mediaRecorder.start(); setIsRecording(true); setError(null);
                timerRef.current = setInterval(() => setRecordingTime(prev => prev + 1), 1000);
              } catch(e) { 
                setIsRecording(false); setError("لا يمكن الوصول للميكروفون.");
              } 
            }
          };

          const handleAnalyze = async () => {
            if (!globalApiKey || globalApiKey.trim() === "") return setError("مفتاح الذكاء الاصطناعي مفقود. يرجى إدخاله لكي تتمكن من التحليل.");
            if (!transcript.trim() && !audioData) return setError("الرجاء إدخال نص أو تسجيل مقطع صوتي.");

            setIsAnalyzing(true); setError(null);
            try {
              const dObj = new Date(selectedDate);
              const recentKeys = Object.keys(entries).filter(k => new Date(k) < dObj).sort((a,b) => new Date(b) - new Date(a)).slice(0, 5);
              const recentEntries = recentKeys.map(k => ({ date: k, ...entries[k] }));
              
              const existingText = entries[selectedDate]?.text || "";
              const combinedTextForAI = existingText ? `[الأحداث السابقة]:\n${existingText}\n\n[إضافات جديدة]:\n${transcript}` : transcript;

              const aiResult = await analyzeJournalWithAI(combinedTextForAI, audioData, recentEntries, criteria, globalApiKey);
              
              let scoresObj = {}, detailsObj = {};
              criteria.forEach(c => {
                 if(c.subCriteria) {
                     c.subCriteria.forEach(sub => {
                         scoresObj[sub.id] = parseInt(aiResult?.[`score_${sub.id}`]) || 0;
                         detailsObj[sub.id] = aiResult?.[`detail_${sub.id}`] || "";
                     });
                 } else {
                     scoresObj[c.id] = parseInt(aiResult?.[`score_${c.id}`]) || 0;
                     detailsObj[c.id] = aiResult?.[`detail_${c.id}`] || "";
                 }
              });
              
              const newAudioTranscript = audioData ? (aiResult.transcript || "") : "";
              let finalSavedText = existingText;
              if (transcript.trim() || newAudioTranscript.trim()) {
                 const addition = `${transcript} ${newAudioTranscript}`.trim();
                 finalSavedText = existingText ? `${existingText}\n\n[إضافة]: ${addition}` : addition;
              }

              await saveEntry(selectedDate, {
                text: finalSavedText, scores: scoresObj, categoryDetails: detailsObj, tasks: Array.isArray(aiResult?.tasks) ? aiResult.tasks : [],
                title: aiResult?.title || "يومياتي", comparison: aiResult?.comparison || "لا تتوفر مقارنة حالياً.", tips: aiResult?.tips || "استمر في تدوين يومياتك بانتظام.",
                averageScore: calculateOverallAverage(scoresObj, criteria), chatHistory: entries[selectedDate]?.chatHistory || [] 
              });
            } catch (err) { setError(`خطأ: ${err.message}`); } finally { setIsAnalyzing(false); }
          };

          const isExpired = entries?.[selectedDate] && (Date.now() - (entries[selectedDate].timestamp || Date.now())) > (24 * 60 * 60 * 1000);
          if (isExpired) {
            return (
              <div className="flex-1 flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
                <Lock className="text-6xl text-gray-400 mb-4 mx-auto" />
                <h2 className="text-xl font-bold text-gray-800 mb-6">انتهى وقت التعديل</h2>
                <button onClick={() => goToDetails(selectedDate)} className="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-blue-500/30">عرض اليوميات</button>
              </div>
            );
          }

          const formatTime = (sec) => `${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative flex flex-col pb-10">
              <header className="bg-white p-4 shadow-sm flex items-center justify-between border-b border-gray-100 shrink-0">
                <button onClick={goToCalendar} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ArrowRight className="text-lg" /></button>
                <div className="flex flex-col items-center bg-gray-50 px-4 py-1.5 rounded-xl border border-gray-200">
                   <label className="text-[10px] font-bold text-gray-400 uppercase">تاريخ اليوميات</label>
                   <input type="date" value={selectedDate} onChange={(e) => { setSelectedDate(e.target.value); if(entries[e.target.value]) goToDetails(e.target.value); }} className="bg-transparent text-sm border-none outline-none font-black text-blue-600 cursor-pointer" />
                </div>
                <div className="w-9"></div>
              </header>

              <div className="p-6 flex-1 flex flex-col gap-4">
                {!globalApiKey && (
                   <div className="bg-amber-50 p-4 rounded-2xl flex items-center justify-between border border-amber-200 shrink-0">
                      <div className="flex items-center gap-3 text-amber-800">
                         <AlertCircle className="text-xl shrink-0" />
                         <span className="text-sm font-bold">المفتاح مفقود لتفعيل الذكاء الاصطناعي</span>
                      </div>
                      <button onClick={openKeyModal} className="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold rounded-xl shadow-md transition-colors">إدخال المفتاح</button>
                   </div>
                )}

                <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex-1 flex flex-col items-center relative min-h-[300px]">
                  {entries[selectedDate] && (
                    <div className="absolute top-4 w-[90%] bg-blue-50 text-blue-700 py-2 px-3 rounded-xl text-xs font-bold text-center border border-blue-100 z-20">أنت تقوم بإضافة أحداث لليوم</div>
                  )}

                  {isRecording && <div className="absolute top-1/3 flex items-center justify-center pointer-events-none opacity-20"><div className="w-40 h-40 bg-red-500 rounded-full animate-ping absolute"></div></div>}
                  
                  <button onClick={toggleRecording} className={`relative z-10 w-24 h-24 rounded-full flex items-center justify-center transition-all duration-500 shadow-xl shrink-0 mt-8 ${isRecording ? 'bg-red-500 text-white scale-110' : 'bg-slate-900 text-white hover:bg-slate-800 hover:scale-105'}`}>
                    {isRecording ? <MicOff className="text-4xl" /> : <Mic className="text-4xl" />}
                  </button>
