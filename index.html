                  <p className="mt-4 text-gray-400 font-bold text-sm z-10 shrink-0">{isRecording ? `جاري التسجيل... (${formatTime(recordingTime)})` : 'تحدث أو اكتب أحداث اليوم'}</p>

                  {audioData && !isRecording && (
                    <div className="mt-4 w-full bg-blue-50 border border-blue-100 p-4 rounded-2xl flex items-center justify-between">
                      <div className="flex items-center gap-3"><PlayCircle className="text-3xl text-blue-500" /><div><p className="text-sm font-bold text-blue-900">مقطع صوتي جاهز</p><p className="text-xs text-blue-600">سيتم تفريغه أوتوماتيكياً</p></div></div>
                      <button onClick={() => setAudioData(null)} className="p-2 text-red-500 hover:bg-red-100 rounded-xl transition"><Trash className="text-lg"/></button>
                    </div>
                  )}

                  <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)} placeholder="أضف تفاصيل اليوم هنا..." className="mt-6 w-full flex-1 bg-slate-50 rounded-2xl p-5 text-gray-700 resize-none border-none focus:ring-2 focus:ring-blue-100 z-10 text-base leading-relaxed font-medium shadow-inner" />
                </div>
                
                {error && (
                  <div className="bg-red-50 p-4 rounded-2xl flex flex-col gap-2 shrink-0 border border-red-100">
                    <div className="flex items-start gap-3">
                      <AlertCircle className="text-lg text-red-500 shrink-0 mt-0.5" />
                      <div><p className="text-red-700 text-sm font-bold mb-1">تنبيه</p><p className="text-red-600 text-xs font-medium leading-relaxed">{error}</p></div>
                    </div>
                    {error.includes("مفتاح") && (
                       <button onClick={openKeyModal} className="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-xl mt-2 text-xs transition self-start ml-8">إدخال المفتاح الآن</button>
                    )}
                  </div>
                )}
                
                <button onClick={handleAnalyze} disabled={isAnalyzing || (!transcript.trim() && !audioData)} className="bg-blue-600 text-white w-full py-5 rounded-2xl font-black text-lg flex justify-center gap-2 shadow-xl shadow-blue-500/50 disabled:opacity-50 hover:bg-blue-700 shrink-0 mt-2">
                  {isAnalyzing ? <><Loader className="text-xl animate-spin" /> جاري التحليل والإضافة...</> : (error && globalApiKey ? <><RefreshCw className="text-lg"/> إعادة المحاولة</> : 'حفظ وتحليل')}
                </button>
              </div>
            </div>
          );
        };

        const EntryDetailsView = ({ selectedDate, entries, criteria, goToCalendar, goToForm, updateEntryData, globalApiKey, openKeyModal }) => {
          const entry = entries?.[selectedDate];
          const [chatInput, setChatInput] = useState("");
          const [isChatting, setIsChatting] = useState(false);
          const [isDeletingTasks, setIsDeletingTasks] = useState(false);
          const [tempTasks, setTempTasks] = useState([]); 
          const chatEndRef = useRef(null);
          const topRef = useRef(null);

          useEffect(() => { topRef.current?.scrollIntoView({ behavior: 'instant' }); }, [selectedDate]);
          useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [entry?.chatHistory]);

          if (!entry) return <div className="p-6 text-center mt-20 font-bold">لا يوجد سجل متاح</div>;

          const { scores = {}, categoryDetails = {}, tasks = [], title = "بدون لقب", averageScore = "0.0", chatHistory = [], comparison = "", tips = "" } = entry;
          const safeTasks = Array.isArray(tasks) ? tasks : []; 
          const displayTasks = isDeletingTasks ? tempTasks : safeTasks; 

          const handleSendMessage = async () => {
            if (!chatInput.trim()) return;
            if (!globalApiKey) return alert("المفتاح العام غير متوفر.");
            
            const userMsg = chatInput;
            setChatInput("");
            
            const updatedHistory = [...(chatHistory || []), { sender: 'user', text: userMsg }];
            updateEntryData(selectedDate, { chatHistory: updatedHistory });
            
            setIsChatting(true);
            try {
              const aiResponse = await chatWithJournalAI(entry, updatedHistory, userMsg, criteria, globalApiKey);
              const finalHistory = [...updatedHistory, { sender: 'ai', text: aiResponse.reply || "تم التحديث بنجاح." }];
              
              let newScores = { ...scores };
              criteria.forEach(c => { 
                 if(c.subCriteria) {
                    c.subCriteria.forEach(sub => { if (aiResponse[`score_${sub.id}`] !== undefined) newScores[sub.id] = aiResponse[`score_${sub.id}`]; });
                 } else {
                    if (aiResponse[`score_${c.id}`] !== undefined) newScores[c.id] = aiResponse[`score_${c.id}`]; 
                 }
              });

              let newTasks = aiResponse.tasks && Array.isArray(aiResponse.tasks) ? aiResponse.tasks : tasks;

              updateEntryData(selectedDate, { 
                chatHistory: finalHistory, scores: newScores, tasks: newTasks,
                title: aiResponse.title || title, averageScore: calculateOverallAverage(newScores, criteria)
              });
            } catch (err) {
              updateEntryData(selectedDate, { chatHistory: [...updatedHistory, { sender: 'ai', text: "عذراً، حدث خطأ في الاتصال." }] });
            } finally { setIsChatting(false); }
          };

          const startEditingTasks = () => { setTempTasks([...safeTasks]); setIsDeletingTasks(true); };
          const confirmTaskChanges = () => { updateEntryData(selectedDate, { tasks: tempTasks }); setIsDeletingTasks(false); };
          const cancelTaskChanges = () => { setIsDeletingTasks(false); setTempTasks([]); };
          const removeTempTask = (indexToRemove) => { setTempTasks(tempTasks.filter((_, i) => i !== indexToRemove)); };
          const removeAllTempTasks = () => { setTempTasks([]); };

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-10">
              <div ref={topRef} />
              <header className={`${getColorClass(averageScore)} p-6 pt-8 rounded-b-[3rem] shadow-xl text-center relative z-20`}>
                <div className="flex justify-between mb-4">
                   <button onClick={goToCalendar} className="p-2 bg-black/10 rounded-full hover:bg-black/20 text-white"><ArrowRight className="text-xl" /></button>
                   <button onClick={() => goToForm(selectedDate)} className="p-2 bg-black/10 rounded-full hover:bg-black/20 text-white" title="إضافة لليوم"><Plus className="text-xl" /></button>
                </div>
                <div className="text-white/80 text-sm font-bold tracking-widest mb-2">{selectedDate}</div>
                <h2 className="text-2xl font-black text-white mb-4 leading-tight text-wrap break-words px-2">"{title}"</h2>
                <div className="inline-flex items-center justify-center bg-white/20 px-6 py-2 rounded-full text-white font-black text-xl backdrop-blur-md shadow-inner">{averageScore} / 10</div>
              </header>

              <div className="px-4 -mt-6 z-10 flex flex-col gap-6 relative">
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 pt-10">
                  <div className="flex justify-between items-center mb-4">
                     <div className="flex items-center gap-3">
                       <h3 className="text-gray-800 font-black text-lg flex items-center gap-2"><CheckCircle className="text-xl text-blue-500"/> الإنجازات والمهام</h3>
                       {!isDeletingTasks ? (
                         <button onClick={startEditingTasks} className="p-1.5 bg-red-50 text-red-500 hover:bg-red-100 rounded-lg transition-colors"><Trash2 className="text-sm" /></button>
                       ) : (
                         <div className="flex items-center gap-1.5">
                           <button onClick={confirmTaskChanges} className="p-1.5 bg-green-100 text-green-700 hover:bg-green-200 rounded-lg transition-colors"><Check className="text-sm" /></button>
                           <button onClick={cancelTaskChanges} className="p-1.5 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-lg transition-colors"><X className="text-sm" /></button>
                           <button onClick={removeAllTempTasks} className="px-2 py-1.5 bg-red-100 text-red-600 text-xs font-bold rounded-lg hover:bg-red-200 transition-colors">حذف الكل</button>
                         </div>
                       )}
                     </div>
                     <div className="bg-blue-50 text-blue-600 font-black px-3 py-1 rounded-lg text-sm">{displayTasks.length} مهام</div>
                  </div>
                  
                  {displayTasks.length > 0 ? (
                    <ul className="space-y-3">
                      {displayTasks.map((task, idx) => (
                        <li key={idx} className="flex items-start gap-3 bg-gray-50 p-3 rounded-2xl border border-gray-100">
                          {isDeletingTasks ? (
                             <button onClick={() => removeTempTask(idx)} className="w-6 h-6 bg-red-100 text-red-600 rounded-full flex items-center justify-center shrink-0 hover:bg-red-200 transition-colors"><X className="text-xs" /></button>
                          ) : (
                             <span className="w-6 h-6 bg-white rounded-full flex items-center justify-center text-xs font-bold text-gray-400 shrink-0 border border-gray-200">{idx+1}</span>
                          )}
                          <span className="text-gray-700 font-medium text-sm pt-0.5 leading-relaxed">{task}</span>
                        </li>
                      ))}
                    </ul>
                  ) : <p className="text-gray-400 text-sm">لم يتم تسجيل مهام.</p>}
                </div>

                <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                  <h3 className="text-gray-800 font-black text-lg mb-5 flex items-center gap-2"><Activity className="text-xl text-blue-500" /> التحليل التفصيلي</h3>
                  <div className="flex flex-col gap-6">
                    {criteria.map(cat => {
                      const IconComp = IconMap[cat.icon] || Star;
                      const catScore = getCategoryScore(scores, cat).toFixed(1);
                      return (
                        <div key={cat.id} className="relative bg-gray-50 p-4 rounded-3xl border border-gray-100">
                          <div className="flex items-center gap-3 mb-2">
                            <div className={`w-10 h-10 flex items-center justify-center rounded-xl shadow-md ${cat.colorObj.main}`}><IconComp className="text-base text-white" /></div>
                            <div className="flex-1 flex justify-between items-end"><span className="font-bold text-gray-800">{cat.label}</span><span className={`font-black text-lg text-gray-900`}>{catScore}/10</span></div>
                          </div>
                          
                          {/* عرض الجوانب الفرعية بشكل شجري */}
                          {(cat.subCriteria && cat.subCriteria.length > 0) ? (
                              <div className="flex flex-col gap-3 pr-4 border-r-2 border-gray-200 mt-4 mb-2">
                                  {cat.subCriteria.map(sub => {
                                      const subScore = scores[sub.id] || 0;
                                      const detail = categoryDetails[sub.id] || "لا يوجد تحليل مفصل.";
                                      return (
                                          <div key={sub.id} className="flex flex-col gap-1">
                                              <div className="flex justify-between items-center text-sm">
                                                  <span className="font-bold text-gray-700 flex items-center gap-2">
                                                    <span className="w-1.5 h-1.5 rounded-full bg-gray-400"></span>{sub.label}
                                                  </span>
                                                  <span className="font-black text-gray-500">{subScore}/10</span>
                                              </div>
                                              <div className="text-xs text-gray-500 font-medium leading-relaxed pr-3">{detail}</div>
                                          </div>
                                      )
                                  })}
                              </div>
                          ) : (
                              <div className="mt-3">
                                  <div className="h-2.5 bg-gray-200 rounded-full overflow-hidden mb-2">
                                    <div className={`h-full ${cat.colorObj.main} rounded-full transition-all`} style={{ width: `${(catScore / 10) * 100}%` }}></div>
                                  </div>
                                  <div className={`${cat.colorObj.light} p-3 rounded-xl text-sm leading-relaxed text-gray-700 font-medium border border-white`}>{categoryDetails[cat.id] || "لا يوجد تحليل."}</div>
                              </div>
                          )}
                        </div>
                      )
                    })}
                  </div>
                </div>

                <div className="flex flex-col gap-4">
                  {comparison && (
                    <div className="bg-blue-50 p-5 rounded-3xl border border-blue-100 shadow-sm">
                      <h3 className="text-blue-800 font-black text-sm mb-2 flex items-center gap-2"><TrendingUp className="text-sm"/> مقارنة وتطور</h3>
                      <p className="text-blue-700 text-sm leading-relaxed font-medium">{comparison}</p>
                    </div>
                  )}
                  {tips && (
                    <div className="bg-amber-50 p-5 rounded-3xl border border-amber-100 shadow-sm">
                      <h3 className="text-amber-800 font-black text-sm mb-2 flex items-center gap-2"><Lightbulb className="text-sm"/> اقتراحات للتحسين</h3>
                      <p className="text-amber-700 text-sm leading-relaxed font-medium">{tips}</p>
                    </div>
                  )}
                </div>

                <div className="bg-white rounded-3xl shadow-sm border border-gray-100 flex flex-col overflow-hidden mb-6 mt-2">
                  <div className="bg-slate-900 p-4 flex justify-between items-center gap-3">
                    <div className="flex items-center gap-3">
                        <MessageSquare className="text-xl text-blue-400" />
                        <h3 className="text-white font-bold text-sm">الدردشة وتعديل التقييم</h3>
                    </div>
                    {!globalApiKey && (
                        <button onClick={openKeyModal} className="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 text-xs font-bold rounded-lg transition-colors">إدخال المفتاح</button>
                    )}
                  </div>
                  
                  <div className="p-4 bg-slate-50 min-h-[150px] max-h-[300px] overflow-y-auto flex flex-col gap-3">
                    {(!chatHistory || chatHistory.length === 0) && (
                      <div className="text-center text-gray-400 font-medium text-xs my-auto">هل نسيت شيئاً؟ تحدث معي لتعديله!</div>
                    )}
                    {chatHistory && chatHistory.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[85%] p-3 rounded-2xl text-sm font-medium leading-relaxed ${msg.sender === 'user' ? 'bg-blue-600 text-white rounded-tl-sm' : 'bg-white border border-gray-200 text-gray-800 rounded-tr-sm shadow-sm'}`}>
                          {msg.text}
                        </div>
                      </div>
                    ))}
                    {isChatting && (

            try {
              const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
              const data = await response.json();

              lastError = err;
              if (attempt === retries) break;
              await new Promise(res => setTimeout(res, 1500 * attempt));

          };
          let requiredKeys = ["transcript", "tasks", "title", "comparison", "tips"];

          criteria.forEach(c => {
            criteriaPrompt += `- ${c.label}: ${c.desc || 'استنتج التقييم'}\n`;
            dynamicProperties[`score_${c.id}`] = { type: "INTEGER", description: `تقييم ${c.label} (0-10)` };
            dynamicProperties[`detail_${c.id}`] = { type: "STRING", description: `سبب التقييم لـ ${c.label} (سطر واحد)` };
            requiredKeys.push(`score_${c.id}`, `detail_${c.id}`);
          });

          const systemPrompt = `أنت محلل حياة. حلل يوميات المستخدم. 
اللقب: 4 كلمات كحد أقصى.
المهام: استخرجها جميعاً كمصفوفة نصوص.
التقييم: 0-10 لكل معيار مع تبرير بسطر واحد.
${recentContext}\n${criteriaPrompt}`;

          const parts = [];
          if (combinedText && combinedText.trim() !== "") parts.push({ text: `نص أحداث اليوم:\n${combinedText}` });
          if (audioData) {
            parts.push({ inlineData: { mimeType: audioData.mimeType, data: audioData.base64 } });
            parts.push({ text: "\nفرّغ الصوت وحلله مع النص." });
          } else if (!combinedText || combinedText.trim() === "") throw new Error("لا يوجد نص أو صوت.");

          const payload = {
            contents: [{ role: "user", parts: parts }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: dynamicProperties, required: requiredKeys } }
          };
          return await fetchWithRetry(url, payload);
        };

        const chatWithJournalAI = async (currentEntry, chatHistory, userMessage, criteria, apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const historyContext = chatHistory.map(msg => `${msg.sender === 'user' ? 'المستخدم' : 'الذكاء الاصطناعي'}: ${msg.text}`).join('\n');
          let scoresContext = criteria.map(c => `${c.label}(${currentEntry.scores?.[c.id] || 0})`).join(', ');
          const entryContext = `اللقب الحالي: ${currentEntry.title}\nالمهام الحالية: ${(currentEntry.tasks || []).join('، ')}\nالتقييمات الحالية: ${scoresContext}`;

          let dynamicProperties = { 
            reply: { type: "STRING" }, title: { type: "STRING" },
            tasks: { type: "ARRAY", items: { type: "STRING" }, description: "تحديث قائمة المهام." }
          };
          criteria.forEach(c => { dynamicProperties[`score_${c.id}`] = { type: "INTEGER" }; });

          const payload = {
            contents: [{ role: "user", parts: [{ text: `سجل المحادثة:\n${historyContext}\n\nرسالة المستخدم: ${userMessage}` }] }],
            systemInstruction: { parts: [{ text: `أنت مساعد ليومياتي. رد على المستخدم وعدّل التقييمات، اللقب، وأضف أي مهام جديدة.\n\n${entryContext}` }] },
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: dynamicProperties, required: ["reply", "tasks"] } }
          };
          return await fetchWithRetry(url, payload);
        };

        const generateDashboardInsightsAI = async (entries, criteria, apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const entriesSummary = entries.map(e => `[${e.date}]: اللقب(${e.title}), المهام(${e.tasks?.join('، ') || 'لا يوجد'})`).join('\n').substring(0, 15000);

          let dynamicProperties = { overallTitle: { type: "STRING" } };
          let requiredKeys = ["overallTitle"];
          criteria.forEach(c => { dynamicProperties[`advice_${c.id}`] = { type: "STRING", description: `توصية لـ ${c.label}` }; requiredKeys.push(`advice_${c.id}`); });

          const payload = {
            contents: [{ role: "user", parts: [{ text: `ملخص أيامي:\n${entriesSummary}\nاستخرج لقباً دقيقاً يصفني ونصيحة لكل معيار.` }] }],
            systemInstruction: { parts: [{ text: "أرجع JSON بلقب شامل يعكس حقيقة الأفعال (أقصى 4 كلمات) وتوصيات قصيرة." }] },
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: dynamicProperties, required: requiredKeys } }
          };
          return await fetchWithRetry(url, payload);
        };

        const generateMonthlyTitleAI = async (entriesText, apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          const modelName = await getValidGeminiModel(apiKey);
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
          const payload = {
            contents: [{ role: "user", parts: [{ text: `استخرج لقباً يصف هذا الشهر (4 كلمات كحد أقصى):\n${entriesText}` }] }],
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { monthlyTitle: { type: "STRING" } }, required: ["monthlyTitle"] } }
          };
          const res = await fetchWithRetry(url, payload);
          return res ? res.monthlyTitle : "شهر جديد";
        };

        const calculateAverageScore = (scores, criteria) => {
          if (!scores || !criteria || criteria.length === 0) return "0.0";
          try {
            let sum = 0;
            criteria.forEach(c => { sum += Math.max(0, Math.min(10, parseInt(scores[c.id]) || 0)); });
            return (sum / criteria.length).toFixed(1);
          } catch (e) { return "0.0"; }
        };

        const getColorClass = (score) => {
          const s = parseFloat(score);
          if (isNaN(s) || s === 0) return 'bg-gray-100 text-gray-400 border-gray-200';
          if (s <= 2) return 'bg-yellow-100 text-yellow-800 border-yellow-300';
          if (s <= 4) return 'bg-yellow-300 text-yellow-900 border-yellow-400';
          if (s <= 6) return 'bg-lime-300 text-lime-900 border-lime-400';
          if (s <= 8) return 'bg-green-400 text-white border-green-500';
          return 'bg-green-600 text-white border-green-700 shadow-md';
        };

        const getChartBgColorClass = (score) => {
          if (score <= 2) return 'bg-yellow-500';
          if (score <= 4) return 'bg-yellow-400';
          if (score <= 6) return 'bg-lime-400';
          if (score <= 8) return 'bg-green-400';
          return 'bg-green-600';
        };

        const getChartStrokeColorClass = (score) => {
          if (score <= 2) return 'text-yellow-500';
          if (score <= 4) return 'text-yellow-400';
          if (score <= 6) return 'text-lime-400';
          if (score <= 8) return 'text-green-400';
          return 'text-green-600';
        };

        // ==========================================
        // 6. الرسوم البيانية المتطورة ومتحكمات التكبير
        // ==========================================
        const ChartControls = ({ zoomLevel, setZoomLevel, isFullscreen, setIsFullscreen }) => (
          <div className={`flex justify-center items-center gap-4 bg-gray-100 p-2 rounded-2xl w-fit mx-auto shadow-inner border border-gray-200 ${isFullscreen ? 'm-4' : 'mt-4'}`}>
             <button onClick={() => setZoomLevel(Math.max(0.1, zoomLevel - 0.2))} className="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm hover:bg-blue-50 text-gray-700 hover:text-blue-600 transition" title="تصغير">
               <MinusIcon className="text-sm"/>
             </button>
             <button onClick={() => setIsFullscreen(!isFullscreen)} className="px-6 py-2 h-10 bg-blue-600 text-white rounded-xl shadow-md hover:bg-blue-700 font-bold text-sm flex items-center gap-2 transition">
                {isFullscreen ? <Minimize className="text-sm"/> : <Maximize className="text-sm"/>}
                {isFullscreen ? 'إلغاء ملء الشاشة' : 'ملء الشاشة بالعرض'}
             </button>
             <button onClick={() => setZoomLevel(zoomLevel + 0.2)} className="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm hover:bg-blue-50 text-gray-700 hover:text-blue-600 transition" title="تكبير">
               <PlusIcon className="text-sm"/>
             </button>
          </div>
        );

        const BarChartComponent = ({ data, onBarClick, zoomLevel, isFullscreen }) => {
          const containerWidth = Math.max(100, data.length * 40 * zoomLevel);
          
          return (
            <div className={`w-full overflow-x-auto scrollbar-hide ${isFullscreen ? 'flex-1 pt-6' : 'h-[300px] pt-12'}`}>
              <div className={`flex items-end justify-between min-w-max gap-3 px-4 ${isFullscreen ? 'h-[90%]' : 'h-full'}`} style={{ width: `${containerWidth}%` }}>
                 {data.map((d, i) => {
                    const score = parseFloat(d.displayScore || 0);
                    const hasData = d.entry || d.entriesCount > 0;
                    const heightPercentage = hasData ? Math.max(8, (score / 10) * 100) : 4;

                    return (
                      <button key={i} onClick={() => hasData ? onBarClick(d) : null} className={`flex flex-col items-center group relative w-10 shrink-0 h-full justify-end ${hasData ? 'cursor-pointer' : 'cursor-default opacity-50'}`}>
                        {hasData && (
                          <div className="opacity-0 group-hover:opacity-100 absolute -top-10 bg-slate-800 text-white text-xs font-bold py-1.5 px-3 rounded-lg pointer-events-none whitespace-nowrap z-10 transition-opacity">
                            {score} - {d.entry?.title || d.title || ''}
                          </div>
                        )}
                        <div className={`w-full rounded-xl transition-all duration-500 ${hasData ? getChartBgColorClass(score) : 'bg-gray-200'} group-hover:opacity-80`} style={{ height: `${heightPercentage}%` }}></div>
                        <span className={`text-[11px] mt-3 font-bold ${hasData ? 'text-gray-700' : 'text-gray-400'}`}>{d.label || d.dayNum}</span>
                      </button>
                    )
                 })}
              </div>
            </div>
          )
        };

        const LineChartComponent = ({ data, totalItems, onPointClick, zoomLevel, isFullscreen }) => {
          const validData = data.filter(d => d.entry || d.entriesCount > 0);
          if(validData.length === 0) return <div className="text-center p-10 text-gray-500 bg-white rounded-3xl border border-gray-100 mt-4 w-full">لا توجد بيانات كافية للرسم البياني.</div>;

          const padding = 40;
          const svgWidth = Math.max(400, totalItems * 50 * zoomLevel);
          
          const getFullscreenHeight = () => {
            if (window.innerHeight > window.innerWidth) return window.innerWidth - 120;
            return window.innerHeight - 120;
          };
          const svgHeight = isFullscreen ? getFullscreenHeight() : 260;
          const usableHeight = svgHeight - padding * 2;

          const points = validData.map(d => {
            const idx = d.dayNum || (d.index + 1);
            const x = padding + (idx - 1) * ((svgWidth - padding * 2) / Math.max(1, totalItems - 1));
            const score = parseFloat(d.displayScore || 0);
            const y = svgHeight - padding - ((score / 10) * usableHeight);
            return { x, y, score, ...d };
          });

          const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

          return (
            <div className={`w-full overflow-x-auto scrollbar-hide ${isFullscreen ? 'flex-1 flex items-center' : ''}`}>
              <svg width={svgWidth} height={svgHeight} className="overflow-visible min-w-full">
                 {[0, 2.5, 5, 7.5, 10].map(val => (
                   <g key={val}>
                      <line x1={padding} y1={svgHeight - padding - (val/10)*usableHeight} x2={svgWidth - padding} y2={svgHeight - padding - (val/10)*usableHeight} stroke="#f3f4f6" strokeWidth="2" strokeDasharray="4 4" />
                      <text x={padding - 15} y={svgHeight - padding - (val/10)*usableHeight + 4} fontSize="10" fill="#9ca3af" textAnchor="end" fontWeight="bold">{val}</text>
                   </g>
                 ))}
                 <path d={pathD} fill="none" stroke="#cbd5e1" strokeWidth="4" strokeLinejoin="round" strokeLinecap="round" />
                 {points.map((p, i) => (
                   <g key={i} className="group cursor-pointer outline-none" onClick={() => onPointClick(p)}>
                     <circle cx={p.x} cy={p.y} r="6" fill="#fff" className={`${getChartStrokeColorClass(p.score)} transition-all duration-300 group-hover:r-8`} strokeWidth="4" stroke="currentColor" />
                     <text x={p.x} y={svgHeight - 10} fontSize="11" fill="#6b7280" textAnchor="middle" fontWeight="bold">{p.label || p.dayNum}</text>
                     <rect x={p.x - 20} y={p.y - 35} width="40" height="20" rx="4" fill="#1e293b" className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none" />
                     <text x={p.x} y={p.y - 21} fontSize="12" fill="#fff" fontWeight="bold" textAnchor="middle" className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">{p.score}</text>
                   </g>
                 ))}
              </svg>
            </div>
          )
        };

        // ==========================================
        // 7. شاشات العرض والتسجيل
        // ==========================================
        const AuthView = () => {
          const [isLogin, setIsLogin] = useState(true);
          const [name, setName] = useState('');
          const [phone, setPhone] = useState('');
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');
          const [rememberMe, setRememberMe] = useState(true); 
          const [error, setError] = useState('');
          const [loading, setLoading] = useState(false);

          const handleSubmit = async (e) => {
            e.preventDefault();
            if (isLogin) {
              if (!email || !password) return setError('يرجى تعبئة جميع الحقول');
            } else {
              if (!name || !phone || !email || !password) return setError('يرجى تعبئة جميع الحقول لإنشاء الحساب');
            }
            
            if (!auth) return setError('حدث خطأ في الاتصال بقاعدة البيانات.');
            
            setError('');
            setLoading(true);
            try {
              await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
              
              if (isLogin) {
                await auth.signInWithEmailAndPassword(email, password);
              } else {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                if (db) {
                  await db.doc(`artifacts/${appIdStr}/users/${userCred.user.uid}/profile/info`).set({ name, phone, email, createdAt: Date.now() });
                }
              }
            } catch (err) {
              if (err.code === 'auth/email-already-in-use') setError('البريد الإلكتروني مستخدم مسبقاً');
              else if (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') setError('بيانات الدخول غير صحيحة');
              else if (err.code === 'auth/weak-password') setError('كلمة المرور ضعيفة جداً');
              else setError('حدث خطأ: ' + err.message);
            } finally { setLoading(false); }
          };

          return (
            <div className="flex-1 flex items-center justify-center bg-slate-50 p-6 min-h-screen">
              <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl border border-gray-100 relative overflow-hidden">
                <div className="absolute top-0 left-0 right-0 h-32 bg-slate-900 rounded-b-[3rem] z-0"></div>
                <div className="relative z-10 flex flex-col items-center mb-8 pt-4">
                  <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg mb-4 border-4 border-slate-50"><Brain className="text-4xl text-blue-600" /></div>
                  <h1 className="text-2xl font-black text-gray-800">يومياتي الذكية</h1>
                  <p className="text-sm text-gray-500 font-medium mt-1">حلل يومك، طوّر ذاتك</p>
                </div>

                <form onSubmit={handleSubmit} className="flex flex-col gap-4 relative z-10">
                  {!isLogin && (
                    <>
                      <div>
                        <div className="relative">
                          <User className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" />
                          <input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="الاسم الكامل" />
                        </div>
                      </div>
                      <div>
                        <div className="relative">
                          <Phone className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" />
                          <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="05XXXXXXXX" dir="ltr" />
                        </div>
                      </div>
                    </>
                  )}
                  <div>
                    <div className="relative"><Mail className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" /><input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="البريد الإلكتروني" /></div>
                  </div>
                  <div>
                    <div className="relative"><Key className="text-lg text-gray-400 absolute right-4 top-1/2 -translate-y-1/2" /><input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-xl pr-12 pl-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="كلمة المرور" /></div>
                  </div>
                  <div className="flex items-center gap-2 mt-1">
                    <input type="checkbox" id="rememberMe" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer" />
                    <label htmlFor="rememberMe" className="text-xs font-bold text-gray-600 cursor-pointer select-none">تذكرني (البقاء متصلاً)</label>
                  </div>
                  {error && <div className="text-red-600 text-xs font-bold bg-red-50 p-3 rounded-lg flex items-start gap-2"><AlertCircle className="text-sm shrink-0 mt-0.5" />{error}</div>}
                  <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white font-bold text-lg rounded-xl py-3.5 shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition mt-2 flex justify-center items-center gap-2">
                    {loading ? <Loader className="text-lg animate-spin" /> : (isLogin ? <><LogIn className="text-lg"/> تسجيل الدخول</> : <><UserPlus className="text-lg"/> إنشاء حساب</>)}
                  </button>
                </form>
                <div className="mt-6 flex flex-col gap-4 relative z-10">
                  <button onClick={() => {setIsLogin(!isLogin); setError('');}} className="text-sm font-bold text-gray-500 hover:text-blue-600 transition">
                    {isLogin ? "ليس لديك حساب؟ سجل الآن" : "لديك حساب بالفعل؟ سجل دخولك"}
                  </button>
                </div>
              </div>
            </div>
          );
        };

        const SettingsView = ({ criteria, saveCriteria, goToDashboard }) => {
          const [editingId, setEditingId] = useState(null);
          const [formData, setFormData] = useState({ label: '', desc: '', icon: 'Star' });

          const handleEdit = (c) => { setEditingId(c.id); setFormData({ label: c.label, desc: c.desc, icon: c.icon }); };

          const handleDelete = (id) => {
            if (criteria.length <= 1) return alert("يجب أن يكون هناك معيار واحد على الأقل.");
            if (window.confirm("حذف هذا المعيار؟")) {
              saveCriteria(criteria.filter(c => c.id !== id));
            }
          };

          const handleSave = () => {
            if (!formData.label.trim()) return alert("اسم المعيار مطلوب");
            if (editingId) {
              saveCriteria(criteria.map(c => c.id === editingId ? { ...c, ...formData } : c));
            } else {
              const newId = `crit_${Date.now()}`;
              const randomColor = availableColors[Math.floor(Math.random() * availableColors.length)];
              saveCriteria([...criteria, { id: newId, ...formData, colorObj: randomColor }]);
            }
            setEditingId(null); setFormData({ label: '', desc: '', icon: 'Star' });
          };

          const handleLogout = () => { if(auth) auth.signOut(); };

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-10">
              <header className="bg-white p-6 pb-6 shadow-sm rounded-b-[2.5rem] flex justify-between items-center sticky top-0 z-20">
                <button onClick={goToDashboard} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ArrowRight className="text-lg text-gray-700" /></button>
                <h1 className="text-xl font-black text-gray-800">الإعدادات</h1>
                <button onClick={handleLogout} className="p-2 bg-red-50 text-red-600 rounded-full hover:bg-red-100" title="تسجيل الخروج"><LogOut className="text-lg" /></button>
              </header>

              <div className="p-5">
                <div className="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 mb-6">
                  <h2 className="text-gray-800 font-bold mb-4">{editingId ? "تعديل المعيار" : "إضافة معيار جديد"}</h2>
                  <div className="flex flex-col gap-4">
                    <div>
                      <label className="text-xs font-bold text-gray-500 mb-1 block">الأيقونة</label>
                      <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                        {Object.keys(IconMap).map(iconName => {
                          const IconComp = IconMap[iconName];
                          return (
                            <button key={iconName} onClick={() => setFormData({...formData, icon: iconName})} className={`p-3 rounded-xl border shrink-0 transition-all ${formData.icon === iconName ? 'bg-blue-50 border-blue-500 text-blue-600' : 'bg-gray-50 border-transparent text-gray-400 hover:bg-gray-100'}`}>
                              <IconComp className="text-xl" />
                            </button>
                          )
                        })}
                      </div>
                    </div>
                    <div>
                      <label className="text-xs font-bold text-gray-500 mb-1 block">اسم المعيار (مثل: اجتماعية، دينية)</label>
                      <input type="text" value={formData.label} onChange={e => setFormData({...formData, label: e.target.value})} className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="أدخل اسم المعيار..." />
                    </div>
                    <div>
                      <label className="text-xs font-bold text-gray-500 mb-1 block">شرح المعيار للذكاء الاصطناعي (اختياري)</label>
                      <textarea value={formData.desc} onChange={e => setFormData({...formData, desc: e.target.value})} rows="2" className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="مثال: يركز هذا الجانب على صلة الرحم..."></textarea>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={handleSave} className="flex-1 bg-blue-600 text-white font-bold rounded-xl py-3 shadow-md hover:bg-blue-700">حفظ المعيار</button>
                      {editingId && <button onClick={() => {setEditingId(null); setFormData({label:'', desc:'', icon:'Star'})}} className="px-4 bg-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-300">إلغاء</button>}
                    </div>
                  </div>
                </div>

                <h3 className="text-gray-500 font-bold text-sm mb-3 px-1">المعايير الحالية ({criteria.length})</h3>
                <div className="flex flex-col gap-3">
                  {criteria.map(c => {
                    const IconComp = IconMap[c.icon] || Star;
                    return (
                      <div key={c.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">

              </div>

        const DashboardView = ({ entries, criteria, globalApiKey, goToCalendar, goToYear, goToSettings, openKeyModal }) => {
          const [dashboardFilter, setDashboardFilter] = useState('40days');
          const [insights, setInsights] = useState(null);
          const [isGeneratingInsights, setIsGeneratingInsights] = useState(false);

          const filteredEntries = useMemo(() => {
            try {
              const now = new Date();
              const allKeys = Object.keys(entries || {});
              if (dashboardFilter === 'all') return allKeys.map(k => ({ date: k, ...entries[k] }));
              
              return allKeys.filter(key => {
                const d = new Date(key);
                if (isNaN(d.getTime())) return false;
                if (dashboardFilter === '40days') return (now - d) <= (40 * 24 * 60 * 60 * 1000);
                if (dashboardFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if (dashboardFilter === 'year') return d.getFullYear() === now.getFullYear();
                return true;
              }).map(k => ({ date: k, ...entries[k] }));
            } catch (e) { return []; }
          }, [entries, dashboardFilter]);

          const stats = useMemo(() => {
            if (!filteredEntries || filteredEntries.length === 0) return { avg: "0.0", totalTasks: 0, criteriaScores: {} };
            let sumAvg = 0, tTasks = 0;
            let cScores = {};
            criteria.forEach(c => cScores[c.id] = 0);
            
            filteredEntries.forEach(e => {
              sumAvg += parseFloat(e.averageScore || 0);
              tTasks += (Array.isArray(e?.tasks) ? e.tasks.length : 0);
              criteria.forEach(c => { cScores[c.id] += parseFloat(e?.scores?.[c.id] || 0); });
            });
            
            const len = filteredEntries.length;
            let finalScores = {};
            criteria.forEach(c => { finalScores[c.id] = (cScores[c.id] / len).toFixed(1); });

            return { avg: (sumAvg / len).toFixed(1), totalTasks: tTasks, criteriaScores: finalScores };
          }, [filteredEntries, criteria]);

          useEffect(() => {
            let isMounted = true;
            if (filteredEntries.length === 0 || !globalApiKey) { setInsights(null); return; }
            
            const fetchInsights = async () => {
              setIsGeneratingInsights(true);
              try { 
                const res = await generateDashboardInsightsAI(filteredEntries, criteria, globalApiKey); 
                if (isMounted && res) setInsights(res); 
              } catch(e) { } 
              finally { if(isMounted) setIsGeneratingInsights(false); }
            };
            fetchInsights();
            return () => { isMounted = false; };
          }, [dashboardFilter, filteredEntries, criteria, globalApiKey]);

          return (
            <div className="flex-1 overflow-y-auto bg-slate-50 relative pb-32">
              <header className="bg-slate-900 text-white p-6 pb-8 shadow-xl rounded-b-[2.5rem] relative overflow-hidden">
                <div className="flex justify-between items-center mb-6 relative z-10">
                  <h1 className="text-xl font-extrabold flex items-center gap-2"><LayoutDashboard className="text-xl text-blue-400" /> إحصائياتي</h1>
                  <div className="flex gap-2">
                    <select value={dashboardFilter} onChange={(e) => setDashboardFilter(e.target.value)} className="bg-white/10 text-white text-sm border border-white/20 outline-none focus:ring-2 focus:ring-blue-400 rounded-xl px-2 py-2 font-medium">
                      <option value="40days" className="text-gray-800">40 يوم</option>
                      <option value="month" className="text-gray-800">الشهر</option>
                      <option value="year" className="text-gray-800">السنة</option>
                      <option value="all" className="text-gray-800">الكل</option>
                    </select>
                    <button onClick={goToSettings} className="p-2 bg-white/10 border border-white/20 rounded-xl hover:bg-white/20 transition relative">
                      <Settings className="text-lg text-white" />
                    </button>
                  </div>
                </div>
                
                {filteredEntries.length === 0 ? (
                  <div className="text-center py-6 relative z-10"><p className="text-white/70 font-medium">لا توجد بيانات مسجلة.</p></div>
                ) : (
                  <div className="flex flex-col gap-6 relative z-10">
                    <div className="flex justify-between items-center">
                      <div className="flex-1 pr-2">
                        <p className="text-white/60 text-xs font-bold uppercase mb-1">اللقب العام</p>
                        <h2 className="text-2xl font-black text-white leading-tight">
                          {!globalApiKey ? "جاري الإعداد..." : (insights?.overallTitle || (isGeneratingInsights ? <Loader className="text-xl animate-spin inline" /> : "مُنجز"))}
                        </h2>
                      </div>
                      <div className="text-center bg-white/10 p-3 rounded-2xl border border-white/10 min-w-[80px]">
                        <p className="text-white/60 text-[10px] font-bold uppercase mb-1">المتوسط</p>
                        <div className="text-3xl font-black text-green-400">{stats.avg}</div>
                      </div>
                    </div>
                    <div className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4">
                      <div className="p-3 bg-blue-500/20 rounded-xl"><ListTodo className="text-xl text-blue-300" /></div>
                      <div><div className="text-3xl font-black text-white">{stats.totalTasks}</div><div className="text-xs text-white/60 font-bold uppercase">مهمة وعمل منجز</div></div>
                    </div>
                  </div>
                )}
              </header>

              <div className="px-5 mt-6 flex flex-col gap-6 relative z-10">
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={goToCalendar} className="bg-blue-100 p-4 rounded-2xl shadow-sm border border-blue-200 flex flex-col items-center gap-2 hover:bg-blue-200 active:scale-95 transition">
                    <CalendarDays className="text-3xl text-blue-600" /><span className="font-bold text-blue-900 text-sm">التقويم الشهري</span>
                  </button>
                  <button onClick={goToYear} className="bg-purple-100 p-4 rounded-2xl shadow-sm border border-purple-200 flex flex-col items-center gap-2 hover:bg-purple-200 active:scale-95 transition">
                    <Calendar className="text-3xl text-purple-600" /><span className="font-bold text-purple-900 text-sm">التقويم السنوي</span>
                  </button>
                </div>

                {!globalApiKey && (
                   <div className="bg-amber-50 p-4 rounded-2xl flex items-center justify-between border border-amber-200">
                      <div className="flex items-center gap-3 text-amber-800">
                         <AlertCircle className="text-xl" />
                         <span className="text-sm font-bold">مفتاح الذكاء الاصطناعي مفقود!</span>
                      </div>
                      <button onClick={openKeyModal} className="px-4 py-2 bg-amber-600 text-white text-xs font-bold rounded-xl shadow-md hover:bg-amber-700 transition">إدخال المفتاح</button>
                   </div>
                )}

                {filteredEntries.length > 0 && (
                  <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6">
                    <h3 className="text-gray-800 font-black text-lg mb-6 flex items-center gap-2"><Activity className="text-lg text-blue-500" /> التحليل العام</h3>
                    <div className="flex flex-col gap-8">
                      {criteria.map(cat => {
                        const IconComp = IconMap[cat.icon] || Star;
                        const score = stats.criteriaScores[cat.id] || "0.0";
                        return (
                          <div key={cat.id} className="relative">
                            <div className="flex items-center gap-3 mb-2">
                              <div className={`w-10 h-10 flex items-center justify-center rounded-xl shadow-md ${cat.colorObj.main}`}><IconComp className="text-base text-white" /></div>
                              <div className="flex-1 flex justify-between items-end">
                                <span className="font-bold text-gray-700">{cat.label}</span>
                                <span className={`font-black text-lg text-gray-900`}>{score}/10</span>
                              </div>
                            </div>
                            <div className="h-3 bg-gray-100 rounded-full overflow-hidden mb-3">
                              <div className={`h-full ${cat.colorObj.main} rounded-full transition-all duration-1000`} style={{ width: `${(parseFloat(score) / 10) * 100}%` }}></div>
                            </div>
                            <div className="bg-gray-50 p-4 rounded-2xl text-sm leading-relaxed text-gray-600 font-medium border border-gray-100">
                               {!globalApiKey ? "أضف مفتاح API للحصول على نصائح." : (isGeneratingInsights ? <Loader className="text-sm animate-spin text-gray-400"/> : (insights?.[`advice_${cat.id}`] || "الذكاء الاصطناعي يحلل بياناتك."))}
                            </div>
                          </div>
                        )
                      })}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );

        const CalendarView = ({ entries, criteria, monthlyTitles, currentMonth, setCurrentMonth, goToDashboard, goToForm, goToDetails }) => {
          const [calendarMode, setCalendarMode] = useState('grid');
          const [sortOption, setSortOption] = useState('date_desc');
          const [chartMetric, setChartMetric] = useState('average');

          const [isFullscreen, setIsFullscreen] = useState(false);
          
          const year = currentMonth.getFullYear();
          const month = currentMonth.getMonth();
          const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
          const mTitle = monthlyTitles[monthKey] || "شهر جديد";
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

          const allDays = useMemo(() => {
            return [...Array(daysInMonth)].map((_, i) => {
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i + 1).padStart(2, '0')}`;
              return { date: dateStr, dayNum: i + 1, label: String(i + 1), entry: entries?.[dateStr] };
            });

          const sortedDays = [...allDays].sort((a, b) => {
            if (sortOption === 'date_desc') return b.dayNum - a.dayNum;
            if (sortOption === 'date_asc') return a.dayNum - b.dayNum;
            if (sortOption === 'status') { if (a.entry && !b.entry) return -1; if (!a.entry && b.entry) return 1; return b.dayNum - a.dayNum; }
            if (sortOption === 'score_desc') return (parseFloat(b.entry?.averageScore) || -1) - (parseFloat(a.entry?.averageScore) || -1);
            if (sortOption === 'score_asc') return (parseFloat(a.entry?.averageScore) || 11) - (parseFloat(b.entry?.averageScore) || 11);
            return 0;
          });

          const chartData = useMemo(() => {
            return allDays.map(d => {
              let score = 0;
              if (d.entry) {
                score = chartMetric === 'average' ? parseFloat(d.entry.averageScore || 0) : parseFloat(d.entry.scores?.[chartMetric] || 0);
              }
              return { ...d, displayScore: score };
            });
          }, [allDays, chartMetric]);

          return (
            <div className={`flex-1 overflow-y-auto relative pb-10 ${isFullscreen ? 'bg-slate-900 fixed inset-0 z-[100] flex flex-col p-4' : 'bg-slate-50'}`}>

                <header className="bg-white p-6 pb-6 shadow-sm rounded-b-[2.5rem]">
                  <div className="flex justify-between items-center mb-4">
                    <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ChevronRight className="text-lg" /></button>
                    <h1 className="text-xl font-extrabold text-gray-800">{monthNames[month]} {year}</h1>
                    <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><ChevronLeft className="text-lg" /></button>
                  </div>
                  <div className="text-center">
                    <p className="text-gray-400 text-xs font-bold uppercase">اللقب</p>
                    <h2 className="text-lg font-bold text-gray-800 truncate">{mTitle}</h2>
                  </div>
                  {/* زر الرئيسية الجديد تحت اللقب وممتد بالكامل */}
                  <button onClick={goToDashboard} className="mt-5 w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white hover:bg-blue-700 rounded-xl transition font-bold text-sm shadow-md">
                    <Home className="text-sm" /> الرئيسية
                  </button>
                </header>
              )}

              <div className={`px-5 mt-6 mb-6 ${isFullscreen ? 'flex-1 flex flex-col h-full' : ''}`}>
                {!isFullscreen && (
                  <div className="flex justify-between items-center mb-4 bg-white p-2 rounded-2xl shadow-sm border border-gray-100 overflow-x-auto scrollbar-hide">
                    <div className="flex gap-1 flex-1 justify-center mx-2 shrink-0">
                      <button onClick={() => setCalendarMode('grid')} className={`p-2 rounded-xl transition ${calendarMode === 'grid' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><Grid className="text-lg" /></button>
                      <button onClick={() => setCalendarMode('list')} className={`p-2 rounded-xl transition ${calendarMode === 'list' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><AlignLeft className="text-lg" /></button>
                      <button onClick={() => setCalendarMode('bar')} className={`p-2 rounded-xl transition ${calendarMode === 'bar' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><BarChart className="text-lg" /></button>
                      <button onClick={() => setCalendarMode('line')} className={`p-2 rounded-xl transition ${calendarMode === 'line' ? 'bg-blue-100 text-blue-600' : 'text-gray-400 hover:bg-gray-50'}`}><LineChart className="text-lg" /></button>
                    </div>
                    
                    {calendarMode === 'list' && (
                      <select value={sortOption} onChange={(e) => setSortOption(e.target.value)} className="bg-gray-50 text-xs border-none outline-none focus:ring-2 focus:ring-blue-100 rounded-xl px-2 py-2 text-gray-600 font-bold w-[90px] shrink-0">
                        <option value="date_desc">الأحدث</option><option value="date_asc">الأقدم</option>
                        <option value="status">المنجزة</option><option value="score_desc">الأعلى</option><option value="score_asc">الأقل</option>
                      </select>
                    )}
                    {(calendarMode === 'bar' || calendarMode === 'line') && (
                       <select value={chartMetric} onChange={(e) => setChartMetric(e.target.value)} className="bg-blue-50 text-blue-700 text-xs border-none outline-none focus:ring-2 focus:ring-blue-200 rounded-xl px-2 py-2 font-bold max-w-[120px] shrink-0">
                         <option value="average">التقييم الكلي</option>
                         {criteria.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                       </select>
                    )}
                  </div>
                )}

                {calendarMode === 'grid' && !isFullscreen && (
                  <div>
                    <div className="grid grid-cols-7 gap-2 mb-2">{['أحد', 'إثن', 'ثلا', 'أرب', 'خمي', 'جمع', 'سبت'].map(day => <div key={day} className="text-center text-xs font-bold text-gray-400">{day}</div>)}</div>
                    <div className="grid grid-cols-7 gap-2">
                      {[...Array(new Date(year, month, 1).getDay())].map((_, i) => <div key={`empty-${i}`} className="aspect-square"></div>)}
                      {allDays.map(({ date, dayNum, entry }) => {
                        const isToday = date === new Date().toISOString().split('T')[0];
                        return (
                          <button key={dayNum} onClick={() => entry ? goToDetails(date) : goToForm(date)} className={`relative aspect-square rounded-2xl flex flex-col items-center justify-center border-2 transition-transform hover:scale-105 ${getColorClass(entry?.averageScore)} ${isToday && !entry ? 'ring-2 ring-blue-500 border-transparent' : ''}`}>
                            <span className={`text-base font-bold ${entry ? '' : 'opacity-70'}`}>{dayNum}</span>
                            {entry && <span className="text-[10px] font-black mt-0.5 opacity-90">{entry.averageScore}</span>}
                          </button>

                {calendarMode === 'list' && !isFullscreen && (
                  <div className="flex flex-col gap-3">
                    {sortedDays.map(({ date, dayNum, entry }) => (
                      <button key={date} onClick={() => entry ? goToDetails(date) : goToForm(date)} className={`w-full flex items-center justify-between p-4 rounded-2xl border transition-all hover:scale-[1.02] ${entry ? 'bg-white border-gray-100 shadow-sm' : 'bg-gray-50 border-gray-200 border-dashed text-gray-400'}`}>
                        <div className="flex items-center gap-4">
                          <div className={`w-12 h-12 rounded-xl flex items-center justify-center font-black text-lg ${getColorClass(entry?.averageScore)}`}>{dayNum}</div>

                            <div className={`font-bold truncate w-full ${entry ? 'text-gray-800' : 'text-gray-400'}`}>{entry?.title || 'لم يُسجل'}</div>
                            {entry && <div className="text-xs text-blue-500 font-bold">{Array.isArray(entry.tasks) ? entry.tasks.length : 0} مهام</div>}
                          </div>
                        </div>
                        {entry && <div className="text-lg font-black bg-gray-50 px-3 py-1 rounded-lg text-gray-700 ml-2">{entry.averageScore}</div>}
                      </button>
                    ))}
                  </div>
                )}

                {/* حاوية الرسوم البيانية المتطورة */}
                {(calendarMode === 'bar' || calendarMode === 'line') && (
                  <div className={isFullscreen ? 'chart-fullscreen p-4' : 'w-full flex flex-col bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden mt-4'}>
                    <div className="w-full flex-1 overflow-x-auto scrollbar-hide flex items-center">
                       {calendarMode === 'bar' && <BarChartComponent data={chartData} onBarClick={(d) => goToDetails(d.date)} zoomLevel={zoomLevel} isFullscreen={isFullscreen} />}
                       {calendarMode === 'line' && <LineChartComponent data={chartData} totalItems={daysInMonth} onPointClick={(d) => goToDetails(d.date)} zoomLevel={zoomLevel} isFullscreen={isFullscreen} />}
                    </div>
                    <ChartControls zoomLevel={zoomLevel} setZoomLevel={setZoomLevel} isFullscreen={isFullscreen} setIsFullscreen={setIsFullscreen} />
                  </div>
                )}
              </div>
            </div>

        const YearView = ({ entries, criteria, monthlyTitles, currentYear, setCurrentYear, goToDashboard, setCurrentMonth, setCurrentView }) => {

          const [yearSortOption, setYearSortOption] = useState('month_desc');
          const [chartMetric, setChartMetric] = useState('average');
          const [zoomLevel, setZoomLevel] = useState(0.8); // Zoom مصغر افتراضياً
          const [isFullscreen, setIsFullscreen] = useState(false);
          
          const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
          
          const monthsData = useMemo(() => monthNames.map((name, index) => {
            const monthPrefix = `${currentYear}-${String(index + 1).padStart(2, '0')}`;
            const mEntries = Object.keys(entries || {}).filter(k => k.startsWith(monthPrefix)).map(k => entries[k]);
            
            let sumAvg = 0;
            let criteriaSums = {};
            criteria.forEach(c => criteriaSums[c.id] = 0);

            mEntries.forEach(e => {
               sumAvg += parseFloat(e.averageScore || 0);
               criteria.forEach(c => { criteriaSums[c.id] += parseFloat(e.scores?.[c.id] || 0); });
            });

            const len = mEntries.length;
            const avg = len > 0 ? (sumAvg / len).toFixed(1) : 0;
            const avgCriteria = {};
            if (len > 0) {
               criteria.forEach(c => avgCriteria[c.id] = (criteriaSums[c.id] / len).toFixed(1));
            }

            const title = monthlyTitles[monthPrefix] || (len > 0 ? "يتم التحليل" : "فارغ");
            return { index, name, label: name, dayNum: index + 1, avg: parseFloat(avg), avgCriteria, title, entriesCount: len, entry: len > 0 ? { averageScore: avg, title: title } : null };
          }), [currentYear, entries, monthlyTitles, criteria]);

          const sortedMonths = [...monthsData].sort((a, b) => {
            if (yearSortOption === 'month_desc') return b.index - a.index;
            if (yearSortOption === 'month_asc') return a.index - b.index;
            if (yearSortOption === 'score_desc') return b.avg - a.avg;
            if (yearSortOption === 'score_asc') return a.avg - b.avg;
            return 0;
          });

          const chartData = useMemo(() => {
            return monthsData.map(m => {
              let score = 0;
              if (m.entriesCount > 0) {
                score = chartMetric === 'average' ? m.avg : parseFloat(m.avgCriteria[chartMetric] || 0);

              return { ...m, displayScore: score };
            });

          return (
            <div className={`flex-1 overflow-y-auto relative pb-10 ${isFullscreen ? 'bg-slate-900 fixed inset-0 z-[100] flex flex-col p-4' : 'bg-slate-50'}`}>

                    <div className="flex gap-1 flex-1 justify-center mx-2 shrink-0">
